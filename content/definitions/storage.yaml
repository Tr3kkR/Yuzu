---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: agent.storage.list
  displayName: List Storage Keys
  version: 1.0.0
  description: >
    List all keys in the agent's persistent KV storage, optionally
    filtered by prefix.
  tags: [storage, agent, state]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: storage
    action: list
    concurrency: per-device

  parameters:
    type: object
    properties:
      prefix:
        type: string
        displayName: Key Prefix
        description: Only return keys starting with this prefix. Default is all keys.

  result:
    columns:
      - name: count
        type: int32
      - name: key
        type: string

  readablePayload: "List storage keys (prefix=${prefix})"

  gather:
    ttlSeconds: 60

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.2.0
    requiredPlugins: [storage]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: agent.storage.clear
  displayName: Clear Storage
  version: 1.0.0
  description: >
    Delete all keys from the storage plugin's namespace.
  tags: [storage, agent, state]

spec:
  type: action
  platforms: [windows, linux, darwin]

  execution:
    plugin: storage
    action: clear
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: status
        type: string
      - name: cleared
        type: int32

  readablePayload: "Clear all storage keys"

  gather:
    ttlSeconds: 60

  approval:
    mode: role-gated

  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.2.0
    requiredPlugins: [storage]

status:
  phase: active
