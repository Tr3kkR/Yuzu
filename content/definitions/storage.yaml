## KV Storage Plugin Definitions
## Persistent key-value storage — remotely read/write agent plugin state.

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: agent.storage.set
  displayName: Set Storage Key
  version: 1.0.0
  description: >
    Store a key-value pair in the agent's persistent KV storage.
    Keys are namespaced per plugin.
  tags: [storage, agent, state]

spec:
  type: action
  platforms: [windows, linux, darwin]

  execution:
    plugin: storage
    action: set
    concurrency: per-device

  parameters:
    type: object
    required: [key, value]
    properties:
      key:
        type: string
        displayName: Key
        description: Storage key name.
      value:
        type: string
        displayName: Value
        description: Value to store.

  result:
    columns:
      - name: status
        type: string
      - name: key
        type: string

  readablePayload: "Set storage key '${key}'"

  gather:
    ttlSeconds: 60

  approval:
    mode: role-gated

  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.2.0
    requiredPlugins: [storage]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: agent.storage.get
  displayName: Get Storage Key
  version: 1.0.0
  description: >
    Retrieve a value from the agent's persistent KV storage by key.
  tags: [storage, agent, state]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: storage
    action: get
    concurrency: per-device

  parameters:
    type: object
    required: [key]
    properties:
      key:
        type: string
        displayName: Key
        description: Storage key to retrieve.

  result:
    columns:
      - name: key
        type: string
      - name: value
        type: string

  readablePayload: "Get storage key '${key}'"

  gather:
    ttlSeconds: 60

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.2.0
    requiredPlugins: [storage]

status:
  phase: active

