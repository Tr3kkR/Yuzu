kind: InstructionDefinition
metadata:
  id: device.tags.count
  displayName: Count Device Tags
  version: 0.1.0
  description: >
    Return the number of free-form tags currently set on the device.
  tags: [tags, scope, diagnostics]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tags
    action: count
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: count
        type: int32

  readablePayload: "Count device tags"

  gather:
    ttlSeconds: 60

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [tags]

status:
  phase: active
