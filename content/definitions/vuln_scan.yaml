    applications (registry on Windows, dpkg/rpm/pacman on Linux,
    system_profiler/brew on macOS) and compares versions against the
    built-in CVE database. Returns only CVE findings, not configuration
    checks. Use the full "scan" action for combined results.
  tags: [security, vulnerability, cve, compliance]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: vuln_scan
    action: cve_scan
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: severity
        type: string
      - name: category
        type: string
      - name: title
        type: string
      - name: detail
        type: string
    aggregation:
      groupBy: [severity]
      operations: [count]

  readablePayload: "Run CVE vulnerability scan"

  gather:
    ttlSeconds: 600

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator, security-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 1.0.0
    requiredPlugins: [vuln_scan]

status:
  phase: active

