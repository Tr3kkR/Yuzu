  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: severity
        type: string
      - name: category
        type: string
      - name: title
        type: string
      - name: detail
        type: string
    aggregation:
      groupBy: [severity]
      operations: [count]

  readablePayload: "Run configuration compliance scan"

  gather:
    ttlSeconds: 300

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator, security-admin]
