## Host Vulnerability Scanning Definitions
## Matches installed software against known CVEs and runs configuration
## compliance checks. Reports findings by severity.
## Plugin: vuln_scan | Actions: scan, cve_scan, config_scan, summary, inventory,
##                               update_rules, kernel_scan, binary_scan

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: security.vuln_scan.scan
  displayName: Full Vulnerability Scan
  version: 1.0.0
  description: >
    Run a full host vulnerability scan combining CVE matching and
    configuration compliance checks. CVE matching compares installed
    software versions against a built-in rule database. Configuration
    checks verify security hardening settings (firewall state, password
    policy, remote desktop config, etc.). Each finding is classified by
    severity (CRITICAL, HIGH, MEDIUM, LOW, INFO). Reports progress at
    0%, 50%, 90%, 100%.
  tags: [security, vulnerability, cve, compliance, audit]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: vuln_scan
    action: scan
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: severity
        type: string
      - name: category
        type: string
      - name: title
        type: string
      - name: detail
        type: string
    aggregation:
      groupBy: [severity, category]
      operations: [count]

  visualization:
    # vuln_scan emits one row per finding on `scan`, format
    # `severity|category|title|detail`. labelField=0 picks severity so
    # CRITICAL / HIGH / MEDIUM / LOW / INFO each become a pie slice and
    # findings are counted into them. Preferred over the summary action's
    # pie because summary also emits a TOTAL row that would dominate the
    # chart.
    type: pie
    processor: single_series
    title: Vulnerabilities by severity
    labelField: 0
    valueLabel: Findings

  readablePayload: "Run full vulnerability scan (CVE + configuration)"

  gather:
    ttlSeconds: 600

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator, security-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 1.0.0
    requiredPlugins: [vuln_scan]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
