    requiredPlugins: [vuln_scan]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: security.vuln_scan.summary
  displayName: Vulnerability Scan Summary
  version: 1.0.0
  description: >
    Run a full vulnerability scan (CVE + configuration) and return
    only the severity summary counts. Provides a quick overview of
    the endpoint's security posture without the full finding details.
    Returns total findings, total issues, and per-severity counts
    (CRITICAL, HIGH, MEDIUM, LOW, INFO).
  tags: [security, vulnerability, compliance, dashboard]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: vuln_scan
    action: summary
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: severity
        type: string
      - name: count
        type: int32

  readablePayload: "Get vulnerability scan summary"

  gather:
    ttlSeconds: 600

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator, security-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 1.0.0
    requiredPlugins: [vuln_scan]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: security.vuln_scan.inventory
  displayName: Software Inventory for NVD Matching
  version: 1.0.0
  description: >
    Return the raw installed software inventory (name and version pairs)
    for server-side NVD matching. This is a lightweight alternative to
    client-side CVE scanning that enables the server to perform
    centralized vulnerability correlation against the full NVD database.
  tags: [security, vulnerability, inventory, software]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: vuln_scan
    action: inventory
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: name
        type: string
      - name: version
        type: string

  readablePayload: "Collect software inventory for NVD matching"

  gather:
    ttlSeconds: 300

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator, security-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 1.0.0
    requiredPlugins: [vuln_scan]

status:
  phase: active
