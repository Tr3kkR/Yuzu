## Agent Status Plugin Definitions
## Queries agent version, platform info, health metrics, loaded plugins,
## loaded modules, server connection details, switch state, and full
## agent configuration.

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: device.status.version
  displayName: Agent Version
  version: 1.0.0
  description: >
    Returns the agent version string, build number, and git commit hash.
    Reads compile-time constants from yuzu/version.hpp.
  tags: [agent, version, inventory]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: status
    action: version
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: version
        type: string
      - name: build_number
        type: string
      - name: git_commit
        type: string

  readablePayload: "Get agent version"

  gather:
    ttlSeconds: 3600

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [status]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: device.status.info
  displayName: Agent Platform Info
  version: 1.0.0
  description: >
    Returns the agent's platform OS name, CPU architecture, and
    hostname. Uses uname on Linux/macOS, GetNativeSystemInfo and
    GetComputerNameA on Windows.
  tags: [agent, inventory]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: status
    action: info
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: os
        type: string
      - name: arch
        type: string
      - name: hostname
        type: string

  readablePayload: "Get agent platform info"

  gather:
    ttlSeconds: 3600

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [status]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: device.status.health
  displayName: Agent Health
  version: 1.0.0
  description: >
    Returns agent health metrics: uptime in seconds since plugin init,
    current epoch timestamp in milliseconds, and process resident set
    size (RSS) in kilobytes.
  tags: [agent, health, monitoring]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: status
    action: health
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: uptime_seconds
        type: int64
      - name: timestamp_epoch_ms
        type: int64
      - name: memory_rss_kb
        type: int64

  readablePayload: "Get agent health metrics"

  gather:
    ttlSeconds: 60

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [status]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
