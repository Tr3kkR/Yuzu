  displayName: Loaded Plugins
  version: 1.0.0
  description: >
    Lists all plugins currently loaded by the agent, with their name,
    version, and description. Returns the total plugin count followed
    by one row per plugin.
  tags: [agent, inventory, plugins]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: status
    action: plugins
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: plugins_count
        type: int32
      - name: plugin_name
        type: string
      - name: plugin_version
        type: string
      - name: plugin_description
        type: string

  readablePayload: "List loaded plugins"

  gather:
    ttlSeconds: 300

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [status]

status:
  phase: active

