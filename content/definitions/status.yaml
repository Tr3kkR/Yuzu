  displayName: Full Agent Configuration
  version: 1.0.0
  description: >
    Returns the full agent configuration: agent ID, version, build
    number, git commit, server address, TLS status, heartbeat interval,
    plugin directory, data directory, log level, debug mode, and verbose
    logging flag.
  tags: [agent, configuration, diagnostics]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: status
    action: config
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: agent_id
        type: string
      - name: agent_version
        type: string
      - name: build_number
        type: string
      - name: git_commit
        type: string
      - name: server_address
        type: string
      - name: tls_enabled
        type: bool
      - name: heartbeat_interval
        type: string
      - name: plugin_dir
        type: string
      - name: data_dir
        type: string
      - name: log_level
        type: string
      - name: debug_mode
        type: bool
      - name: verbose_logging
        type: bool

  readablePayload: "Get full agent configuration"

  gather:
    ttlSeconds: 300

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [status]

status:
  phase: active
