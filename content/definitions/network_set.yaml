apiVersion: yuzu.io/v1alpha1
kind: InstructionSet
metadata:
  id: core.crossplatform.network
  displayName: Network Configuration and Diagnostics
  version: 1.0.0
  description: >
    Comprehensive network instruction definitions spanning five plugins:
    network_config, netstat, network_diag, network_actions, and sockwho.
    Covers adapter inventory, IP addressing, DNS configuration, proxy
    settings, DNS cache inspection, full connection enumeration,
    listening port audits, established connection listing, DNS flush,
    ping diagnostics, and socket-to-application forensic mapping across
    Windows, Linux, and macOS.
  platforms: [windows, linux, darwin]

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]
    approveRoles: [endpoint-admin]

  contents:
    instructionDefinitions:
      # Network configuration (network_config plugin)
      - device.network_config.adapters
      - device.network_config.ip_addresses
      - device.network_config.dns_servers
      - device.network_config.proxy
      - device.network_config.dns_cache
      # Full connection enumeration (netstat plugin)
      - device.network.netstat_list
      # Targeted diagnostics (network_diag plugin)
      - device.network_diag.listening
      - device.network_diag.connections
      # Active network operations (network_actions plugin)
      - device.network_actions.flush_dns
      - device.network_actions.ping
      # Socket-to-application mapping (sockwho plugin)
      - device.network.sockwho_list

  defaults:
    approvalMode: auto
    responseRetentionDays: 30

status:
  phase: active
