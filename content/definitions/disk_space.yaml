## Disk Space Plugin Definitions
## Reports free / total disk space for a single volume. A pure fact-read:
## thresholds (required headroom) live with the caller, never in the check.
## Plugin: disk_space | Actions: free

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.storage.free
  displayName: Free Disk Space
  version: 1.0.0
  description: >
    Returns total and free bytes (and percent used) for a single volume.
    The "free" figure is the space usable by an ordinary caller —
    FreeBytesAvailableToCaller on Windows (GetDiskFreeSpaceExW), f_bavail on
    POSIX (statvfs) — the correct quota-aware figure for an installer-headroom
    check. Param `path` selects the volume (default: C:\ on Windows, / on
    Linux/macOS). One volume per call; query each volume separately.
  tags: [storage, disk, capacity, health, preflight]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: disk_space
    action: free
    concurrency: per-device

  parameters:
    type: object
    properties:
      path:
        type: string
        displayName: Volume Path
        description: >
          Directory or volume root to measure (e.g. "C:\", "/", "/var").
          Defaults to the platform root if omitted.
        validation:
          maxLength: 4096

  result:
    # The plugin emits a single pipe row `disk|<path>|<total>|<free>|<percent_used>`
    # — field 0 is the literal `disk` discriminator and the columns below map to
    # fields 1–4. As with os_info, result.columns is dashboard metadata, not an
    # engine parser hint (the engine stores the raw pipe row); a visualization
    # author binding a field index must account for the leading discriminator.
    columns:
      - name: path
        type: string
      - name: total_bytes
        type: int64
      - name: free_bytes
        type: int64
      - name: percent_used
        type: int32

  readablePayload: "Get free disk space for ${path}"

  gather:
    ttlSeconds: 60

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [disk_space]

status:
  phase: active
