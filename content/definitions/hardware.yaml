## Hardware Inventory Plugin Definitions
## Queries manufacturer, model, BIOS/UEFI, processor, memory, and disk
## information from each endpoint using WMI (Windows), sysfs/dmidecode
## (Linux), or sysctl/system_profiler (macOS).

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: device.hardware.manufacturer
  displayName: Hardware Manufacturer
  version: 1.0.0
  description: >
    Returns the system manufacturer string (e.g. "Dell Inc.",
    "Apple Inc.", "Lenovo"). Uses Win32_ComputerSystem on Windows,
    /sys/class/dmi/id/sys_vendor on Linux, sysctl on macOS.
  tags: [hardware, inventory]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: hardware
    action: manufacturer
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: manufacturer
        type: string

  readablePayload: "Get hardware manufacturer"

  gather:
    ttlSeconds: 3600

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [hardware]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
