## TAR Warehouse SQL Query Definitions
## Pre-built SQL queries against the TAR data warehouse tables.
## Plugin: tar | Action: sql | Uses $-prefixed table names.

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.sql
  displayName: "TAR: SQL Query"
  version: 1.0.0
  description: >
    Execute an arbitrary SELECT query against the TAR warehouse tables on each
    targeted agent. Use $-prefixed table names ($Process_Live, $TCP_Hourly, etc.)
    which are translated to real table names on the agent. Only SELECT queries
    are permitted.
  tags: [tar, warehouse, sql, query]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: sql
    concurrency: per-device

  parameters:
    type: object
    properties:
      sql:
        type: string
        displayName: SQL Query
        description: >
          A SELECT query using $-prefixed table names. Available tables include
          $Process_Live, $Process_Hourly, $Process_Daily, $Process_Monthly,
          $TCP_Live, $TCP_Hourly, $TCP_Daily, $TCP_Monthly,
          $Service_Live, $Service_Hourly, $User_Live, $User_Daily.
    required: [sql]

  result:
    columns:
      - { name: output, type: clob, description: "Dynamic columns returned by the SQL query" }

  gather:
    ttlSeconds: 30

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: "0.7.0"
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.recent_processes
  displayName: "TAR: Recent Processes"
  version: 1.0.0
  description: >
    Show all processes that started or stopped in the last 24 hours.
  tags: [tar, warehouse, processes, forensics]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: sql
    concurrency: per-device

  parameters:
    type: object
    properties:
      sql:
        type: string
        default: "SELECT name, pid, cmdline, user, ts FROM $Process_Live WHERE ts > strftime('%s','now','-24 hours') ORDER BY ts DESC LIMIT 500"
        hidden: true
    required: [sql]

  result:
    columns:
      - { name: output, type: clob }

  gather:
    ttlSeconds: 30

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: "0.7.0"
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.tcp_by_process
  displayName: "TAR: TCP Connections by Process"
  version: 1.0.0
  description: >
    Aggregate TCP connections grouped by process name and remote endpoint.
  tags: [tar, warehouse, network, tcp]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: sql
    concurrency: per-device

  parameters:
    type: object
    properties:
      sql:
        type: string
        default: "SELECT process_name, remote_addr, remote_port, proto, COUNT(*) as conn_count FROM $TCP_Live GROUP BY process_name, remote_addr, remote_port, proto ORDER BY conn_count DESC LIMIT 200"
        hidden: true
    required: [sql]

  result:
    columns:
      - { name: output, type: clob }

  gather:
    ttlSeconds: 30

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: "0.7.0"
    requiredPlugins: [tar]

status:
  phase: active

