---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.rollup
  displayName: "TAR: Run Aggregation"
  version: 1.0.0
  description: >
    Force an immediate rollup aggregation cycle (normally runs every 15 minutes).
    Aggregates live data into hourly, daily, and monthly summary tables and
    enforces retention limits on each tier.
  tags: [tar, warehouse, rollup, aggregation]

spec:
  type: action
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: rollup
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: status
        type: string
      - name: rows_aggregated
        type: int32

  readablePayload: "Force TAR warehouse rollup aggregation"

  gather:
    ttlSeconds: 300

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: "0.7.0"
    requiredPlugins: [tar]

status:
  phase: active
