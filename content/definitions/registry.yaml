## Windows Registry Plugin Definitions

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: windows.registry.get_value
  displayName: Get Registry Value
  version: 1.0.0
  description: >
    Read a value from the Windows registry.
  tags: [registry, windows, configuration]
spec:
  type: question
  platforms: [windows]
  execution:
    plugin: registry
    action: get_value
    concurrency: per-device
  parameters:
    type: object
    required: [hive, key, name]
    properties:
      hive:
        type: string
        displayName: Registry Hive
        validation:
          enum: ["HKLM", "HKCU", "HKCR", "HKU"]
      key:
        type: string
        displayName: Key Path
      name:
        type: string
        displayName: Value Name
  result:
    columns:
      - name: value
        type: string
      - name: type
        type: string
  approval:
    mode: auto
  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]
  compatibility:
    minAgentVersion: 0.2.0
    requiredPlugins: [registry]
status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: windows.registry.get_user_value
  displayName: Get Per-User Registry Value
  version: 1.0.0
  description: >
    Read a registry value from a specific user's NTUSER.DAT hive.
    Loads the user's hive via RegLoadKey if the user is not logged in.
    Requires SE_RESTORE_NAME and SE_BACKUP_NAME privileges (i.e., run
    as SYSTEM or elevated admin). Windows-only.
  tags: [registry, windows, per-user, configuration]
spec:
  type: question
  platforms: [windows]
  execution:
    plugin: registry
    action: get_user_value
    concurrency: per-device
  parameters:
    type: object
    required: [username, key]
    properties:
      username:
        type: string
        displayName: Username
        description: >
          Windows username whose NTUSER.DAT hive to read from.
          The user profile must exist at C:\Users\<username>.
        validation:
          maxLength: 256
      key:
        type: string
        displayName: Key Path
        description: >
          Registry key path relative to the user's HKCU root
          (e.g., "Software\\Microsoft\\Windows\\CurrentVersion\\Explorer").
        validation:
          maxLength: 1024
      name:
        type: string
        displayName: Value Name
        description: The registry value name to read.
        validation:
          maxLength: 256
  result:
    columns:
      - name: username
        type: string
      - name: value
        type: string
      - name: type
        type: string
  readablePayload: "Read registry value '${name}' from user '${username}' key '${key}'"
  approval:
    mode: role-gated
  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]
  compatibility:
    minAgentVersion: 0.3.0
    requiredPlugins: [registry]
status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: windows.registry.set_value
  displayName: Set Registry Value
  version: 1.0.0
  description: >
    Write a value to the Windows registry. Creates the key if it does not exist.
  tags: [registry, windows, configuration]
spec:
  type: action
  platforms: [windows]
  execution:
    plugin: registry
    action: set_value
    concurrency: per-device
  parameters:
    type: object
    required: [hive, key, name, value]
    properties:
      hive:
        type: string
        validation:
          enum: ["HKLM", "HKCU", "HKCR", "HKU"]
      key:
        type: string
      name:
        type: string
      value:
        type: string
      type:
        type: string
        validation:
          enum: ["REG_SZ", "REG_DWORD"]
  result:
    columns:
      - name: status
        type: string
  approval:
    mode: role-gated
  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]
  compatibility:
    minAgentVersion: 0.2.0
    requiredPlugins: [registry]
status:
  phase: active

