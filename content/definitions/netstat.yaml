## Netstat Definitions
## Enumerates active network connections and listening sockets.
## Plugin: netstat | Actions: netstat_list
##
## Sources by platform:
##   Windows: IP Helper API (GetExtendedTcpTable, GetExtendedUdpTable)
##   Linux:   /proc/net/{tcp,tcp6,udp,udp6} + /proc/[pid]/fd inode mapping
##   macOS:   libproc (proc_listallpids, proc_pidinfo, proc_pidfdinfo)

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: device.network.netstat_list
  displayName: Network Connections (netstat)
  version: 1.0.0
  description: >
    Enumerates all active TCP/UDP connections and listening sockets on
    the endpoint, returning protocol, local and remote addresses and
    ports, connection state, and owning PID. Covers TCP4, TCP6, UDP4,
    and UDP6. On Windows uses the Extended TCP/UDP Table APIs with
    per-row PID ownership. On Linux reads /proc/net/* and maps socket
    inodes to PIDs via /proc/[pid]/fd. On macOS uses libproc to
    iterate per-process file descriptors for socket types.
  tags: [network, security, connections, inventory]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: netstat
    action: netstat_list
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: proto
        type: string
      - name: local_addr
        type: string
      - name: local_port
        type: int32
      - name: remote_addr
        type: string
      - name: remote_port
        type: int32
      - name: state
        type: string
      - name: pid
        type: int32
    aggregation:
      groupBy:
        - proto
        - state
      operations:
        - count

  readablePayload: "List all network connections"

  gather:
    ttlSeconds: 30

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 1.0.0
    requiredPlugins: [netstat]

status:
  phase: active
