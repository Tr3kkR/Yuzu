## Socket-to-Application Mapping Definitions
## Maps open sockets to owning processes with full path resolution.
## Plugin: sockwho | Actions: sockwho_list
##
## Sources by platform:
##   Windows: IP Helper API + QueryFullProcessImageNameW for path resolution
##   Linux:   /proc/net/* + /proc/[pid]/{comm,exe,fd} for inode-to-PID mapping
##   macOS:   libproc (proc_listallpids, proc_name, proc_pidpath, proc_pidfdinfo)

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: device.network.sockwho_list
  displayName: Socket-to-Application Map
  version: 1.0.0
  description: >
    Enumerates all open TCP/UDP sockets and resolves the owning process
    for each, returning PID, process name, executable path, and full
    socket details (protocol, local/remote addresses, ports, state).
    On Windows uses the Extended TCP/UDP Table APIs and resolves
    process paths via QueryFullProcessImageNameW with a per-PID cache.
    On Linux scans /proc to build inode-to-PID and PID-to-process maps
    in a single pass. On macOS uses libproc for per-process FD
    enumeration with proc_name and proc_pidpath. Pipe characters in
    process names and paths are escaped. Useful for security
    investigations to identify which application owns a suspicious
    connection.
  tags: [network, security, forensics, inventory]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: sockwho
    action: sockwho_list
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: pid
        type: int32
      - name: process_name
        type: string
      - name: process_path
        type: string
      - name: proto
        type: string
      - name: local_addr
        type: string
      - name: local_port
        type: int32
      - name: remote_addr
        type: string
      - name: remote_port
        type: int32
      - name: state
        type: string
    aggregation:
      groupBy:
        - process_name
        - proto
      operations:
        - count

  readablePayload: "Map sockets to owning applications"

  gather:
    ttlSeconds: 30

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 1.0.0
    requiredPlugins: [sockwho]

status:
  phase: active
