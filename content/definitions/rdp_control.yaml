## Remote Desktop (RDP) Control Plugin Definitions
#
# Built for change-gated remote access: an ITSM system (e.g. ServiceNow)
# enables RDP on two devices at the start of an approved change window and
# disables it again at the end. The agent service account must be a member of
# the local Administrators group (this is NOT the default install) — a
# non-elevated agent returns reg_status|error:5 on every set_state.
#
# ENFORCEMENT REALITY (read before relying on the gate below): the only control
# enforced on EVERY dispatch path is the `Execution:Execute` RBAC permission.
# `approval.mode: role-gated` is enforced ONLY on the governed
# POST /api/instructions/{id}/execute path; the raw dispatch paths
# (POST /api/command, MCP execute_instruction) do NOT load this definition, so
# they apply neither the approval workflow nor `executeRoles`. `executeRoles`
# is advisory (not consumed by the server today) and `endpoint-admin` is a
# content-convention label, not a server RBAC role (those are
# Administrator/PlatformEngineer/Operator). Net: anyone holding
# `Execution:Execute` (incl. an MCP token defaulting scope to __all__) can run
# this. Restrict `Execution:Execute` and MCP token scope accordingly, and keep
# the Guardian fDenyTSConnections backstop deployed. Enforcing definition-level
# governance on raw dispatch is tracked as a platform follow-up (issue #1401).

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: windows.rdp.set_state
  displayName: Enable/Disable Remote Desktop
  version: 1.0.0
  description: >
    Enable or disable Remote Desktop (RDP) on a Windows endpoint. Enable sets
    HKLM fDenyTSConnections=0, enables the built-in Remote Desktop firewall
    rule group, and starts TermService. Disable sets fDenyTSConnections=1 and
    disables the firewall rule group (the service is left running; the
    registry and firewall gates block new connections). Per-step status is
    reported; overall=ok only when every step succeeded — callers must retry
    until confirmed, especially on disable. NOTE: disable blocks NEW
    connections only; it does not terminate an already-established RDP session.
  tags: [rdp, remote-desktop, windows, configuration, change-window]
spec:
  type: action
  platforms: [windows]
  execution:
    plugin: rdp_control
    action: set_state
    concurrency: per-device
  parameters:
    type: object
    required: [state]
    properties:
      state:
        type: string
        displayName: RDP State
        description: enable allows Remote Desktop connections; disable blocks them.
        validation:
          enum: ["enable", "disable"]
  result:
    columns:
      - name: reg_status
        type: string
      - name: firewall_status
        type: string
      - name: service_status
        type: string
      - name: overall
        type: string
  readablePayload: "Set Remote Desktop state to ${state}"
  approval:
    mode: role-gated
  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]
  compatibility:
    minAgentVersion: 0.2.0
    requiredPlugins: [rdp_control]
status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: windows.rdp.status
  displayName: Remote Desktop Status
  version: 1.0.0
  description: >
    Report the current Remote Desktop posture of a Windows endpoint:
    fDenyTSConnections registry value, Remote Desktop firewall rule group
    state, TermService state, and the derived rdp verdict. rdp=on only when
    all three gates are readable and open; rdp=unknown when any gate could not
    be read (e.g. a non-elevated agent); rdp=off when all gates are readable
    but at least one is closed. A non-zero command exit code also signals an
    unreadable gate — callers verifying a state change should check the exit
    code and the per-gate rows, not the rdp summary alone. SCOPE: the firewall
    check covers only the built-in Remote Desktop rule group; a custom inbound
    3389 allow-rule is out of scope, so rdp=off means "at least one MANAGED gate
    is closed", not "3389 is unreachable by every possible rule".
  tags: [rdp, remote-desktop, windows, posture]
spec:
  type: question
  platforms: [windows]
  execution:
    plugin: rdp_control
    action: status
    concurrency: per-device
  result:
    columns:
      - name: deny_ts_connections
        type: string
      - name: firewall_group
        type: string
      - name: term_service
        type: string
      - name: rdp
        type: string
  approval:
    mode: auto
  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]
  compatibility:
    minAgentVersion: 0.2.0
    requiredPlugins: [rdp_control]
status:
  phase: active
