## Timeline Activity Record (TAR) Definitions
## Continuous system state change tracking -- processes, network, services, users.
## Plugin: tar | Actions: status, query, snapshot, export, configure, collect_fast, collect_slow, fleet_snapshot

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.status
  displayName: TAR Status
  version: 1.0.0
  description: >
    Returns the current status of the TAR database including record count,
    oldest and newest event timestamps, database size on disk, and the
    configured retention period. Use this to verify TAR is collecting data
    and to monitor disk usage. Also reports both the configured
    network_capture_method and the network_capture_method_effective (the
    mechanism actually collecting — always polling today), so status never
    misrepresents the active capture mechanism.
  tags: [tar, timeline, monitoring, diagnostics]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: status
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: record_count
        type: int64
      - name: oldest_timestamp
        type: int64
      - name: newest_timestamp
        type: int64
      - name: db_size_bytes
        type: int64
      - name: retention_days
        type: int32

  readablePayload: "Get TAR database status"

  gather:
    ttlSeconds: 60

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.query
  displayName: Query TAR Events
  version: 1.0.0
  description: >
    Queries the TAR event database for system activity records within a
    time range. Events include process starts/stops, network connections
    opened/closed, service state changes, and user logins/logouts. Results
    are pipe-delimited: timestamp|event_type|event_action|snapshot_id|detail_json.
    The detail_json field contains a JSON object with type-specific fields:

    Process events: {"pid":N, "ppid":N, "name":"...", "cmdline":"...", "user":"..."}
    Network events: {"proto":"tcp", "local_addr":"...", "local_port":N, "remote_addr":"...", "remote_host":"...", "remote_port":N, "state":"...", "pid":N}
    Service events: {"name":"...", "display_name":"...", "status":"...", "startup_type":"..."}
    User events: {"user":"...", "domain":"...", "logon_type":"...", "session_id":"..."}
  tags: [tar, timeline, query, forensics, compliance]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: query
    concurrency: per-device

  parameters:
    type: object
    properties:
      from:
        type: string
        displayName: Start Time
        description: >
          Start of the query time range as Unix epoch seconds.
          Defaults to 0 (beginning of time).
      to:
        type: string
        displayName: End Time
        description: >
          End of the query time range as Unix epoch seconds.
          Defaults to the current time.
      type:
        type: string
        displayName: Event Type Filter
        description: >
          Filter results by event type. Valid values: process, network,
          service, user, software, arp, dns. software is part of the default
          feed; arp/dns are opt-in device-state sources (ADR-0015) reached only
          by an explicit filter — they are excluded from the default
          (empty-filter) feed. Leave empty to return the core
          process/network/service/user/software types.
        validation:
          enum: [process, network, service, user, software, arp, dns, ""]
      limit:
        type: string
        displayName: Result Limit
        description: >
          Maximum number of events to return. Default 1000, max 10000.
        validation:
          pattern: "^[0-9]+$"

  result:
    columns:
      - name: timestamp
        type: int64
      - name: event_type
        type: string
      - name: event_action
        type: string
      - name: snapshot_id
        type: int64
      - name: detail_json
        type: clob

  readablePayload: "Query TAR events from ${from} to ${to} type=${type}"

  gather:
    ttlSeconds: 30

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.snapshot
  displayName: TAR Force Snapshot
  version: 1.0.0
  description: >
    Forces an immediate full snapshot of all four TAR collectors (processes,
    network connections, services, user sessions). Computes diffs against
    the previous state and records any detected changes. Useful before
    maintenance windows or incident investigations.
  tags: [tar, timeline, snapshot, forensics]

spec:
  type: action
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: snapshot
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: status
        type: string
      - name: events_recorded
        type: int32

  readablePayload: "Force immediate TAR snapshot"

  gather:
    ttlSeconds: 300

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.export
  displayName: Export TAR Events as JSON
  version: 1.0.0
  description: >
    Exports TAR events as a JSON array for integration with external
    analytics tools (Splunk, ClickHouse, ELK). Each event object includes
    id, timestamp, event_type, event_action, snapshot_id, and a nested
    detail object with type-specific fields.
  tags: [tar, timeline, export, analytics, integration]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: export
    concurrency: per-device

  parameters:
    type: object
    properties:
      from:
        type: string
        displayName: Start Time
        description: Start of export range as Unix epoch seconds.
      to:
        type: string
        displayName: End Time
        description: End of export range as Unix epoch seconds.
      type:
        type: string
        displayName: Event Type Filter
        description: Filter by event type (process, network, service, user, software, arp, dns).
      limit:
        type: string
        displayName: Result Limit
        description: Maximum events to export. Default 1000, max 10000.

  result:
    columns:
      - name: json_output
        type: clob

  readablePayload: "Export TAR events as JSON"

  gather:
    ttlSeconds: 30

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.configure
  displayName: Configure TAR
  version: 1.0.0
  description: >
    Updates TAR plugin configuration. Changes take effect on the next
    collection cycle. Configurable settings include data retention period,
    collection intervals, and command-line redaction patterns for sensitive
    data protection.
  tags: [tar, timeline, configuration, security]

spec:
  type: action
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: configure
    concurrency: per-device

  parameters:
    type: object
    properties:
      retention_days:
        type: string
        displayName: Retention Days
        description: >
          Number of days to retain TAR events before automatic purging.
          Valid range: 1-365. Default: 7.
        validation:
          pattern: "^[0-9]+$"
      fast_interval:
        type: string
        displayName: Fast Collection Interval (seconds)
        description: >
          Interval in seconds for process and network collection.
          Valid range: 10-3600. Default: 60.
        validation:
          pattern: "^[0-9]+$"
      slow_interval:
        type: string
        displayName: Slow Collection Interval (seconds)
        description: >
          Interval in seconds for service and user session collection.
          Valid range: 30-7200. Default: 300.
        validation:
          pattern: "^[0-9]+$"
      redaction_patterns:
        type: string
        displayName: Redaction Patterns
        description: >
          JSON array of case-insensitive SUBSTRING patterns (not glob) for
          command-line redaction. Leading/trailing `*` are stripped; `?` and
          `[abc]` are literals. Any process command line containing a pattern
          has its cmdline replaced with "[REDACTED by TAR]". At most 256
          elements of at most 256 characters each; over-cap elements are
          dropped at load. Default patterns: ["*password*", "*secret*",
          "*token*", "*api_key*", "*credential*"]. These defaults are ALWAYS
          MERGED IN — your patterns are ADDED to them, never replace them, so an
          empty or all-invalid array cannot disable the baseline redaction.
      process_enabled:
        type: string
        displayName: Process Collector Enabled
        description: >
          Enable or disable the process collector on this agent. "true"
          (default) keeps the collector active; "false" short-circuits the
          process branch of every collect_fast cycle. Existing rows remain
          queryable until they age out by retention. Requires agent
          v0.12.0+; older agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      tcp_enabled:
        type: string
        displayName: TCP Collector Enabled
        description: >
          Enable or disable the TCP/network collector on this agent. See
          process_enabled for semantics. Requires agent v0.12.0+; older
          agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      service_enabled:
        type: string
        displayName: Service Collector Enabled
        description: >
          Enable or disable the service collector on this agent. See
          process_enabled for semantics. Requires agent v0.12.0+; older
          agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      user_enabled:
        type: string
        displayName: User-Session Collector Enabled
        description: >
          Enable or disable the user-session collector on this agent. See
          process_enabled for semantics. Requires agent v0.12.0+; older
          agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      perf_enabled:
        type: string
        displayName: Performance Collector Enabled
        description: >
          Enable or disable the device performance sampler (CPU / memory / disk /
          network rates → $Perf_*) on this agent. "true" (default) keeps it
          active. Device-level perf carries no per-application identity. See
          process_enabled for the disable semantics. Requires agent v0.12.0+;
          older agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      procperf_enabled:
        type: string
        displayName: Per-Application Performance Collector Enabled
        description: >
          Enable or disable the per-application top-N CPU/working-set sampler
          (procperf source → $ProcPerf_*). **Off by default** — per-application
          resource usage reveals which applications run on a device, which is
          usage-class telemetry under the works-council posture; independent of
          perf_enabled. Image names only — never command lines. Set to "true" to
          opt in. Requires agent v0.12.0+; older agents silently ignore.
          Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      netqual_enabled:
        type: string
        displayName: Network-Quality Collector Enabled
        description: >
          Enable or disable the per-connection TCP-quality sampler (netqual
          source → $NetQual_Live). **Off by default** — per-connection quality is
          usage-class telemetry under the works-council posture; only a coarse
          destination class (loopback/private/public) is stored, raw remote
          addresses are dropped at the edge. Linux only; independent of
          tcp_enabled. Set to "true" to opt in. Requires agent v0.12.0+; older
          agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      module_enabled:
        type: string
        displayName: Module-Load Collector Enabled
        description: >
          Enable or disable the image-load / module-stream capture source (module
          source → $Module_*). **Off by default** — module-load capture is
          high-volume usage-class telemetry (every library and driver load per
          process, with a code-signing verdict) under the works-council posture;
          no command line is ever captured. No data is recorded until a collector
          for the host's OS ships ($Module_* tables are queryable-empty until
          then). Set to "true" to opt in. Requires agent v0.12.0+; older agents
          silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      software_enabled:
        type: string
        displayName: Software Inventory Collector Enabled
        description: >
          Enable or disable the software install/uninstall source (software →
          $Software_*) on this agent. **On by default** — machine-wide
          installed-software inventory (HKLM Uninstall) is device asset-management
          and vulnerability-relevance data and carries no user identity. Per-user
          installs (which carry a profile name) are NOT collected unless
          software_user_scope_enabled is also turned on. Names, versions, and
          publisher only. See process_enabled for the disable semantics (atomic,
          existing rows remain queryable, clean re-baseline on re-enable). Requires
          agent v0.12.0+; older agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      software_user_scope_enabled:
        type: string
        displayName: Software Per-User Scope Enabled
        description: >
          Additionally collect PER-USER installed software (Windows HKU\<SID>,
          mounting NTUSER.DAT for logged-off profiles) under the software source.
          **Off by default** — per-user inventory is attributed to a Windows
          profile name, which is personal data under the works-council posture
          (like procperf / netqual / dns); machine-wide inventory above stays on
          regardless. Has no effect unless software_enabled is also on. Changing
          this re-baselines the source on the next tick (no spurious install/remove
          storm). Requires agent v0.12.0+. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      software_interval:
        type: string
        displayName: Software Collection Interval (seconds)
        description: >
          Interval in seconds for the software install/uninstall sampler
          (tar.software trigger). "0" disables the trigger entirely; any other
          value must be 300-86400 (5 minutes - 1 day). Default: 3600 (hourly).
          Installs are rare and the per-user path mounts NTUSER.DAT hives, so this
          runs on its own slower trigger. Requires agent v0.12.0+.
        validation:
          pattern: "^[0-9]+$"
      software_max_hive_mounts:
        type: string
        displayName: Software Cold-Start Hive Mount Cap
        description: >
          Maximum number of logged-off user NTUSER.DAT hives to mount during the
          one-time cold-start software baseline on this host (steady-state ticks
          never mount). Bounds the cold-start I/O on many-profile RDS/Citrix
          hosts; profiles beyond the cap are baselined lazily when their user next
          logs on. "0" never mounts logged-off hives (loaded hives only). Valid
          range: 0-100000. Default: 100. Requires agent v0.12.0+.
        validation:
          pattern: "^[0-9]+$"
      arp_enabled:
        type: string
        displayName: ARP Collector Enabled
        description: >
          Enable or disable the ARP / neighbour-table capture source (ADR-0015).
          Opt-in: "false" by default. See process_enabled for semantics.
          Windows-only collector today (Linux/macOS planned). Requires agent
          v0.12.0+; older agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      dns_enabled:
        type: string
        displayName: DNS Cache Collector Enabled
        description: >
          Enable or disable the DNS resolver-cache capture source (ADR-0015).
          Opt-in: "false" by default — the DNS cache reveals visited domains
          (usage-class telemetry under the works-council posture; enabling is
          audited). Windows-only collector today (Linux/macOS planned). Requires
          agent v0.12.0+; older agents silently ignore. Valid: "true" | "false".
        validation:
          pattern: "^(true|false)$"
      network_capture_method:
        type: string
        displayName: Network Capture Method
        description: >
          TCP capture mechanism. "polling" (always accepted) drives the
          collector via the platform polling API at fast_interval cadence and
          is the only mechanism wired today. Validation is OS-AWARE and scoped to
          the NETWORK (tcp) source: besides "polling", only the tcp-source method
          valid on the RUNNING host's OS is accepted — iphlpapi on Windows, procfs
          on Linux, proc_pidfdinfo on macOS (run the `compatibility` action for the
          live list). Process-source methods such as "etw" / "endpoint_security"
          are NOT network_capture_method values and are rejected even on their own
          OS. A method belonging to a DIFFERENT OS is also rejected, so a Linux
          agent can no longer store "iphlpapi". A host-valid future method is
          accepted for pre-staging; the agent emits a warn line and continues
          polling until that collector lands. The mechanism actually in force is
          observable via network_capture_method_effective in the status action
          (always polling today). Requires agent v0.12.0+.
      process_stabilization_exclusions:
        type: string
        displayName: Process Stabilization Exclusions
        description: >
          JSON array of case-insensitive substring patterns matched against
          the process name. Any process whose name contains a pattern is
          dropped before the diff so noisy short-lived helpers do not
          dwarf real activity. Trade-off: forensic completeness — anything
          matching is invisible to TAR. Leading and trailing `*` are
          stripped (so `*-helper*` is the same as `-helper`). NOT real
          glob — `?` and `[abc]` are treated as literals. At most 256
          elements of at most 256 characters each, and the EFFECTIVE substring
          (after stripping `*`) must be at least 3 characters — a shorter core
          like "a" or "*a*" would match almost every process and is rejected
          at configure AND dropped at load. Requires agent v0.12.0+. Example:
          '["chrome-helper","ms-edge-helper"]'.

  result:
    columns:
      - name: key
        type: string
      - name: value
        type: string

  readablePayload: "Configure TAR settings"

  gather:
    ttlSeconds: 60

  approval:
    mode: manual

  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.collect_fast
  displayName: TAR Fast Collection
  version: 1.0.0
  description: >
    Internal trigger-driven action that collects process and network
    connection snapshots, computes diffs against previous state, and
    records change events. Runs automatically every 60 seconds by default.
    Not typically invoked manually.
  tags: [tar, timeline, internal, processes, network]

spec:
  type: action
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: collect_fast
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: events_recorded
        type: int32

  readablePayload: "Run TAR fast collection (processes + network)"

  gather:
    ttlSeconds: 120

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.collect_slow
  displayName: TAR Slow Collection
  version: 1.0.0
  description: >
    Internal trigger-driven action that collects service and user session
    snapshots, computes diffs against previous state, and records change
    events. Also checks if purge is due and removes expired records.
    Runs automatically every 300 seconds by default. Not typically invoked
    manually.
  tags: [tar, timeline, internal, services, users]

spec:
  type: action
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: collect_slow
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: events_recorded
        type: int32

  readablePayload: "Run TAR slow collection (services + users)"

  gather:
    ttlSeconds: 600

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: 0.1.0
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.compatibility
  displayName: TAR OS Compatibility Matrix
  version: 1.0.0
  description: >
    Returns the live OS-support matrix for every TAR capture source.
    Output is one header line followed by N row lines, pipe-delimited:

      header|source|os|status|capture_method|notes
      row|process|windows|supported|toolhelp32|...
      row|process|linux|supported|procfs|...

    Status values: supported | constrained | planned | unsupported.

    Use this to verify on a target host which capture sources are wired
    and which are kPlanned (so operators can pre-stage
    network_capture_method before the implementation lands). Read-only,
    static metadata — does not touch the database or the filesystem,
    safe to call at any frequency.
  tags: [tar, compatibility, diagnostics, capabilities]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: compatibility
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: output
        type: clob
        description: "header|... or row|source|os|status|capture_method|notes lines"

  readablePayload: "Show TAR OS compatibility matrix"

  gather:
    ttlSeconds: 300

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: "0.12.0"
    requiredPlugins: [tar]

status:
  phase: active

---
apiVersion: yuzu.io/v1alpha1
kind: InstructionDefinition
metadata:
  id: crossplatform.tar.fleet_snapshot
  displayName: TAR Fleet Snapshot
  version: 1.0.0
  description: >
    Produces a single JSON document enumerating every running process and
    open network connection on this host at the moment of invocation, in
    the fleet_snapshot.v1 schema. Used by the server-side FleetTopologyStore
    to assemble the 3D fleet network-topology view (/viz/fleet, ladder PR
    5+). Each list is capped at 4096 entries; truncation is signalled by
    truncated_processes and truncated_connections flags. Cmdlines are
    redacted per the active redaction_patterns config (defaults always
    apply). Process and tcp source pause states are honoured -- when paused,
    the corresponding list is empty and source_paused.* markers appear in
    the payload. Not typically invoked manually; the server pulls on demand
    at the topology cache TTL.
  tags: [tar, fleet, topology, visualization, internal]

spec:
  type: question
  platforms: [windows, linux, darwin]

  execution:
    plugin: tar
    action: fleet_snapshot
    concurrency: per-device

  parameters:
    type: object
    properties: {}

  result:
    columns:
      - name: json_output
        type: clob
        description: "Single fleet_snapshot.v1 JSON document"

  readablePayload: "Collect fleet topology snapshot"

  gather:
    ttlSeconds: 60

  approval:
    mode: auto

  permissions:
    executeRoles: [endpoint-admin, endpoint-operator]
    authorRoles: [content-author]

  compatibility:
    minAgentVersion: "0.13.0"
    requiredPlugins: [tar]

status:
  phase: active
