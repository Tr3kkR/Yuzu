# Meson cross file: Linux ARM64 (aarch64-linux-gnu)
# Install toolchain: apt install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
#
# Usage:
#   meson setup builddir --cross-file meson/cross/aarch64-linux-gnu.ini

[binaries]
c       = ['ccache', 'aarch64-linux-gnu-gcc']
cpp     = ['ccache', 'aarch64-linux-gnu-g++']
ar      = 'aarch64-linux-gnu-ar'
strip   = 'aarch64-linux-gnu-strip'
ranlib  = 'aarch64-linux-gnu-ranlib'

[built-in options]
cpp_std = 'c++23'

[host_machine]
system     = 'linux'
cpu_family = 'aarch64'
cpu        = 'aarch64'
endian     = 'little'
