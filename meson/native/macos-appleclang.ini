# Meson native file: macOS with Apple Clang (Apple Silicon / x64)
# Usage: meson setup builddir --native-file meson/native/macos-appleclang.ini
#
# macOS deployment target 13.3+ required for std::format and
# std::from_chars(float) — these live in the system libc++.dylib.

[built-in options]
cpp_std = 'c++23'
cpp_args = ['-mmacosx-version-min=13.3']
cpp_link_args = ['-mmacosx-version-min=13.3']
