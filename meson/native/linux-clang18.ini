# Meson native file: Linux x64 with Clang 18
# Usage: meson setup builddir --native-file meson/native/linux-clang18.ini
# NOTE: Set CC/CXX env vars to control compiler selection (e.g. CC='ccache clang-18')
#
# Clang needs --gcc-install-dir to find the correct GCC 13 toolchain for
# C++23 std::expected and other features. Without this, CI runners with
# multiple GCC versions may pick an older toolchain.

[built-in options]
cpp_std = 'c++23'
cpp_args = ['--gcc-install-dir=/usr/lib/gcc/x86_64-linux-gnu/13']
