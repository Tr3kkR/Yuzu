  #         rate(yuzu_server_secret_decrypt_failures_total{failure_class="kek_unresolvable"}[5m]) > 0
  #       for: 2m
  #       labels:
  #         severity: critical
  #       annotations:
  #         summary: "Secret decrypts failing: KEK unresolvable (backup skew?)"
