  #       annotations:
  #         summary: "Secret blob failed GCM authentication (tamper signal)"

  # ── yuzu-postgres — server storage substrate (#1320 PR 3) ──────────────
  # The server fails closed without PostgreSQL, so substrate health is
  # service-affecting. NOTE ON TIMING: /readyz flips to 503 *immediately* on
  # breaker-open (off yuzu_pg_connect_failed_total), so the load balancer
  # drains the instance right away. These alerts carry `for:` windows and are
  # for paging/escalation — they fire AFTER the LB has already reacted, not
  # before. Metrics come from the pool's Observer feed.
  - name: yuzu-postgres
    rules:
      - alert: YuzuPgConnectFailing
        # The connect-failure circuit breaker has armed — the database is
        # unreachable. /readyz already reports not-ready off the same signal
        # (LB eviction is immediate); this alert fires after for:2m of
        # sustained failure to page/escalate, NOT to drive LB eviction.
        expr: |
          rate(yuzu_pg_connect_failed_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Yuzu cannot connect to PostgreSQL (breaker armed; /readyz already 503)"

      - alert: YuzuPgPoolSaturated
        # >90% of the pool leased for 5m — acquire timeouts (and heartbeat
        # upsert skips) are imminent. Raise --postgres-pool-size or scale.
        expr: |
          yuzu_pg_pool_in_use / yuzu_pg_pool_size > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Yuzu PostgreSQL pool >90% saturated"

      - alert: YuzuPgAcquireWaitHigh
        # p99 acquire wait > 200ms — the leading saturation indicator; the
        # heartbeat upsert deadline is 250ms, so persistence starts to drop here.
        expr: |
          histogram_quantile(0.99, rate(yuzu_pg_acquire_wait_seconds_bucket[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Yuzu PostgreSQL pool acquire p99 > 200ms"

  - name: yuzu-guardian
    rules:
      # yuzu_server_guardian_events_dropped_total is a cumulative-but-published-
      # as-gauge counter that RESETS on server restart, so alert on increase()
      # over a window, never an absolute value or `> 0`. The metric conflates
      # benign redelivery (agent reconnect / event_seq_ reset after a crash-loop)
      # with real loss and the forged-id pre-claim path (#1360), so the threshold
      # needs a real-fleet redelivery baseline — the value below is a placeholder
      # starting point, tune it against your own reconnect churn. Closing this
      # alert is what turns the #1414 CC7.3 visibility gauge into an operating
      # control: a sustained climb means drift was observed but silently discarded.
      - alert: YuzuGuardianEventsDropped
        expr: |
          increase(yuzu_server_guardian_events_dropped_total[1h]) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Guardian events dropped at ingest (event_id PK conflict)"
          description: >-
            More than 50 Guardian events were dropped at ingest on an event_id
            PK/UNIQUE conflict in the last hour. Some redelivery is benign
            (agent reconnects, event_seq_ resets); a sustained climb means real
            drift is being silently discarded — check the server `warn` logs for
            the rejected event_id, and rule out a clock-skewed fleet or a
            forged-id pre-claim. Tune the threshold to your fleet's reconnect
            churn.
          runbook_url: "https://docs.yuzu.io/runbooks/guardian-events-dropped"

  - name: yuzu-audit
    # Behavioural-data routes (guardian.device.view, dex.device.view, dex.signal.view)
    # audit-on-open then FAIL CLOSED: if the audit row cannot persist they return 503
    # and serve no PII (CC7.2). yuzu_server_audit_emit_failed_total is the only signal
    # this is happening — without this alert a fleet-polled CMDB (ServiceNow) integration
    # blackouts silently (sre-1, #1647).
    rules:
      - alert: YuzuAuditPersistFailures
        expr: |
          increase(yuzu_server_audit_emit_failed_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Audit events failing to persist — behavioural-data routes are 503ing"
          description: >-
            yuzu_server_audit_emit_failed_total is rising. Every REST route that uses
            fail-closed audit-on-open (guardian.device.view, dex.device.view,
            dex.signal.view) is returning 503 and withholding PII, so a ServiceNow /
            CMDB poll blackouts fleet-wide. Check audit.db health (/healthz
            stores.audit) and free disk on the data directory. Note: a bad_alloc-class
            throw in the audit pipeline fails closed the same way but does NOT bump this
            counter (it is catch-logged only) — correlate with a spike in 503s on the
            behavioural routes.
          runbook_url: "https://docs.yuzu.io/runbooks/audit-store-degraded"

  - name: yuzu-bundles
    # Live-query bundle surface (ADR-0011). The manifest map is in-memory + bounded
    # (TTL + cap), so cap-eviction silently discards another operator's in-flight
    # bundle — these alerts make that (and dispatch health) observable until the
    # manifest moves to Postgres.
    rules:
      - alert: YuzuBundleCapEviction
        expr: |
          rate(yuzu_bundle_evictions_total{reason="cap"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Live-query bundle manifest cap is forcing evictions"
          description: >-
            The in-memory bundle manifest map has hit its cap and is evicting
            non-expired bundles to admit new ones — an in-flight bundle may 404 on
            collate for an operator who did not cause the load. Likely a runaway
            agentic dispatch loop. Investigate the dispatching principal; the
            durable Postgres manifest (ADR-0011) removes the cap.
      - alert: YuzuBundleManifestSaturation
        expr: |
          max(yuzu_bundle_manifests) > 3500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Live-query bundle manifest count approaching the 4096 cap"
          description: >-
            In-flight bundle manifests are within ~15% of the cap; sustained growth
            will force cross-operator cap-eviction (see YuzuBundleCapEviction).
      - alert: YuzuBundleDispatchLatencyHigh
        # UP-15: the bundle fan-out is synchronous — a POST holds an HTTP worker
        # across N gRPC writes. This pages before that hold (×concurrency) starves
        # the worker pool; observe-only is not enough while the async-dispatch fix
        # is deferred. 500ms is well above the ms-scale normal case.
        expr: |
          histogram_quantile(0.99,
            sum(rate(yuzu_bundle_dispatch_duration_seconds_bucket[5m])) by (le, surface)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Bundle dispatch fan-out p99 > 500ms (HTTP worker hold risk)"
          description: >-
            The synchronous bundle dispatch fan-out is holding HTTP workers for
            >500ms p99 on surface={{ $labels.surface }}. Under load this risks
            HTTP thread-pool starvation affecting unrelated routes. Reduce
            concurrent bundle dispatches, reduce steps-per-bundle, or prioritise
            the deferred async-dispatch fix (UP-15).

  # Agent daily-sync / installed-software inventory (ADR-0016). The
  # yuzu_inventory_ingest_total{source,outcome} counter is otherwise measured but
  # unoperationalised (gov sre). need_full + error are the degradation signals.
  - name: yuzu-inventory
    rules:
      - alert: YuzuInventorySustainedIngestErrors
        # outcome=error = a store/pool failure on ingest. Correlated with yuzu_pg_*
        # = a transient PG outage (self-heals); uncorrelated + low/persistent = a
        # device stuck on a payload the store keeps rejecting — grep the warn-level
        # SoftwareInventoryStore log for the agent_id.
        expr: |
          sum(rate(yuzu_inventory_ingest_total{outcome="error"}[15m])) > 0.001
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software ingest sustaining errors"
          description: >-
            yuzu_inventory_ingest_total{outcome="error"} has been non-zero for 15m.
            If correlated with yuzu_pg_connect_failed_total it is a transient
            Postgres outage (self-heals via the next sync + weekly full-floor); if
            uncorrelated it is likely one or more devices whose payload the store
            keeps rejecting — grep the warn-level SoftwareInventoryStore logs for
            the agent_id.
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      - alert: YuzuInventoryHighNeedFullRatio
        expr: |
          sum(rate(yuzu_inventory_ingest_total{outcome="need_full"}[15m]))
          / clamp_min(sum(rate(yuzu_inventory_ingest_total[15m])), 0.0001) > 0.2
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software need_full ratio > 20%"
          description: >-
            Over 20% of inventory ingest outcomes are need_full for 15m. Expected
            transiently after a server DB restore (cold cache — agents re-send full,
            then settle); a sustained ratio suggests hash drift or agents stuck in a
            resend cycle.
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      - alert: YuzuInventoryDroppedBlobs
        # outcome=dropped = a blob over the 3 MiB cap was rejected + nacked. UNLIKE
        # outcome=error this NEVER self-heals: the agent resends the same over-cap
        # payload and backs off forever (the agent's own cap should prevent reaching
        # here, so a non-zero rate signals agent/server cap drift after a version
        # skew, or a non-conforming agent). Deliberately a SEPARATE alert — folding
        # it into YuzuInventorySustainedIngestErrors would mislabel a permanent
        # condition as the self-healing transient-PG-outage case (gov sre).
        expr: |
          sum(rate(yuzu_inventory_ingest_total{outcome="dropped"}[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software ingest dropping over-cap blobs"
          description: >-
            yuzu_inventory_ingest_total{outcome="dropped"} is non-zero: one or more
            agents are sending an installed-software blob over the 3 MiB cap, which
            is dropped + nacked and will NOT self-heal (the agent resends the same
            payload). Likely an agent/server cap-constant drift after a version skew,
            or a non-conforming agent — check the agent version and the warn-level
            "oversized ... blob" server logs for the agent_id.
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      - alert: YuzuInventoryReportRejected
        # outcome=rejected = a whole report carrying too many sources (content_hashes /
        # plugin_data map > 64) was rejected at the ingest entry. DISTINCT from
        # outcome=dropped (over-cap blob): this path does NOT nack, so the agent advances
        # to the weekly floor rather than resending forever — different runbook. The
        # framework wires ~1 source, so a non-zero rate signals a malformed / abusive /
        # corrupted agent, not cap drift (gov consistency).
        expr: |
          sum(rate(yuzu_inventory_ingest_total{outcome="rejected"}[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software ingest rejecting over-cap reports"
          description: >-
            yuzu_inventory_ingest_total{outcome="rejected"} is non-zero: one or more
            agents are sending an inventory report whose source map exceeds the
            kMaxSources cap (64) — the whole report is rejected (NOT nacked; the agent
            advances to its weekly full-floor). The framework wires ~1 source, so this
            signals a malformed/abusive/corrupted agent — check the agent version and the
            warn-level "carries too many sources" server logs for the agent_id.
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      - alert: YuzuInventoryReadDegraded
        # An AUTHORITATIVE inventory read (query_software / get_agent_software)
        # returned a degrade (no data), NOT a silent empty. /readyz deliberately
        # stays green under pure pool saturation (it trips only on connection
        # failure, to avoid false LB evictions), so this is otherwise
        # dashboard-invisible: the store-agnostic yuzu_pg_acquire_timeout_total
        # moves but nothing inventory-specific does (#1675).
        # reason = store_not_open | pool_acquire_timeout | query_error.
        expr: |
          sum(rate(yuzu_inventory_read_degrade_total[5m])) by (reason) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software reads degrading ({{ $labels.reason }})"
          description: >-
            yuzu_inventory_read_degrade_total{reason="{{ $labels.reason }}"} is
            non-zero: a fleet/agent software query returned a degrade (no data)
            rather than a result. pool_acquire_timeout/query_error correlate with
            yuzu_pg_* saturation or outage; store_not_open means the store failed to
            open at boot. A fleet vulnerability query ("which devices run <CVE>")
            reads as degraded, NOT "installed nowhere" — do not trust a zero-result
            inventory answer while this fires.
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      - alert: YuzuInventoryIngestSlow
        # Leading indicator for ingest transaction-hold saturation: full-payload
        # ingests taking >10s. Distinct from the yuzu_pg_acquire_* family, which
        # measures time-to-GET a connection — this measures total txn hold
        # (incl. statement execution), so it fires even when the pool hands out
        # connections quickly but transactions run slow. The histogram buckets now
        # extend into the 10-60s range (#1686), so the saturation tail is resolved
        # into le=15/20/30/45/60 rather than collapsing into +Inf — the
        # +Inf-minus-le=10 complement below is an honest count of full ingests over
        # 10s, and histogram_quantile over the tail now yields a real p99. Fires
        # ahead of YuzuInventoryReadDegraded (sre).
        expr: |
          sum(rate(yuzu_inventory_ingest_duration_seconds_bucket{phase="full",le="+Inf"}[10m]))
          - sum(rate(yuzu_inventory_ingest_duration_seconds_bucket{phase="full",le="10"}[10m]))
          > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software full-payload ingests exceeding 10s"
          description: >-
            More than ~6/min full-payload inventory ingests are holding a Postgres
            connection >10s — a leading indicator of pool saturation under a
            need_full herd, ahead of read-path degradation. Correlate with
            yuzu_pg_pool_waiters and yuzu_pg_acquire_wait_seconds.
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      # Recording rule (#1686): now that yuzu_inventory_ingest_duration_seconds
      # carries 10-60s buckets, histogram_quantile over the tail yields a REAL p99
      # (previously everything >10s collapsed into +Inf, so a quantile pinned at
      # +Inf). Precompute it per (source, phase) so dashboards — and any future
      # tighter ">30s critical" alert — read a cheap series instead of a fan-out
      # quantile at query time. `le` is kept in the by() set (required by
      # histogram_quantile). The [10m] window matches the sibling
      # YuzuInventoryIngestSlow over the same _bucket series: this metric is
      # daily-cadence (ADR-0016 per-agent phase spread), so a shorter window would
      # often see zero ingests on a quiet fleet → NaN gaps.
      - record: yuzu:inventory_ingest_duration_seconds:p99
        expr: |
          histogram_quantile(
            0.99,
            sum by (source, phase, le) (
              rate(yuzu_inventory_ingest_duration_seconds_bucket[10m])
            )
          )
      - alert: YuzuInventoryStaleCountUnavailable
        # The stale-agents freshness count could not be computed (pool saturation
        # or query timeout) on the metrics sweep, so yuzu_inventory_stale_agents is
        # FROZEN at its prior value — a low reading may be stale, not genuine. This
        # is the freeze-detector that travels with the gauge: the 250ms count
        # acquire can expire under moderate contention while the 3000ms read budget
        # still clears, so YuzuInventoryReadDegraded may stay dormant (sre UP-3).
        # Fleet-size-independent, so it ships ACTIVE (unlike YuzuInventoryStaleAgents).
        expr: |
          rate(yuzu_inventory_stale_count_unavailable_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software freshness gauge may be frozen"
          description: >-
            yuzu_inventory_stale_count_unavailable_total is rising: the freshness
            count keeps timing out, so yuzu_inventory_stale_agents is held at its
            last value and may read healthy during an actual outage. Investigate
            Postgres pool saturation (yuzu_pg_pool_waiters, yuzu_pg_acquire_wait_seconds).
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      - alert: YuzuInventoryCatalogRollupStale
        # The /inventory Software-tab catalogue is a precomputed rollup refreshed hourly
        # by the SoftwareCatalogRollup thread. If recomputes stop succeeding (PG outage /
        # the 60s recompute budget exceeded at fleet scale), keep-last-good keeps serving
        # the PRIOR rollup — the page's "updated N ago" stamp ages but there is no
        # automated signal otherwise, and a stale catalogue under-reports a title that
        # hasn't rolled up yet. `> 0` GUARD IS LOAD-BEARING: last_success_timestamp is
        # seeded to 0 (epoch 1970, the "building" sentinel) at thread start, so a naive
        # `now - ts` fires immediately on every cold boot; the guard skips the building
        # window. The never-succeeded / ongoing-failure case is covered by the error-rate
        # alert below, NOT this rule.
        expr: |
          (time() - yuzu_inventory_catalog_rollup_last_success_timestamp) > 7200
          and yuzu_inventory_catalog_rollup_last_success_timestamp > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software catalogue rollup is stale"
          description: >-
            The /inventory catalogue rollup has not refreshed in over 2h (cadence is 1h).
            Keep-last-good is serving an aging catalogue; counts may under-report recent
            installs. Check yuzu_inventory_catalog_rollup_total{outcome="error"} and the
            SoftwareCatalogRollup thread log (Postgres outage or the 60s recompute budget
            exceeded at scale — raise kRollupStatementTimeout or shard the rollup).
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      - alert: YuzuInventoryCatalogRollupFailing
        # Catches the case the staleness alert's `> 0` guard deliberately skips: a server
        # whose recomputes keep FAILING (incl. one that has never succeeded, last_success
        # still 0). A sustained error rate means the catalogue is building/stale with no
        # success to age off.
        expr: |
          sum(rate(yuzu_inventory_catalog_rollup_total{outcome="error"}[15m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Installed-software catalogue rollup recomputes are failing"
          description: >-
            yuzu_inventory_catalog_rollup_total{outcome="error"} is rising: the catalogue
            rollup thread cannot complete a recompute. If last_success_timestamp is still 0
            the catalogue has never populated ("building"); otherwise it is frozen at the
            last good rollup. Investigate Postgres availability / the recompute duration
            (yuzu_inventory_catalog_rollup_duration_seconds vs the 60s budget).
          runbook_url: "https://docs.yuzu.io/runbooks/inventory-ingest"
      # YuzuInventoryStaleAgents — SHIPPED DISABLED. The freshness gauge
      # (yuzu_inventory_stale_agents{source}) is exported and graphable, but there
      # is no fleet-size-independent absolute threshold: >50 is day-one noise on a
      # 100-device pilot (a weekend of offline laptops) and 0.1% ambient churn on a
      # 50k fleet (desensitising). A fleet-relative ratio against
      # yuzu_fleet_agents_healthy needs explicit on()/group_left() vector matching
      # (the label sets differ) and a denominator caveat (offline agents drop
      # "healthy"), so there is no clean self-calibrating form. ENABLE this rule
      # once you have observed your fleet's normal stale-count baseline and set the
      # threshold to ~5-10% of your expected active fleet. Correlate with
      # yuzu_fleet_agents_healthy to separate "agents offline" from "sync source broken".
