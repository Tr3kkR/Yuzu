  # ── yuzu-postgres — server storage substrate (#1320 PR 3) ──────────────
  # The server fails closed without PostgreSQL, so substrate health is
  # service-affecting. These fire BEFORE /readyz starts returning 503, giving
  # the operator lead time. Metrics come from the pool's Observer feed.
  - name: yuzu-postgres
    rules:
      - alert: YuzuPgConnectFailing
        # The connect-failure circuit breaker has armed — the database is
        # unreachable. /readyz reports not-ready off the same signal.
        expr: |
          rate(yuzu_pg_connect_failed_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Yuzu cannot connect to PostgreSQL (breaker armed)"

      - alert: YuzuPgPoolSaturated
        # >90% of the pool leased for 5m — acquire timeouts (and heartbeat
        # upsert skips) are imminent. Raise --postgres-pool-size or scale.
        expr: |
          yuzu_pg_pool_in_use / yuzu_pg_pool_size > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Yuzu PostgreSQL pool >90% saturated"

      - alert: YuzuPgAcquireWaitHigh
        # p99 acquire wait > 200ms — the leading saturation indicator; the
        # heartbeat upsert deadline is 250ms, so persistence starts to drop here.
        expr: |
          histogram_quantile(0.99, rate(yuzu_pg_acquire_wait_seconds_bucket[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Yuzu PostgreSQL pool acquire p99 > 200ms"
