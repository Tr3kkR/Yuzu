# Yuzu Prometheus Configuration
#
# Agent metrics are NOT scraped directly — they piggyback on heartbeats
# and are aggregated by the server as yuzu_fleet_* gauges.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Yuzu Server — exposes server + fleet-aggregated agent metrics
  - job_name: 'yuzu-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          component: 'server'

  # Yuzu Gateway — Erlang gateway node metrics (one target per node)
  # For production with multiple nodes, use dns_sd_configs or consul_sd_configs.
  - job_name: 'yuzu-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:9568']
        labels:
          component: 'gateway'
