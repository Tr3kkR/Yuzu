# Prometheus config for full-Docker UAT
# Server and gateway are Docker containers on the same compose network.

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'yuzu-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['server:8080']
        labels:
          component: 'server'

  - job_name: 'yuzu-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gateway:9568']
        labels:
          component: 'gateway'
