# Yuzu Full-Docker UAT — Server (gateway mode) + Gateway + Prometheus + Grafana + ClickHouse
#
# Gateway deployment: agents connect to the gateway on :50051.
# Server runs in gateway mode — no direct agent connections.
# Only the agent runs natively on the host.
#
# Network topology:
#   Agent (native, host) --> Gateway(:50051) --> Server(:50055)
#   Server --> Gateway(:50063) --> Agent  (command fanout)
#   Server --> ClickHouse(:8123)          (analytics)
#   Prometheus --> Server(:8080) + Gateway(:9568)  (metrics)
#   Grafana --> Prometheus + ClickHouse   (dashboards)

services:
  # ── Yuzu Server (gateway mode) ─────────────────────────────────────────
  server:
    image: yuzu-server:latest
    container_name: yuzu-uat-server
    command:
      - "--listen"
      - "0.0.0.0:50051"
      - "--no-tls"
      - "--no-https"
      - "--gateway-upstream"
      - "0.0.0.0:50055"
      - "--gateway-mode"
      - "--gateway-command-addr"
      - "gateway:50063"
      - "--web-address"
      - "0.0.0.0"
      - "--web-port"
      - "8080"
      - "--log-level"
      - "info"
      - "--metrics-no-auth"
      - "--config"
      - "/etc/yuzu/yuzu-server.cfg"
      - "--data-dir"
      - "/var/lib/yuzu"
      - "--clickhouse-url"
      - "http://clickhouse:8123"
      - "--clickhouse-database"
      - "yuzu"
      - "--clickhouse-table"
      - "yuzu_events"
      - "--clickhouse-user"
      - "default"
      - "--analytics-drain-interval"
      - "5"
      - "--analytics-batch-size"
      - "50"
    environment:
      # Postgres substrate DSN (ADR-0006, #1318) — inert until #1320 wires
      # the server-side consumer; env var (not CLI flag) on purpose because
      # the current binary rejects unknown flags.
      - YUZU_POSTGRES_DSN=postgresql://yuzu:${YUZU_POSTGRES_PASSWORD:-yuzu}@postgres:5432/yuzu
    ports:
      - "8080:8080"     # Web dashboard + REST API
      - "50052:50052"   # gRPC (management)
      - "50055:50055"   # gRPC (gateway upstream — internal)
    volumes:
      - ${UAT_CONFIG}:/etc/yuzu/yuzu-server.cfg:ro
      - server-data:/var/lib/yuzu
      # InstructionDefinitions are embedded into yuzu-server at build time
      # (server/core/scripts/embed_content.py); no host mount required.
    depends_on:
      clickhouse:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (server storage substrate, ADR-0006) ────────────────────
  postgres:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.postgres
    image: yuzu-postgres:local
    container_name: yuzu-uat-postgres
    environment:
      - POSTGRES_PASSWORD=${YUZU_POSTGRES_PASSWORD:-yuzu}
    volumes:
      - postgres-uat-data:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces TCP — the init-phase temporary server is
      # unix-socket-only, so a socket probe could pass mid-init.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U yuzu -d yuzu"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ── Erlang Gateway ─────────────────────────────────────────────────────
  gateway:
    image: yuzu-gateway:latest
    container_name: yuzu-uat-gateway
    environment:
      - YUZU_GW_UPSTREAM_ADDR=server
      # #659: ephemeral UAT stack — accept the default cookie (single gateway, no clustering).
      - YUZU_GW_ALLOW_DEFAULT_COOKIE=1
    ports:
      - "50051:50051"   # gRPC (agent-facing — agents connect here)
      - "50063:50063"   # gRPC (management/command forwarding)
      - "9568:9568"     # Prometheus metrics
      - "8081:8081"     # Health/readiness
    volumes:
      - ./gateway-sys.config:/opt/yuzu_gw/releases/0.2.0/sys.config:ro
    depends_on:
      - server
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.1@sha256:6927e0919a144aa7616fd0137d4816816d42f6b816de3af269ab065250859a62
    container_name: yuzu-uat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus-full-uat.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-uat-data:/prometheus
    restart: unless-stopped

  # ── ClickHouse ─────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.12@sha256:a65ca89ddbe8e04a05036dd7d7110a203256293b407b9359130ed5e4333f45ff
    container_name: yuzu-uat-clickhouse
    ports:
      - "8123:8123"     # HTTP interface
      - "9000:9000"     # Native TCP
    environment:
      - CLICKHOUSE_DB=yuzu
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - ../clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - clickhouse-uat-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.2@sha256:8b37a2f028f164ce7b9889e1765b9d6ee23fec80f871d156fbf436d6198d32b7
    container_name: yuzu-uat-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/yuzu-dashboard.json
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ${UAT_DASHBOARDS:-../grafana}:/var/lib/grafana/dashboards:ro
      - grafana-uat-data:/var/lib/grafana
    depends_on:
      - prometheus
      - clickhouse
    restart: unless-stopped

volumes:
  server-data:
  postgres-uat-data:
  prometheus-uat-data:
  grafana-uat-data:
  clickhouse-uat-data:
