# Yuzu Development Stack — Docker Compose
#
# Usage:
#   cd deploy/docker
#   docker compose up -d          # start all
#   docker compose logs -f        # follow logs
#   docker compose down           # stop all
#
# Dashboard: http://localhost:8080
# Grafana:   http://localhost:3000 (admin/admin)
# Prometheus: http://localhost:9090

services:
  # ── Yuzu Server ──────────────────────────────────────────────────────
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    ports:
      - "8080:8080"     # Web dashboard + REST API
      - "50054:50054"   # gRPC (direct agent connections)
      - "50052:50052"   # gRPC (management)
      - "50055:50055"   # gRPC (gateway upstream)
    volumes:
      - server-data:/var/lib/yuzu
    restart: unless-stopped

  # ── Erlang Gateway ──────────────────────────────────────────────────
  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.gateway
    ports:
      - "50051:50051"   # gRPC (agent-facing)
      - "9568:9568"     # Prometheus metrics
    depends_on:
      - server
    restart: unless-stopped

  # ── Yuzu Agent ──────────────────────────────────────────────────────
  agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    command: ["--server", "server:50054", "--no-tls", "--plugin-dir", "/usr/lib/yuzu/plugins", "--data-dir", "/var/lib/yuzu-agent"]
    volumes:
      - agent-data:/var/lib/yuzu-agent
    depends_on:
      - server
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/yuzu-dashboard.json
    volumes:
      - ../grafana:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  server-data:
  agent-data:
  prometheus-data:
  grafana-data:
