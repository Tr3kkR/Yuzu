# Yuzu Development Stack — Docker Compose
#
# Standalone server + agent — works out of the box, no gateway needed.
# For gateway deployments, see docker-compose.full-uat.yml.
#
# Usage:
#   cd deploy/docker
#   docker compose up -d          # start all
#   docker compose logs -f        # follow logs
#   docker compose down           # stop all
#
# Dashboard: http://localhost:8080
# Grafana:   http://localhost:3000 (admin/admin)
# Prometheus: http://localhost:9090

services:
  # ── Yuzu Server ──────────────────────────────────────────────────────
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    ports:
      - "8080:8080"     # Web dashboard + REST API
      - "50051:50051"   # gRPC (agent connections)
      - "50052:50052"   # gRPC (management)
    volumes:
      - server-data:/var/lib/yuzu
    restart: unless-stopped

  # ── Yuzu Agent ──────────────────────────────────────────────────────
  agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    command: ["--server", "server:50051", "--no-tls", "--plugin-dir", "/usr/lib/yuzu/plugins", "--data-dir", "/var/lib/yuzu-agent"]
    volumes:
      - agent-data:/var/lib/yuzu-agent
    depends_on:
      - server
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.1@sha256:6927e0919a144aa7616fd0137d4816816d42f6b816de3af269ab065250859a62
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.2@sha256:8b37a2f028f164ce7b9889e1765b9d6ee23fec80f871d156fbf436d6198d32b7
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/yuzu-dashboard.json
    volumes:
      - ../grafana:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  server-data:
  agent-data:
  prometheus-data:
  grafana-data:
