# Yuzu Development Stack — Docker Compose
#
# Server-only stack — works out of the box, no gateway needed.
# For gateway deployments, see docker-compose.full-uat.yml.
#
# Agents always run natively on each managed endpoint and are NOT
# included here. To smoke-test agent ↔ server connectivity, run a
# native agent via `bash scripts/linux-start-UAT.sh` against this
# stack, or install one of the platform packages (.deb/.rpm/.exe/.pkg)
# from the GitHub release.
#
# Usage:
#   cd deploy/docker
#   docker compose up -d          # start all
#   docker compose logs -f        # follow logs
#   docker compose down           # stop all
#
# Dashboard: http://localhost:8080
# Grafana:   http://localhost:3000 (admin/admin)
# Prometheus: http://localhost:9090

services:
  # ── Yuzu Server ──────────────────────────────────────────────────────
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    ports:
      - "8080:8080"     # Web dashboard + REST API
      - "50051:50051"   # gRPC (agent connections)
      - "50052:50052"   # gRPC (management)
    environment:
      # Postgres substrate DSN (ADR-0006/0007, #1318). The server does not
      # consume this yet — #1320 wires the --postgres-dsn / env plumbing —
      # so today it is inert and the server still boots without Postgres.
      # Env var (not a CLI flag) on purpose: the current binary would
      # reject an unknown --postgres-dsn flag.
      YUZU_POSTGRES_DSN: postgresql://yuzu:${YUZU_POSTGRES_PASSWORD:-yuzu}@postgres:5432/yuzu
    volumes:
      - server-data:/var/lib/yuzu
    # File-descriptor headroom mirrors the systemd unit
    # (deploy/systemd/yuzu-server.service). The Docker default is 1024;
    # 65536 absorbs SSE EventSource fan-in + agent gRPC streams + SQLite
    # WAL + log handles for fleets up to ~50k agents.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (server storage substrate, ADR-0006) ─────────────────
  postgres:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.postgres
    image: yuzu-postgres:local
    environment:
      POSTGRES_PASSWORD: ${YUZU_POSTGRES_PASSWORD:-yuzu}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces a TCP probe — during first-boot init the
      # temporary server listens on the unix socket only, so a socket
      # probe would report ready before the init scripts have run.
      # -U yuzu -d yuzu also proves the app role/db exist.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U yuzu -d yuzu"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.1@sha256:6927e0919a144aa7616fd0137d4816816d42f6b816de3af269ab065250859a62
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.2@sha256:8b37a2f028f164ce7b9889e1765b9d6ee23fec80f871d156fbf436d6198d32b7
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/yuzu-dashboard.json
    volumes:
      - ../grafana:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  server-data:
  postgres-data:
  prometheus-data:
  grafana-data:
