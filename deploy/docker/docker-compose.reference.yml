## Yuzu — Reference Docker Compose template (single-server)
##
## SECURE BY DEFAULT (PKI #1289). The image auto-generates a per-install
## Certificate Authority + leaf certs on first boot and serves:
##   - the dashboard + REST API over HTTPS on 8443
##   - the agent / management gRPC listeners over (mutual) TLS
## No --no-tls/--no-https, no operator-supplied certs, and no manual steps are
## required to be encrypted + mutually authenticated out of the box.
##
## Two consequences to know:
##   1. The dashboard cert is signed by the per-install CA, so a browser shows
##      an "untrusted issuer" warning until you trust the CA. Download it from
##      the `certs` volume (default-ca.pem) or GET https://<host>:8443/api/v1/ca/root,
##      and import it into your trust store. The CA fingerprint is logged at
##      startup and surfaced at /health.
##   2. The certs live in the `certs` named volume below so the CA + leaves
##      (and therefore the trust your agents have) SURVIVE container
##      replacement / upgrades. Do not delete that volume.
##
## Bring-your-own-cert (optional): to use your own PKI instead of the built-in
## CA, mount your material into /etc/yuzu/certs and add
##   --https-cert /path --https-key /path --ca-cert /path (and --cert/--key for
## the gRPC listeners) to `command:` below. Or root the built-in CA in your
## enterprise PKI via Settings → Internal CA → "Subordinate this CA" (PR6).
##
## Gateway scale-out plane: this single-server reference does NOT include the
## Erlang gateway. For the multi-container (server + gateway + agents) TLS
## topology — which uses a shared /etc/yuzu/certs volume + `--cert-group` so the
## different-uid containers can read the shared certs — see
## docker-compose.reference-gateway.yml.
##
## ⚠  Still NOT a turnkey production deployment: set a strong admin password in
## yuzu-server.cfg, decide whether to bind the dashboard to 127.0.0.1 + front it
## with a reverse proxy, and review docs/user-manual/ before exposing it.
##
## Usage:
##   export YUZU_VERSION=0.12.0
##   # Two DISTINCT credentials — store both in your secrets manager. The
##   # superuser password stays inside the postgres service; the app role
##   # password is what the server's DSN carries. They must differ (the
##   # image's first-boot init refuses to run if they are equal).
##   export YUZU_POSTGRES_PASSWORD="$(openssl rand -hex 24)"   # postgres superuser
##   export YUZU_DB_PASSWORD="$(openssl rand -hex 24)"         # yuzu app role
##   docker compose -f docker-compose.reference.yml up -d
##   docker compose -f docker-compose.reference.yml logs -f server
##   # trust the CA, then browse https://localhost:8443/
##
## Upgrade (data + CA preserving):
##   export YUZU_VERSION=0.14.0     # pick the new release tag
##   docker compose -f docker-compose.reference.yml pull
##   docker compose -f docker-compose.reference.yml up -d
##
## The `server-data` and `certs` volumes survive container replacement; the
## server runs schema migrations automatically at startup. See
## docs/user-manual/upgrading.md.
##
## CAUTION: `docker compose down -v` deletes the `server-data`, `certs`, AND
## `postgres-data` volumes — i.e. ALL server state (credentials, agents, audit
## log, instruction history), the per-install CA (agents would then have to
## re-trust a freshly generated CA), and the entire database. Always back up
## before any destructive operation; don't `down -v` unless you intend to
## re-root the CA and wipe state.
##
## Backup (run from a dedicated backup directory so $PWD is predictable):
##   mkdir -p ~/yuzu-backups && cd ~/yuzu-backups
##   docker run --rm -v server-data:/data -v "$PWD":/backup alpine \
##     tar czf "/backup/yuzu-data-$(date +%F).tar.gz" -C /data .
##   # The CA + leaf certs — back these up too, or agents lose trust on re-root.
##   docker run --rm -v certs:/certs -v "$PWD":/backup alpine \
##     tar czf "/backup/yuzu-certs-$(date +%F).tar.gz" -C /certs .
##   # Postgres state: pg_dump through the database — consistent against a
##   # LIVE instance. Never tar the postgres-data volume while it runs (a
##   # torn pg_wal/ copy is unrecoverable).
##   docker exec yuzu-postgres pg_dump -U postgres --format=custom yuzu \
##     > "yuzu-pg-$(date +%F).dump"
##
## Restore (with server stopped):
##   docker compose -f docker-compose.reference.yml down server
##   docker run --rm -v server-data:/data -v "$PWD":/backup alpine \
##     tar xzf "/backup/yuzu-data-YYYY-MM-DD.tar.gz" -C /data
##   docker exec -i yuzu-postgres pg_restore --clean --if-exists --no-owner \
##     --role=yuzu -U postgres --dbname=yuzu < "yuzu-pg-YYYY-MM-DD.dump"
##   docker compose -f docker-compose.reference.yml up -d server
##
## Once envelope-encrypted secrets land (ADR-0010), the Postgres dump holds
## ciphertext + wrapped DEKs only — DB and KeyProvider keys-dir backups are
## a PAIR and must be restored together. Full procedure + pairing invariant:
## docs/user-manual/server-admin.md "PostgreSQL Substrate".

services:
  # ── Yuzu Server ──────────────────────────────────────────────────────
  server:
    image: ghcr.io/tr3kkr/yuzu-server:${YUZU_VERSION:-0.12.0}
    container_name: yuzu-server
    restart: unless-stopped
    # The image's default CMD is already secure (no --no-tls/--no-https): it
    # auto-generates the CA + leaves and serves HTTPS on 8443. Override `command:`
    # only to bring your own certs or change ports — see the header.
    ports:
      - "8443:8443"     # Dashboard + REST API (HTTPS)
      - "8080:8080"     # HTTP → HTTPS redirect
      - "50051:50051"   # Agent gRPC (mTLS; direct-connect agents)
      - "50052:50052"   # Management gRPC (mTLS)
    # File-descriptor headroom mirrors deploy/systemd/yuzu-server.service. The
    # Docker default soft limit (1024) is exhausted on a busy fleet by SSE +
    # agent gRPC streams + SQLite WAL + log handles. 65536 ≈ ~50k agents.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      # Postgres substrate DSN (ADR-0006/0007, #1318/#1320). The server now
      # REQUIRES Postgres and FAILS CLOSED (refuses to boot, exits non-zero)
      # if this DSN is unset or unreachable — there is no SQLite fallback for
      # the server (the agent stays SQLite). Pointing this at an external/
      # managed Postgres instead of the bundled service below is fully
      # supported — replace the whole DSN and drop the postgres service +
      # depends_on if you do.
      # The DSN carries the APP role password (YUZU_DB_PASSWORD), never the
      # superuser's — a leaked server environment must not disclose
      # superuser credentials.
      YUZU_POSTGRES_DSN: postgresql://yuzu:${YUZU_DB_PASSWORD:?set YUZU_DB_PASSWORD (app role password, distinct from YUZU_POSTGRES_PASSWORD; no insecure default in the reference template)}@postgres:5432/yuzu
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # All server state (SQLite DBs, yuzu-server.cfg, enrollment tokens, OTA
      # binaries). The default CMD points --config + --data-dir here, so it is
      # preserved across upgrades.
      - server-data:/var/lib/yuzu
      # The auto-generated CA + leaf certs. MUST persist so the CA (and the
      # trust your agents have in it) survives container replacement.
      - certs:/etc/yuzu/certs
    # Healthcheck: a bash /dev/tcp probe that the HTTPS listener (8443) is up.
    # MUST invoke `bash` explicitly — CMD-SHELL uses /bin/sh (dash), which does
    # NOT implement /dev/tcp. A bare TCP open is used (not an HTTP GET) because
    # the listener is TLS and the runtime image has no curl/openssl.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8443"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── PostgreSQL (server storage substrate, ADR-0006) ──────────────────
  # Release-pinned, signed yuzu-postgres image: PostgreSQL 18 + pgvector +
  # first-boot app role/db init. Per-store schemas are created at runtime
  # by the server's migration runner. Using an external/managed Postgres
  # instead is first-class — point YUZU_POSTGRES_DSN at it and remove this
  # service.
  postgres:
    image: ghcr.io/tr3kkr/yuzu-postgres:${YUZU_VERSION:-0.12.0}
    container_name: yuzu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${YUZU_POSTGRES_PASSWORD:?set YUZU_POSTGRES_PASSWORD (no insecure default in the reference template)}
      # App role password — DISTINCT from the superuser password above.
      # First-boot init refuses to run if they are equal or if this is
      # unset. The server's YUZU_POSTGRES_DSN carries this credential.
      YUZU_DB_PASSWORD: ${YUZU_DB_PASSWORD:?set YUZU_DB_PASSWORD (app role password, distinct from YUZU_POSTGRES_PASSWORD)}
      # PG18 defaults PGDATA to a version-pinned subdir (/var/lib/postgresql/18/
      # docker); pin it back to the mounted /data path so the data lands in the
      # named volume below (else PG18 treats the /data mount as unused and aborts).
      PGDATA: /var/lib/postgresql/data
    volumes:
      # Database state — same persistence rules as server-data: back it up,
      # never `down -v` unless you intend to destroy it.
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces a TCP probe — during first-boot init the
      # temporary server listens on the unix socket only, so a socket
      # probe would report ready before the init scripts have run.
      # pg_isready is the liveness baseline; the psql SELECT 1 over the
      # exact app DSN proves the app credential authenticates (PR #1334
      # review, S5). $$ defers expansion to the container's shell so the
      # password never appears in `docker compose config` output. The
      # psql leg dials the container's own hostname, NOT loopback:
      # initdb leaves 'trust' auth on 127.0.0.1, so only a non-loopback
      # connection actually verifies the password (scram).
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U yuzu -d yuzu && psql \"postgresql://yuzu:$${YUZU_DB_PASSWORD}@$$(hostname):5432/yuzu\" -tA -c 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── Yuzu Agent — install natively, not in Docker ─────────────────────
  #
  # Agents run natively on each managed endpoint (we do not publish a
  # production agent container). They connect over TLS by default and
  # auto-discover the install CA at /etc/yuzu/certs/default-ca.pem, or take
  # --ca-cert <path> / --server <host:port>. Install paths:
  #   Linux  — yuzu-agent_X.Y.Z_amd64.deb / .x86_64.rpm
  #   Windows — YuzuAgentSetup-X.Y.Z.exe (Authenticode-signed)
  #   macOS   — YuzuAgent-X.Y.Z-macos-arm64.pkg (notarized)
  # See docs/user-manual/agent-install.md.

volumes:
  # Server state — must persist across `docker compose down`.
  server-data:
  # The per-install CA + default leaves — must persist or agents lose trust on
  # every restart. See the header CAUTION about `down -v`.
  certs:
  # PostgreSQL data — same persistence rules; back it up, never `down -v`.
  postgres-data:
