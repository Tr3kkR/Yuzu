# Yuzu Viz-UAT — server + gateway + agent in containers, no analytics stack
#
# Minimal three-service compose for exercising the feat/viz-engine ladder:
#   * tar.fleet_snapshot action (PR 1)
#   * FleetTopologyStore (PR 2; not yet REST-exposed)
#   * Future PRs will exercise REST + dashboard renderer here
#
# Network topology:
#   Agent  --> Gateway(:50051)  --> Server(:50055)   (registration + heartbeats)
#   Server --> Gateway(:50063)  --> Agent            (command fanout)
#   Operator (host) --> Server(:8080)                (REST API + dashboard)
#
# All three images build for the host's architecture via TARGETARCH-driven
# Dockerfiles. On Apple Silicon (arm64) Docker buildx runs the build natively
# in a linux/arm64 VM. Same Dockerfiles produce x64 images on Linux x64 hosts.
#
# Usage:
#   bash scripts/start-viz-uat.sh           # build + start + verify
#   bash scripts/start-viz-uat.sh stop      # docker compose down -v
#   bash scripts/start-viz-uat.sh status    # ps + last logs
#
# Or directly:
#   YUZU_ENROLLMENT_TOKEN=<token> docker compose \
#     -f deploy/docker/docker-compose.viz-uat.yml up -d
#
# scripts/start-viz-uat.sh handles config generation + token issuance so the
# compose itself stays declarative.

services:
  # ── Yuzu Server (gateway mode, no analytics, no NVD sync) ───────────────
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    image: yuzu-server-viz-uat:latest
    container_name: yuzu-viz-server
    command:
      - "--listen"
      - "0.0.0.0:50051"
      - "--no-tls"
      - "--no-https"
      - "--gateway-upstream"
      - "0.0.0.0:50055"
      - "--gateway-mode"
      - "--gateway-command-addr"
      - "gateway:50063"
      - "--web-address"
      - "0.0.0.0"
      - "--web-port"
      - "8080"
      - "--log-level"
      - "info"
      - "--metrics-no-auth"
      - "--no-analytics"
      - "--no-nvd-sync"
      - "--no-ota"
      - "--config"
      - "/etc/yuzu/yuzu-server.cfg"
      - "--data-dir"
      - "/var/lib/yuzu"
    ports:
      - "8080:8080"   # Web dashboard + REST API (operator-facing)
      - "50055:50055" # Gateway upstream (debugging convenience)
    volumes:
      - ${VIZ_UAT_CONFIG:-./viz-uat/yuzu-server.cfg}:/etc/yuzu/yuzu-server.cfg:ro
      - server-data:/var/lib/yuzu
    healthcheck:
      # 127.0.0.1 not localhost (avoid IPv6-first resolve when server binds IPv4 only)
      test: ["CMD", "bash", "-c",
             "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /readyz HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  # ── Erlang Gateway ──────────────────────────────────────────────────────
  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.gateway
    image: yuzu-gateway-viz-uat:latest
    container_name: yuzu-viz-gateway
    ports:
      - "8081:8081"   # Health/readiness (operator-visible)
      - "9568:9568"   # Prometheus metrics
    volumes:
      - ./gateway-sys.config:/opt/yuzu_gw/releases/0.2.0/sys.config:ro
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (not localhost) — Alpine's getent resolves localhost to ::1
      # first; the Erlang health endpoint binds IPv4 only, so the IPv6 lookup
      # gets ECONNREFUSED.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  # ── Yuzu Agent ──────────────────────────────────────────────────────────
  # Connects to the gateway on :50051. The enrollment token is issued at
  # stack startup by scripts/start-viz-uat.sh (curl POST to the server's
  # /api/settings/enrollment-tokens) and passed in via the YUZU_ENROLLMENT_TOKEN
  # env var. Compose's :- default makes `up agent` fail clearly if the script
  # was bypassed.
  agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.agent
    image: yuzu-agent-viz-uat:latest
    environment:
      YUZU_ENROLLMENT_TOKEN: "${YUZU_ENROLLMENT_TOKEN:?set YUZU_ENROLLMENT_TOKEN before bringing up agent}"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        exec yuzu-agent \
          --server gateway:50051 \
          --no-tls \
          --plugin-dir /usr/lib/yuzu/plugins \
          --data-dir /var/lib/yuzu-agent \
          --log-level info \
          --enrollment-token "$$YUZU_ENROLLMENT_TOKEN"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  server-data:
