name: "Yuzu CodeQL config"

# Restrict the CodeQL alert surface to first-party code.
#
# Why both `paths` and `paths-ignore`:
#   For compiled languages, the build tracer extracts every TU it
#   observes — including #include'd vendored headers reached from a
#   first-party source file. `paths` and `paths-ignore` are applied
#   to alerts post-analysis. A previous iteration of this file (#471)
#   carried only `paths-ignore: vcpkg_installed/**`, and the
#   2026-04-26 scheduled scan still uploaded `cpp/...` alerts located
#   in `vcpkg_installed/x64-linux/include/...` and
#   `vcpkg_installed/x64-windows/include/...`. Empirically the
#   ignore-glob alone does not bound the SARIF for vendored headers
#   reached transitively. A positive `paths:` include list is the
#   reliable bound; the `paths-ignore` block stays as belt-and-braces
#   so the vendored/generated trees are documented in one place.
#
# Trees included (first-party C++ + actions YAML):
#   agents/, server/, sdk/, proto/, tests/  — Yuzu source
#   .github/                                 — actions language scans
#
# Trees excluded:
#   vcpkg_installed/  — vendored dependency headers (protobuf, abseil,
#     grpc, httplib, CLI11, Catch2, etc.); upstream bugs we cannot fix
#     in-tree and which would be erased by the next vcpkg cache rebuild.
#   build-*/          — per-OS Meson build trees (build-linux,
#     build-windows, build-macos, build-linux-codeql, etc.). Contains
#     generated .pb.cc / .pb.h files; findings are derivative of the
#     proto sources CodeQL already reads directly.
#   builddir*/        — legacy build tree names from before the per-OS
#     convention landed (kept for belt-and-braces; currently
#     .gitignored).
#   _build/           — rebar3 Erlang build dir.
#   **/*.pb.{cc,h}    — generated protobuf sources, in case any leak
#     into the first-party paths above.

paths:
  - agents
  - server
  - sdk
  - proto
  - tests
  - .github

paths-ignore:
  - vcpkg_installed/**
  - build-*/**
  - builddir*/**
  - _build/**
  - "**/*.pb.cc"
  - "**/*.pb.h"

# Drop pure-style "quality" rules that carry no security signal for a C++
# systems codebase and only generate noise. The `+security-and-quality`
# suite (chosen in codeql.yml because most C++ quality queries ARE
# security-adjacent — UAF, null deref, dead code hiding logic bugs) also
# pulls in documentation-completeness checks that don't apply here: we do
# not doc-comment every function, and that is a deliberate convention, not
# a defect. Excluding the query is cleaner than dismissing each instance.
query-filters:
  - exclude:
      id: cpp/poorly-documented-function
