version: 2
updates:
  # All Dependabot PRs target `dev` â€” that's Yuzu's integration branch.
  # `main` only receives devâ†’main reconcile PRs, so opening dependency
  # bumps against main would race the reconcile cadence and repeatedly
  # fail CI against a stale base (e.g. the LNK2038 Windows fix that
  # lived on dev for a day before the reconcile).
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    # After SHA-pinning every `uses:` ref (Scorecard PR #2), Dependabot
    # opens one PR per action per bump. Group them so related actions
    # ship together and weekly PR volume stays manageable.
    groups:
      actions-core:
        patterns:
          - "actions/*"
      docker-actions:
        patterns:
          - "docker/*"
      github-codeql:
        patterns:
          - "github/codeql-action/*"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/deploy/docker"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    cooldown:
      default-days: 7

  # Python tooling consumed by CI (meson, and whatever else lands in
  # requirements-ci.txt). vcpkg and rebar3 are covered by dedicated
  # scheduled workflows â€” see docs/dependency-updates.md.
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    cooldown:
      default-days: 7
