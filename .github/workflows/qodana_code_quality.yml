name: Qodana

on:
  # Only run on main merges and weekly — too expensive for every PR
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md', 'LICENSE', '.gitignore']
  schedule:
    - cron: '0 6 * * 1'  # Mondays at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Scorecard Token-Permissions baseline — every workflow must have a
# least-privilege top-level block. qodana reads the code and writes check
# runs only; contents stay read-only at workflow scope.
permissions:
  contents: read

jobs:
  qodana:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # pr-mode is false, so the action never opens/updates a PR — only
    # publishes the Checks-API result. contents/pull-requests writes were
    # unused and have been dropped.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1234984992 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
