name: CLA Assistant

# Yuzu dual-licenses its source (AGPL-3.0-or-later for the community edition
# and a commercial license for enterprise/). To preserve the right to ship
# under both licenses, every external contribution must be covered by a
# signed Contributor License Agreement (see ../CLA.md).
#
# This workflow uses contributor-assistant/github-action to comment on every
# pull request and require every commit author to sign the CLA before merge.
#
# ─────────────────────────────────────────────────────────────────────────
#  DISABLED UNTIL CLA_REPO_ACCESS_TOKEN IS PROVISIONED.
# ─────────────────────────────────────────────────────────────────────────
# To activate:
#   1. Create a GitHub Personal Access Token (classic) with `repo` scope
#      on an account that can write to this repository.
#   2. Add it as repository secret `CLA_REPO_ACCESS_TOKEN`.
#   3. Change the workflow-level `if:` guard below from `false` to
#      `github.repository == 'Tr3kkR/Yuzu'`.
#   4. Optionally create a separate private repo to store signatures
#      (recommended) and update `path-to-document` / `remote-repository-name`.
#
# Until those steps are completed, this workflow is a no-op. Merging PRs
# without a signed CLA in the pre-activation window locks those
# contributions into AGPL only (the Project Steward cannot relicense them
# under the commercial license). See CONTRIBUTING.md for how contributors
# should sign manually in the meantime.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

permissions:
  contents: read

jobs:
  cla-check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
      statuses: write
    # Deliberately disabled; flip to the live condition when ready.
    if: false
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope; required because GITHUB_TOKEN cannot write
          # to a repo other than the one triggering the workflow, and the
          # signatures store is conventionally a separate private repo.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_REPO_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/Tr3kkR/Yuzu/blob/main/CLA.md'
          branch: 'main'
          allowlist: Tr3kkR,dependabot[bot]
          remote-organization-name: Tr3kkR
          remote-repository-name: Yuzu-cla-signatures
          custom-notsigned-prcomment: |
            Thanks for your pull request! Before we can merge it, we need you to
            accept the Yuzu [Contributor License Agreement](https://github.com/Tr3kkR/Yuzu/blob/main/CLA.md).
            Please read the document, then reply to this comment with:
            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All CLA signatures are on file. Thank you!'
