name: Nightly

# Tier-3 of the CI overhaul plan (PR-6): sanitizers + coverage moved off the
# every-push critical path of ci.yml. Runs once a day at 06:00 UTC against
# the dev branch, with `workflow_dispatch` available for on-demand re-runs.
#
# On any failure the `alert` job opens or comments on a `nightly-broken`
# issue, mirroring the runner-inventory-sentinel pattern. The discipline
# norm is "no merge to main while `nightly-broken` is open" (documented
# in CLAUDE.md after this PR lands).
#
# Note: `sanitizer-tests.yml` remains the on-demand path for `/test --full`.
# It uses the same triplet + binary cache as the asan job here, so a fresh
# nightly run warms the cache for the next dispatched run.

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

env:
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  VCPKG_BINARY_SOURCES: "default"
  CCACHE_MAXSIZE: "30G"
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "1"

jobs:
  # ── Sanitizers (ASan + UBSan) ──────────────────────────────────────────
  sanitize-asan:
    name: "Sanitizers (ASan+UBSan)"
    # Pinned to Shulgi (yuzu-wsl2-linux). The ASan triplet (x64-linux-asan)
    # is a forced cold-cache rebuild every run because per-instrumentation
    # vcpkg packages can't be safely shared with the standard triplet — so
    # the ASan job rebuilds the full dep tree from source on every nightly.
    # On the small cloud runner (scw-eager-lumiere) that step alone runs
    # 60+ minutes and routinely blows the 60-min job timeout. Shulgi
    # (16-core 5950X) clears the same workload in ~15 min. TSan and
    # Coverage share the warm x64-linux triplet cache so they don't need
    # pinning and keep the runner pool flexible.
    runs-on: [self-hosted, Linux, X64, yuzu-shulgi]
    timeout-minutes: 60
    env:
      # detect_odr_violation=0 mirrors ci.yml's matrix linux: gRPC's
      # libgpr.so embeds a static copy of abseil's kToUpper while the
      # application links abseil dynamically. Re-enable when gpr's
      # vcpkg port stops vendoring abseil.
      ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:detect_odr_violation=0"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

    steps:
      - name: Wipe build-linux-asan/ on branch switch (pre-checkout)
        run: |
          incoming="${GITHUB_REF#refs/heads/}"
          if [[ -d "$GITHUB_WORKSPACE/.git" ]]; then
            current=$(git -C "$GITHUB_WORKSPACE" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
            if [[ -n "$current" && "$current" != "HEAD" && "$current" != "$incoming" ]]; then
              echo "branch switch: $current -> $incoming — wiping build-linux-asan/"
              rm -rf "$GITHUB_WORKSPACE/build-linux-asan"
            fi
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          pip3 install --user --break-system-packages --require-hashes -r requirements-ci.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # OTP + rebar3 for the gateway custom_target. Without these, this
      # job inherits whatever Erlang the self-hosted runner has globally,
      # which on the WSL2 runner has previously been older than the
      # rebar3 binary on PATH — producing BEAM-loader failures of the
      # form `op bs_add p x i u x: please re-compile this module with an
      # Erlang/OTP 28 compiler`. Pin matches ci.yml + release.yml so any
      # OTP bump moves all three workflows together.
      - name: Install Erlang/OTP and rebar3
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        env:
          ImageOS: ubuntu24
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Reset ccache stats
        run: ccache -z

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: vcpkg sentinel (x64-linux-asan)
        run: bash scripts/ci/vcpkg-triplet-sentinel.sh x64-linux-asan

      - name: Install vcpkg packages (ASan-instrumented)
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.tool_cache }}/yuzu-vcpkg-binary-cache-asan
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux-asan \
            --overlay-triplets=${{ github.workspace }}/triplets \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + ASan/UBSan)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux-asan/lib/pkgconfig
        run: |
          reconfig=""
          [[ -d build-linux-asan/meson-info ]] && reconfig="--reconfigure"
          meson setup $reconfig build-linux-asan \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-asan \
            -Dbuild_tests=true \
            -Db_sanitize=address,undefined

      - name: Build
        run: meson compile -C build-linux-asan

      - name: Test
        run: meson test -C build-linux-asan --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Upload meson testlog (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-testlog-asan
          path: |
            build-linux-asan/meson-logs/testlog.txt
            build-linux-asan/meson-logs/testlog.junit.xml
          retention-days: 14
          if-no-files-found: warn

  # ── Sanitizers (TSan) ──────────────────────────────────────────────────
  sanitize-tsan:
    name: "Sanitizers (TSan)"
    # Pinned to Shulgi (yuzu-wsl2-linux). Same compute argument as the
    # ASan job: the TSan triplet (x64-linux-tsan, issue #917) is a forced
    # cold-cache rebuild every run because per-instrumentation vcpkg
    # packages can't be safely shared with the standard or ASan triplets.
    # On scw-eager-lumiere (small Scaleway VM) the from-source dep-tree
    # rebuild blows the 60-min job timeout; Shulgi (16-core 5950X) clears
    # the same workload in ~15 min.
    runs-on: [self-hosted, Linux, X64, yuzu-shulgi]
    timeout-minutes: 60
    env:
      TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"

    steps:
      - name: Wipe build-linux-tsan/ on branch switch (pre-checkout)
        run: |
          incoming="${GITHUB_REF#refs/heads/}"
          if [[ -d "$GITHUB_WORKSPACE/.git" ]]; then
            current=$(git -C "$GITHUB_WORKSPACE" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
            if [[ -n "$current" && "$current" != "HEAD" && "$current" != "$incoming" ]]; then
              echo "branch switch: $current -> $incoming — wiping build-linux-tsan/"
              rm -rf "$GITHUB_WORKSPACE/build-linux-tsan"
            fi
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          pip3 install --user --break-system-packages --require-hashes -r requirements-ci.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # OTP + rebar3 for the gateway custom_target. Without these, this
      # job inherits whatever Erlang the self-hosted runner has globally,
      # which on the WSL2 runner has previously been older than the
      # rebar3 binary on PATH — producing BEAM-loader failures of the
      # form `op bs_add p x i u x: please re-compile this module with an
      # Erlang/OTP 28 compiler`. Pin matches ci.yml + release.yml so any
      # OTP bump moves all three workflows together.
      - name: Install Erlang/OTP and rebar3
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        env:
          ImageOS: ubuntu24
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Reset ccache stats
        run: ccache -z

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: vcpkg sentinel (x64-linux-tsan)
        run: bash scripts/ci/vcpkg-triplet-sentinel.sh x64-linux-tsan

      - name: Install vcpkg packages (TSan-instrumented)
        env:
          # Dedicated per-triplet binary cache. TSan-instrumented
          # packages can't share the standard x64-linux cache or the
          # x64-linux-asan cache — different sanitizer flag sets produce
          # different shadow-memory ABIs. Issue #917 / #569.
          VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.tool_cache }}/yuzu-vcpkg-binary-cache-tsan
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux-tsan \
            --overlay-triplets=${{ github.workspace }}/triplets \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + TSan)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux-tsan/lib/pkgconfig
        run: |
          reconfig=""
          [[ -d build-linux-tsan/meson-info ]] && reconfig="--reconfigure"
          meson setup $reconfig build-linux-tsan \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-tsan \
            -Dbuild_tests=true \
            -Db_sanitize=thread

      - name: Build
        run: meson compile -C build-linux-tsan

      - name: Test
        run: meson test -C build-linux-tsan --print-errorlogs

      - name: Capture stack trace under gdb (#438 diagnostic)
        # The TSan nightly fails with a bare SIGSEGV (no TSan report) in the
        # server unit suite — instrumentation-sensitive, not the originally-
        # documented #438 httplib mechanism (whose fix landed in 7bd823e and is
        # already in main). Re-run the failing binary under gdb so the next
        # nightly captures a real all-thread backtrace at the crash site.
        # Best-effort: SIGSEGV reproduction is Catch2-shuffle-dependent, so we
        # replay the seed the meson run used when extractable.
        if: failure()
        run: |
          sudo apt-get install -y gdb >/dev/null 2>&1 || true
          if ! command -v gdb >/dev/null; then
            echo "gdb unavailable on this runner — skipping stack capture"
            exit 0
          fi
          cd build-linux-tsan
          seed=$(grep -oE 'Randomness seeded to: [0-9]+' meson-logs/testlog.txt 2>/dev/null | head -1 | awk '{print $NF}') || true
          if [ -n "$seed" ]; then
            echo "replaying Catch2 seed: $seed"
            seed_args="--rng-seed $seed --order rand"
          else
            seed_args="--order rand"
          fi
          export TSAN_OPTIONS="halt_on_error=1:second_deadlock_stack=1"
          # gdb's default SIGSEGV disposition (stop + don't pass to inferior)
          # leaves us at the crashing frame; subsequent commands then dump
          # every thread's stack plus the crashing thread's registers.
          gdb -batch \
            -ex 'set pagination off' \
            -ex 'set print thread-events off' \
            -ex 'set backtrace limit 80' \
            -ex "run $seed_args" \
            -ex 'printf "\n=== thread backtraces (full) ===\n"' \
            -ex 'thread apply all bt full' \
            -ex 'printf "\n=== info registers ===\n"' \
            -ex 'info registers' \
            -ex 'quit' \
            ./tests/yuzu_server_tests 2>&1 | tee stack-capture.log || true
          if ! grep -qE 'received signal|SIGSEGV' stack-capture.log; then
            echo "(test binary did not crash this run — Catch2 shuffle non-determinism; re-dispatch nightly for another attempt)" >> stack-capture.log
          fi

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Upload meson testlog and stack capture (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-testlog-tsan
          path: |
            build-linux-tsan/meson-logs/testlog.txt
            build-linux-tsan/meson-logs/testlog.junit.xml
            build-linux-tsan/stack-capture.log
          retention-days: 14
          if-no-files-found: warn

  # ── Coverage (gcov + gcovr) ────────────────────────────────────────────
  coverage:
    name: "Coverage (GCC 13)"
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 60

    steps:
      - name: Wipe build-linux-coverage/ on branch switch (pre-checkout)
        run: |
          incoming="${GITHUB_REF#refs/heads/}"
          if [[ -d "$GITHUB_WORKSPACE/.git" ]]; then
            current=$(git -C "$GITHUB_WORKSPACE" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
            if [[ -n "$current" && "$current" != "HEAD" && "$current" != "$incoming" ]]; then
              echo "branch switch: $current -> $incoming — wiping build-linux-coverage/"
              rm -rf "$GITHUB_WORKSPACE/build-linux-coverage"
            fi
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          # requirements-ci.txt is hash-pinned (includes gcovr for the
          # coverage report).
          pip3 install --user --break-system-packages --require-hashes -r requirements-ci.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # OTP + rebar3 for the gateway custom_target. Without these, this
      # job inherits whatever Erlang the self-hosted runner has globally,
      # which on the WSL2 runner has previously been older than the
      # rebar3 binary on PATH — producing BEAM-loader failures of the
      # form `op bs_add p x i u x: please re-compile this module with an
      # Erlang/OTP 28 compiler`. Pin matches ci.yml + release.yml so any
      # OTP bump moves all three workflows together.
      - name: Install Erlang/OTP and rebar3
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        env:
          ImageOS: ubuntu24
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Reset ccache stats
        run: ccache -z

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: vcpkg sentinel (x64-linux)
        run: bash scripts/ci/vcpkg-triplet-sentinel.sh x64-linux

      - name: Install vcpkg packages
        env:
          # Coverage uses x64-linux triplet — package zips identical to
          # matrix linux so we share the cache.
          VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.tool_cache }}/yuzu-vcpkg-binary-cache-linux
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + coverage)
        # build-linux-coverage (not build-linux) so a coverage rebuild
        # can't disturb a concurrent ci.yml matrix linux build that
        # might otherwise queue behind it on the shared self-hosted
        # runner. Distinct from PR-1's per-OS naming because coverage
        # is a sanitizer-class job, not a tier-2 matrix variant.
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux/lib/pkgconfig
        run: |
          reconfig=""
          [[ -d build-linux-coverage/meson-info ]] && reconfig="--reconfigure"
          meson setup $reconfig build-linux-coverage \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux \
            -Dbuild_tests=true \
            -Db_coverage=true

      - name: Build
        run: meson compile -C build-linux-coverage

      - name: Test
        run: meson test -C build-linux-coverage --print-errorlogs

      - name: Generate coverage reports
        run: |
          # --gcov-ignore-parse-errors=negative_hits.warn: tests/unit/test_metrics_perf.cpp
          # runs hot concurrent writer loops that cause gcov's branch counters to race into
          # negative values. gcovr's own error message suggests this flag.
          gcovr --root . \
            --filter 'server/' --filter 'agents/' --filter 'sdk/' --filter 'tests/' \
            --exclude '.*\.pb\.(h|cc)$' \
            --branches \
            --gcov-ignore-parse-errors=negative_hits.warn \
            --xml -o build-linux-coverage/coverage.xml
          mkdir -p build-linux-coverage/coverage-html
          gcovr --root . \
            --filter 'server/' --filter 'agents/' --filter 'sdk/' --filter 'tests/' \
            --exclude '.*\.pb\.(h|cc)$' \
            --branches \
            --gcov-ignore-parse-errors=negative_hits.warn \
            --html --html-details -o build-linux-coverage/coverage-html/index.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: build-linux-coverage/coverage.xml
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build-linux-coverage/coverage-html/

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Upload meson testlog (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-testlog-coverage
          path: |
            build-linux-coverage/meson-logs/testlog.txt
            build-linux-coverage/meson-logs/testlog.junit.xml
          retention-days: 14
          if-no-files-found: warn

  # ── Alert on nightly failure ───────────────────────────────────────────
  # Opens or comments on the `nightly-broken` issue if any of the three
  # jobs above failed. The discipline rule is "no merge to main while
  # `nightly-broken` is open." Mirrors runner-inventory-sentinel.yml's
  # issue-creation pattern.
  alert:
    name: "Open nightly-broken on failure"
    needs: [sanitize-asan, sanitize-tsan, coverage]
    if: failure()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open or update nightly-broken issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REF_NAME: ${{ github.ref_name }}
        with:
          script: |
            const label = 'nightly-broken';
            const failedJobs = [];
            const ctx = ${{ toJSON(needs) }};
            for (const [name, job] of Object.entries(ctx)) {
              if (job.result === 'failure') failedJobs.push(name);
            }
            const summary = failedJobs.length
              ? failedJobs.join(', ')
              : 'unknown (alert fired without specific job failures)';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const sha = '${{ github.sha }}';
            const refName = process.env.REF_NAME;
            const body = [
              `Nightly run failed on \`${refName}\` @ \`${sha.substring(0, 7)}\`.`,
              ``,
              `**Failed jobs:** ${summary}`,
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `**Discipline:** no merge to main while this issue is open.`,
              ``,
              `(auto-posted by .github/workflows/nightly.yml — close after a green nightly.)`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 5,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
              core.notice(`Commented on existing nightly-broken issue #${existing.data[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Nightly broken: ${summary}`,
                labels: [label],
                body,
              });
              core.notice(`Opened nightly-broken issue #${created.data.number}`);
            }

  # ── Close nightly-broken on full green ─────────────────────────────────
  # Symmetric counterpart to the `alert:` job above. Closes any open
  # `nightly-broken` issue when all three nightly jobs (asan, tsan, coverage)
  # succeed, so the discipline rule "no merge to main while nightly-broken
  # is open" naturally clears as soon as the next green nightly lands.
  # Iterates over all matching open issues, not just the first, so a stale
  # duplicate from any prior bug doesn't linger.
  close-on-green:
    name: "Close nightly-broken on green"
    needs: [sanitize-asan, sanitize-tsan, coverage]
    if: success()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Close any open nightly-broken issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REF_NAME: ${{ github.ref_name }}
        with:
          script: |
            const label = 'nightly-broken';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const sha = '${{ github.sha }}';
            const refName = process.env.REF_NAME;
            const body = [
              `Nightly run on \`${refName}\` @ \`${sha.substring(0, 7)}\` is **fully green**.`,
              ``,
              `**Run:** ${runUrl}`,
              ``,
              `Closing this issue automatically. The "no merge to main" discipline rule clears.`,
              ``,
              `(auto-closed by .github/workflows/nightly.yml — re-opened automatically by the alert job if a future nightly fails.)`,
            ].join('\n');

            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 100,
            });

            if (open.data.length === 0) {
              core.notice('No open nightly-broken issues to close.');
              return;
            }

            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.notice(`Closed nightly-broken issue #${issue.number}`);
            }
