name: Instructions gate (Windows validate)

# One-shot workflow_dispatch to validate the instructions runner + plugin
# fixes (PR `feat/viz-engine` bucket A/B/D/E/F/C work) on a real Windows
# host without needing inbound SSH. Runs on the `yuzu-weetam-windows`
# self-hosted pool (Wee Tam), which polls GitHub over outbound HTTPS so
# corporate / guest WiFi that blocks Tailscale doesn't matter.
#
# Builds debug, stands up server + agent on non-default ports (host has
# iphlpsvc on :8080), runs the instructions gate against the live stack,
# uploads the per-instruction outcomes JSON as an artifact.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-instructions:
    name: Windows MSVC — Instructions gate
    runs-on: [self-hosted, Windows, X64, yuzu-weetam-windows]
    timeout-minutes: 60
    defaults:
      run:
        shell: 'C:\msys64\usr\bin\bash.exe --noprofile --norc -eo pipefail {0}'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Ensure Python deps (PyYAML for instructions_runner.py)
        run: |
          set -e
          # Runner has /c/Python314/python.exe and /c/msys64/usr/bin/python3.
          # instructions-tests.sh shells out to the MSYS2 python3, so PyYAML
          # must be available there.
          python3 -c "import yaml" 2>/dev/null && exit 0 || true
          if command -v pacman >/dev/null 2>&1; then
            pacman -S --noconfirm --needed python-yaml || pip install --no-warn-script-location pyyaml
          else
            pip install --no-warn-script-location pyyaml
          fi
          python3 -c "import yaml; print('PyYAML', yaml.__version__)"

      - name: Configure + build (debug)
        env:
          VCPKG_ROOT: C:\vcpkg
          CC: cl.exe
          CXX: cl.exe
        run: |
          set -e
          BUILDDIR="$GITHUB_WORKSPACE/build-windows-debug"
          if [ ! -f "$BUILDDIR/build.ninja" ]; then
            meson setup "$BUILDDIR" \
              --buildtype=debug \
              -Dcmake_prefix_path="$GITHUB_WORKSPACE/vcpkg_installed/x64-windows" \
              -Dbuild_tests=false
          fi
          meson compile -C "$BUILDDIR"

      - name: Generate server config (PBKDF2 admin)
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/yuzu-uat"
          /c/Python314/python.exe -c "
          import hashlib, os
          salt = os.urandom(16)
          dk = hashlib.pbkdf2_hmac('sha256', 'YuzuUatAdmin1!'.encode(), salt, 100000, dklen=32)
          print(f'admin:admin:{salt.hex()}:{dk.hex()}')
          " > "$RUNNER_TEMP/yuzu-uat/yuzu-server.cfg"

      - name: Start yuzu-server (web-port 18080)
        run: |
          set -e
          BUILDDIR="$GITHUB_WORKSPACE/build-windows-debug"
          UAT="$RUNNER_TEMP/yuzu-uat"
          mkdir -p "$UAT/agent-data"
          "$BUILDDIR/server/core/yuzu-server.exe" \
            --no-tls --no-https \
            --listen 127.0.0.1:50054 \
            --web-address 127.0.0.1 --web-port 18080 \
            --log-level info --metrics-no-auth \
            --rate-limit 2000 --login-rate-limit 200 \
            --config "$UAT/yuzu-server.cfg" \
            > "$UAT/server.log" 2>&1 &
          echo "server-pid=$!" >> "$GITHUB_ENV"
          # Ready poll — robust against curl -f killing the script
          i=0
          while [ $i -lt 60 ]; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://127.0.0.1:18080/health 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then echo "server ready at i=$i"; break; fi
            sleep 1; i=$((i+1))
          done
          if [ "$code" != "200" ]; then
            echo "::error::server never became ready"
            tail -50 "$UAT/server.log"
            exit 1
          fi

      - name: Mint enrollment token + start agent
        run: |
          set -e
          UAT="$RUNNER_TEMP/yuzu-uat"
          BUILDDIR="$GITHUB_WORKSPACE/build-windows-debug"
          curl -s -c "$UAT/cookies.txt" http://127.0.0.1:18080/login \
            -d 'username=admin&password=YuzuUatAdmin1!' -o /dev/null
          token_html=$(curl -s -b "$UAT/cookies.txt" \
            -X POST http://127.0.0.1:18080/api/settings/enrollment-tokens \
            -d 'label=ci-validate&max_uses=1000&ttl=86400')
          token=$(echo "$token_html" | grep -oE '[a-f0-9]{64}' | head -1)
          if [ -z "$token" ]; then
            echo "::error::failed to mint enrollment token"
            exit 1
          fi
          "$BUILDDIR/agents/core/yuzu-agent.exe" \
            --server 127.0.0.1:50054 --no-tls \
            --data-dir "$UAT/agent-data" \
            --plugin-dir "$BUILDDIR/agents/plugins" \
            --log-level info \
            --enrollment-token "$token" \
            > "$UAT/agent.log" 2>&1 &
          echo "agent-pid=$!" >> "$GITHUB_ENV"
          i=0
          while [ $i -lt 30 ]; do
            if grep -q "Registered with server" "$UAT/agent.log" 2>/dev/null; then
              echo "agent registered at i=$i"; break
            fi
            sleep 1; i=$((i+1))
          done
          grep -q "Registered with server" "$UAT/agent.log" || { echo "::error::agent did not register"; tail -30 "$UAT/agent.log"; exit 1; }

      - name: Run Instructions gate
        run: |
          set -e
          UAT="$RUNNER_TEMP/yuzu-uat"
          bash scripts/test/instructions-tests.sh \
            --dashboard http://127.0.0.1:18080 \
            --user admin --password 'YuzuUatAdmin1!' \
            --run-id ${{ github.run_id }} --gate-name instructions \
            --output "$UAT/instructions-outcomes.json"

      - name: Summarise outcomes
        if: always()
        run: |
          UAT="$RUNNER_TEMP/yuzu-uat"
          if [ -f "$UAT/instructions-outcomes.json" ]; then
            /c/Python314/python.exe -c "
          import json
          from collections import Counter
          d = json.load(open(r'$UAT/instructions-outcomes.json'.replace('/c/','C:/').replace('/','\\\\')))
          c = Counter(o['status'] for o in d['outcomes'])
          print('outcomes:', dict(c))
          fails = [o for o in d['outcomes'] if o['status'] in ('fail','error')]
          print('fails:', len(fails))
          for o in fails[:30]:
              print(' ', o['id'], '|', o.get('note',''))
          skips = [o for o in d['outcomes'] if o['status']=='skip']
          print('skips:', len(skips))
          for o in skips[:30]:
              print(' ', o['id'], '|', o.get('note',''))
          "
          fi

      - name: Upload outcomes + logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: instructions-windows-validate
          path: |
            ${{ runner.temp }}/yuzu-uat/instructions-outcomes.json
            ${{ runner.temp }}/yuzu-uat/server.log
            ${{ runner.temp }}/yuzu-uat/agent.log

      - name: Stop processes
        if: always()
        run: |
          taskkill //F //IM yuzu-agent.exe 2>/dev/null || true
          taskkill //F //IM yuzu-server.exe 2>/dev/null || true
