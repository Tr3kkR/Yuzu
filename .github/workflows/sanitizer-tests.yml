name: Sanitizer tests

# Workflow dispatched by scripts/test/sanitizer-gate.sh (Phase 6 of /test).
#
# Runs ASan+UBSan and TSan rebuilds + test suites on the yuzu-wsl2-linux
# self-hosted runner. The runner is on Nathan's desktop (WSL2 Ubuntu 24.04)
# per the memory note; sanitizer rebuilds are too slow to run on the
# operator's interactive dev box, so /test --full dispatches here instead.
#
# ASAN_OPTIONS / TSAN_OPTIONS mirror .github/workflows/ci.yml so local
# runs match CI semantics (any findings fail the job).
#
# Job results are surfaced via:
#   - exit codes (success/failure at the workflow level)
#   - sanitizer-asan.log / sanitizer-tsan.log artifacts (gate parser reads these)
#   - testlog.junit.xml artifacts (standard meson format)
#
# Note on dispatch: workflow_dispatch requires the workflow file to exist
# on the target ref. The gate passes --ref $(git rev-parse HEAD), so this
# file must be committed and pushed before /test --full can dispatch
# against a new commit.

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Which sanitizer to run (asan, tsan, both)"
        required: false
        default: "both"
        type: choice
        options: [asan, tsan, both]
      run_id:
        description: "/test run ID for correlation (appears in artifact names)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: sanitizer-tests-${{ github.ref }}
  cancel-in-progress: false

env:
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  CCACHE_MAXSIZE: "500M"
  CCACHE_COMPRESS: "true"

jobs:
  asan-ubsan:
    name: "Sanitizers (ASan+UBSan)"
    if: ${{ inputs.suite == 'asan' || inputs.suite == 'both' || inputs.suite == '' }}
    # Pinned to Shulgi: x64-linux-asan is a forced cold-cache rebuild and
    # the small cloud runner can't finish it inside the job timeout. CLAUDE.md
    # documents this workflow as intended for yuzu-wsl2-linux anyway —
    # adding the label makes the targeting explicit instead of relying on
    # whichever Linux X64 runner happens to be free.
    runs-on: [self-hosted, Linux, X64, yuzu-shulgi]
    timeout-minutes: 75
    env:
      # detect_odr_violation=0 mirrors ci.yml's sanitize-asan job: gRPC's
      # libgpr.so embeds a static copy of abseil's kToUpper while the
      # application links abseil dynamically (vcpkg port-linkage artefact),
      # so ASan otherwise aborts before any Yuzu test runs.
      ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:detect_odr_violation=0"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Assert toolchain available
        run: |
          # The self-hosted runner is long-lived on WSL2 and has its
          # toolchain baked in. Fail loudly if anything is missing so
          # the gate operator can fix the runner rather than accept
          # silent misconfiguration.
          for tool in meson ninja gcc-13 g++-13 ccache python3 bison flex; do
              if ! command -v "$tool" >/dev/null; then
                  echo "::error::$tool not on PATH on yuzu-wsl2-linux runner"
                  exit 1
              fi
          done
          # libsystemd-dev (sd-bus) is required to configure the agent — the Linux
          # Guardian systemd service guard links it. Fail loudly so the runner can be
          # provisioned rather than hitting an opaque meson configure error.
          if ! pkg-config --exists libsystemd; then
              echo "::error::libsystemd-dev (pkg-config 'libsystemd') missing on yuzu-wsl2-linux runner — sudo apt-get install -y libsystemd-dev"
              exit 1
          fi
          meson --version
          gcc-13 --version | head -1
          ccache --version | head -1

      # Install Erlang/OTP and rebar3. The self-hosted yuzu-wsl2-linux
      # runner has kerl installed for the `dornbrn` user but workflows
      # run as `github-runner`, so kerl is not on PATH and our
      # ensure-erlang.sh helper finds nothing. Use the same setup-beam
      # pattern as ci.yml / nightly.yml / release.yml — version pin
      # must move with them on any OTP bump. ImageOS env is required
      # because setup-beam can't auto-detect self-hosted OS.
      - name: Install Erlang/OTP and rebar3
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        env:
          ImageOS: ubuntu24
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      # sre-5: fail fast if the runner is out of disk before we sink
      # time into a 15-min compile that's going to die with ENOSPC.
      # Full sanitizer build + vcpkg + checkout + ccache ≈ 30 GB.
      - name: Assert runner disk (≥30 GB free)
        run: |
          free_gb=$(df -BG "$GITHUB_WORKSPACE" | awk 'NR==2 {gsub("G",""); print $4}')
          echo "runner disk free: ${free_gb}G on $GITHUB_WORKSPACE"
          if [[ -z "$free_gb" ]] || (( free_gb < 30 )); then
              echo "::error::runner disk ${free_gb}G < 30 GB required for sanitizer build"
              exit 1
          fi

      - name: Reset ccache stats
        run: ccache -z

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: vcpkg sentinel (x64-linux-asan)
        # Universal cache-key contract — see scripts/ci/vcpkg-triplet-sentinel.sh.
        run: bash scripts/ci/vcpkg-triplet-sentinel.sh x64-linux-asan

      - name: Install vcpkg packages (ASan-instrumented)
        # Use the x64-linux-asan overlay triplet (matches ci.yml's
        # sanitize-asan job) so vcpkg builds protobuf/abseil/grpc with
        # -fsanitize=address,undefined; the regular x64-linux binaries
        # would surface phantom use-after-poison at protobuf static
        # init and abort before any Yuzu test could execute.
        #
        # VCPKG_DEFAULT_BINARY_CACHE points at the SAME runner-local dir
        # that ci.yml's sanitize-asan populates, so the dispatched
        # /test --full path inherits the warm cache instead of
        # rebuilding all instrumented ports from source. Closes #441.
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.tool_cache }}/yuzu-vcpkg-binary-cache-asan
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux-asan \
            --overlay-triplets=${{ github.workspace }}/triplets \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + ASan/UBSan)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux-asan/lib/pkgconfig
        run: |
          rm -rf build-linux-asan
          meson setup build-linux-asan \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-asan \
            -Dbuild_tests=true \
            -Db_sanitize=address,undefined

      - name: Build (ASan+UBSan)
        run: meson compile -C build-linux-asan 2>&1 | tee sanitizer-asan-build.log

      - name: Test (ASan+UBSan)
        # Capture both stdout and the meson testlog as artifacts so the
        # gate parser can distinguish "build failed" from "one test
        # leaked 48 bytes". --no-stdsplit keeps ASan output interleaved
        # with the test harness output so the ERROR line is visible.
        run: |
          set -o pipefail
          meson test -C build-linux-asan --print-errorlogs --no-stdsplit \
              2>&1 | tee sanitizer-asan.log

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Upload ASan artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sanitizer-asan${{ inputs.run_id && format('-{0}', inputs.run_id) || '' }}
          path: |
            sanitizer-asan.log
            sanitizer-asan-build.log
            build-linux-asan/meson-logs/testlog.junit.xml
            build-linux-asan/meson-logs/testlog.txt
          if-no-files-found: warn

  tsan:
    name: "Sanitizers (TSan)"
    if: ${{ inputs.suite == 'tsan' || inputs.suite == 'both' || inputs.suite == '' }}
    # Pinned to Shulgi for the same reason as asan-ubsan: x64-linux-tsan
    # is a forced cold-cache rebuild every run (#917). CLAUDE.md documents
    # this workflow as intended for yuzu-wsl2-linux anyway.
    runs-on: [self-hosted, Linux, X64, yuzu-shulgi]
    timeout-minutes: 75
    env:
      TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Assert toolchain available
        run: |
          for tool in meson ninja gcc-13 g++-13 ccache python3 bison flex; do
              if ! command -v "$tool" >/dev/null; then
                  echo "::error::$tool not on PATH on yuzu-wsl2-linux runner"
                  exit 1
              fi
          done
          # libsystemd-dev (sd-bus) is required to configure the agent — the Linux
          # Guardian systemd service guard links it. Fail loudly so the runner can be
          # provisioned rather than hitting an opaque meson configure error.
          if ! pkg-config --exists libsystemd; then
              echo "::error::libsystemd-dev (pkg-config 'libsystemd') missing on yuzu-wsl2-linux runner — sudo apt-get install -y libsystemd-dev"
              exit 1
          fi
          meson --version
          gcc-13 --version | head -1
          ccache --version | head -1

      # Install Erlang/OTP and rebar3 (see ASan job for full rationale).
      - name: Install Erlang/OTP and rebar3
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        env:
          ImageOS: ubuntu24
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Assert runner disk (≥30 GB free)
        run: |
          free_gb=$(df -BG "$GITHUB_WORKSPACE" | awk 'NR==2 {gsub("G",""); print $4}')
          echo "runner disk free: ${free_gb}G on $GITHUB_WORKSPACE"
          if [[ -z "$free_gb" ]] || (( free_gb < 30 )); then
              echo "::error::runner disk ${free_gb}G < 30 GB required for sanitizer build"
              exit 1
          fi

      - name: Reset ccache stats
        run: ccache -z

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: vcpkg sentinel (x64-linux-tsan)
        # Universal cache-key contract — see scripts/ci/vcpkg-triplet-sentinel.sh.
        run: bash scripts/ci/vcpkg-triplet-sentinel.sh x64-linux-tsan

      - name: Install vcpkg packages (TSan-instrumented)
        # Dedicated x64-linux-tsan triplet (#917): TSan-instrumented
        # ports give TSan the visibility it needs into abseil/grpc/openssl
        # synchronization primitives. Without this, TSan-instrumented
        # consumer code passes through non-TSan library code and either
        # misses real races or hard-faults on shadow-memory collisions.
        # Per-triplet binary cache because TSan-flag compiled packages
        # can't share zips with the standard or ASan triplets.
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.tool_cache }}/yuzu-vcpkg-binary-cache-tsan
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux-tsan \
            --overlay-triplets=${{ github.workspace }}/triplets \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + TSan)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux-tsan/lib/pkgconfig
        run: |
          rm -rf build-linux-tsan
          meson setup build-linux-tsan \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-tsan \
            -Dbuild_tests=true \
            -Db_sanitize=thread

      - name: Build (TSan)
        run: meson compile -C build-linux-tsan 2>&1 | tee sanitizer-tsan-build.log

      - name: Build gai_sync_shim (TSan + glibc getaddrinfo_a workaround)
        # Mirrors the same shim used by nightly.yml's TSan job — see #438
        # for full context. cpp-httplib's non-blocking DNS path routes
        # through getaddrinfo_a(), which glibc implements via a clone3-
        # spawned helper thread that bypasses TSan's pthread_create
        # interceptor. Without this shim, /test --full crashes the TSan
        # suite the same way the nightly used to.
        run: |
          cat > /tmp/gai_sync_shim.c << 'SHIM_EOF'
          #define _GNU_SOURCE
          #include <netdb.h>
          #include <stddef.h>
          #include <signal.h>
          #include <time.h>

          int getaddrinfo_a(int mode, struct gaicb *list[], int nitems,
                             struct sigevent *sig) {
              (void)mode; (void)sig;
              for (int i = 0; i < nitems; ++i) {
                  if (!list[i]) continue;
                  list[i]->ar_result = NULL;
                  list[i]->__return = getaddrinfo(list[i]->ar_name,
                                                    list[i]->ar_service,
                                                    list[i]->ar_request,
                                                    &list[i]->ar_result);
              }
              return 0;
          }

          int gai_suspend(const struct gaicb *const list[], int nitems,
                           const struct timespec *timeout) {
              (void)list; (void)nitems; (void)timeout;
              return 0;
          }

          int gai_error(struct gaicb *req) {
              return req ? req->__return : 0;
          }

          int gai_cancel(struct gaicb *req) {
              (void)req;
              return EAI_NOTCANCELED;
          }
          SHIM_EOF
          gcc -shared -fPIC -O2 -Wall -Wextra \
            -o /tmp/libgai_sync_shim.so /tmp/gai_sync_shim.c
          file /tmp/libgai_sync_shim.so

      - name: Test (TSan)
        env:
          LD_PRELOAD: /tmp/libgai_sync_shim.so
        run: |
          set -o pipefail
          meson test -C build-linux-tsan --print-errorlogs --no-stdsplit \
              2>&1 | tee sanitizer-tsan.log

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Upload TSan artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sanitizer-tsan${{ inputs.run_id && format('-{0}', inputs.run_id) || '' }}
          path: |
            sanitizer-tsan.log
            sanitizer-tsan-build.log
            build-linux-tsan/meson-logs/testlog.junit.xml
            build-linux-tsan/meson-logs/testlog.txt
          if-no-files-found: warn
