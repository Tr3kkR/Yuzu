name: docs-site

# Builds and deploys the Yuzu docs/vision site (site/, raw Astro).
#   • Pull requests (to main or dev): build + diagram-alignment linter ONLY —
#     validates, never deploys. Eyeball locally with `npm run dev` in site/.
#   • Push to main: build + deploy to GitHub Pages.
# The HTML is a build artifact; only site/ SOURCE is committed. None of this
# touches the Meson/C++/Erlang app build.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - '.github/workflows/docs-site.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'site/**'
      - 'docs/**'
      - '.github/workflows/docs-site.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (diagram linter + astro + pagefind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Self-test the diagram linter
        working-directory: site
        run: npm run test:lint
      - name: Build (diagram-alignment linter gates the build)
        working-directory: site
        run: npm run build
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    name: deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
