name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing

env:
  MESON_VERSION: "1.9.2"
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite;nuget,https://nuget.pkg.github.com/Tr3kkR/index.json,readwrite"
  NUGET_SOURCE_URL: "https://nuget.pkg.github.com/Tr3kkR/index.json"

jobs:
  # ── Linux x64 release build ──────────────────────────────────────────
  build-linux:
    name: "Build Linux x64"
    runs-on: ubuntu-24.04
    container: ghcr.io/tr3kkr/yuzu-ci-linux:latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-linux-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-release-linux-

      - name: Reset ccache stats
        run: ccache -z

      - name: Link pre-built vcpkg packages
        run: |
          # Use packages pre-built in the Docker image
          if [ -d /opt/vcpkg_installed/x64-linux ]; then
            mkdir -p vcpkg_installed
            ln -s /opt/vcpkg_installed/x64-linux vcpkg_installed/x64-linux
            echo "Using pre-built vcpkg packages from Docker image"
          else
            echo "WARNING: Pre-built packages not found, falling back to vcpkg install"
            vcpkg install --triplet x64-linux --x-manifest-root=${{ github.workspace }}
          fi

      - name: Configure (Meson release + LTO)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
        run: |
          meson setup builddir \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=release \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux \
            -Dbuild_tests=false \
            -Db_lto=true

      - name: Build
        run: meson compile -C builddir

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Test (smoke)
        run: |
          ./builddir/server/core/yuzu-server --help || true
          ./builddir/agents/core/yuzu-agent --help || true

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          STAGING="yuzu-${VERSION}-linux-x64"
          mkdir -p "${STAGING}/bin" "${STAGING}/plugins" "${STAGING}/content/definitions"

          # Binaries
          cp builddir/server/core/yuzu-server "${STAGING}/bin/"
          cp builddir/agents/core/yuzu-agent "${STAGING}/bin/"

          # Agent core shared library
          find builddir -name 'libyuzu_agent_core.so*' -exec cp {} "${STAGING}/bin/" \;

          # Plugin shared libraries
          find builddir/agents/plugins -name '*.so' -exec cp {} "${STAGING}/plugins/" \;

          # Content definitions
          cp content/definitions/*.yaml "${STAGING}/content/definitions/"

          tar czf "yuzu-linux-x64.tar.gz" "${STAGING}"

      - name: Build .deb packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEB_VERSION="${VERSION/-/\~}"
          bash deploy/packaging/debian/build-deb.sh \
            --bin-dir builddir --version "$DEB_VERSION" --output .

      - name: Build .rpm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RPM_VERSION="${VERSION%%-*}"
          PRERELEASE="${VERSION#*-}"
          [ "$PRERELEASE" = "$VERSION" ] && PRERELEASE=""
          PRE_FLAG=""
          [ -n "$PRERELEASE" ] && PRE_FLAG="--prerelease $PRERELEASE"
          docker run --rm -v "$PWD:/build:z" fedora:40 bash -c "
            dnf install -y rpm-build systemd-rpm-macros
            cd /build
            bash deploy/packaging/rpm/build-rpm.sh \
              --bin-dir builddir --version $RPM_VERSION $PRE_FLAG --output .
          "

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-linux-x64
          path: yuzu-linux-x64.tar.gz
          retention-days: 3

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-linux-deb
          path: "*.deb"
          retention-days: 3

      - name: Upload .rpm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-linux-rpm
          path: "*.rpm"
          retention-days: 3

  # ── Linux ARM64 release build (cross-compile) ───────────────────────
  build-linux-arm64:
    name: "Build Linux ARM64"
    runs-on: ubuntu-24.04
    container: ghcr.io/tr3kkr/yuzu-ci-linux:latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-arm64-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-release-arm64-

      - name: Reset ccache stats
        run: ccache -z

      - name: Link pre-built vcpkg packages
        run: |
          if [ -d /opt/vcpkg_installed/arm64-linux ]; then
            mkdir -p vcpkg_installed
            ln -s /opt/vcpkg_installed/arm64-linux vcpkg_installed/arm64-linux
            echo "Using pre-built vcpkg packages from Docker image"
          else
            echo "WARNING: Pre-built packages not found, falling back to vcpkg install"
            vcpkg install --triplet arm64-linux --x-manifest-root=${{ github.workspace }}
          fi

      - name: Configure (Meson cross release + LTO)
        env:
          PKG_CONFIG_LIBDIR: ${{ github.workspace }}/vcpkg_installed/arm64-linux/lib/pkgconfig
        run: |
          meson setup builddir \
            --cross-file meson/cross/aarch64-linux-gnu.ini \
            --buildtype=release \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/arm64-linux \
            -Dbuild_tests=false \
            -Db_lto=true

      - name: Build
        run: meson compile -C builddir

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          STAGING="yuzu-${VERSION}-linux-arm64"
          mkdir -p "${STAGING}/bin" "${STAGING}/plugins" "${STAGING}/content/definitions"

          # Binaries
          cp builddir/server/core/yuzu-server "${STAGING}/bin/"
          cp builddir/agents/core/yuzu-agent "${STAGING}/bin/"

          # Agent core shared library
          find builddir -name 'libyuzu_agent_core.so*' -exec cp {} "${STAGING}/bin/" \;

          # Plugin shared libraries
          find builddir/agents/plugins -name '*.so' -exec cp {} "${STAGING}/plugins/" \;

          # Content definitions
          cp content/definitions/*.yaml "${STAGING}/content/definitions/"

          tar czf "yuzu-linux-arm64.tar.gz" "${STAGING}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-linux-arm64
          path: yuzu-linux-arm64.tar.gz
          retention-days: 3

  # ── Erlang gateway release build ──────────────────────────────────────
  build-gateway:
    name: "Build Gateway (Erlang)"
    runs-on: ubuntu-24.04
    container: ghcr.io/tr3kkr/yuzu-ci-gateway:latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Restore pre-built rebar3 dependencies
        run: |
          if [ -d /opt/rebar3_deps/_build ]; then
            cp -a /opt/rebar3_deps/_build gateway/_build
            echo "Restored pre-built rebar3 deps from Docker image"
          fi

      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: gateway/_build/default/*_plt*
          key: dialyzer-plt-otp27-${{ hashFiles('gateway/rebar.lock') }}
          restore-keys: |
            dialyzer-plt-otp27-

      - name: Compile gateway
        working-directory: gateway
        run: rebar3 compile

      - name: Run EUnit tests
        working-directory: gateway
        run: rebar3 eunit

      - name: Run Dialyzer
        working-directory: gateway
        run: rebar3 dialyzer

      - name: Build production release
        working-directory: gateway
        run: rebar3 as prod release

      - name: Package release tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          STAGING="yuzu-gateway-${VERSION}-linux-x64"
          mkdir -p "${STAGING}"
          cp -a gateway/_build/prod/rel/yuzu_gw/* "${STAGING}/"
          tar czf "yuzu-gateway-linux-x64.tar.gz" "${STAGING}"

      - name: Build .deb package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEB_VERSION="${VERSION/-/\~}"
          bash deploy/packaging/debian/build-gateway-deb.sh \
            --rel-dir gateway/_build/prod/rel/yuzu_gw \
            --version "$DEB_VERSION" --output .

      - name: Build .rpm package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RPM_VERSION="${VERSION%%-*}"
          PRERELEASE="${VERSION#*-}"
          [ "$PRERELEASE" = "$VERSION" ] && PRERELEASE=""
          PRE_FLAG=""
          [ -n "$PRERELEASE" ] && PRE_FLAG="--prerelease $PRERELEASE"
          docker run --rm -v "$PWD:/build:z" fedora:40 bash -c "
            dnf install -y rpm-build systemd-rpm-macros
            cd /build
            bash deploy/packaging/rpm/build-gateway-rpm.sh \
              --rel-dir gateway/_build/prod/rel/yuzu_gw \
              --version $RPM_VERSION $PRE_FLAG --output .
          "

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-gateway-linux-x64
          path: yuzu-gateway-linux-x64.tar.gz
          retention-days: 3

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-gateway-deb
          path: "*.deb"
          retention-days: 3

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-gateway-rpm
          path: "*.rpm"
          retention-days: 3

  # ── Windows x64 release build ────────────────────────────────────────
  build-windows:
    name: "Build Windows x64"
    runs-on: windows-2022
    timeout-minutes: 180
    env:
      HAS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT != '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Meson and ccache
        run: |
          pip install meson==${{ env.MESON_VERSION }}
          choco install ccache --yes --no-progress

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ccache
          key: ccache-release-windows-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-release-windows-

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-windows-static-md-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-windows-static-md-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure NuGet credentials
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $configDir = "$env:APPDATA\NuGet"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="github" value="$env:NUGET_SOURCE_URL" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="${{ github.repository_owner }}" />
                <add key="ClearTextPassword" value="$env:GITHUB_TOKEN" />
              </github>
            </packageSourceCredentials>
          </configuration>
          "@ | Set-Content "$configDir\NuGet.Config"

      - name: Install vcpkg packages
        run: |
          & "${{ github.workspace }}/vcpkg/vcpkg.exe" install `
            --triplet x64-windows-static-md `
            --x-manifest-root="${{ github.workspace }}"

      - name: Configure (Meson release)
        env:
          CC: ccache cl
          CXX: ccache cl
        run: |
          meson setup builddir `
            --buildtype=release `
            -Dcpp_std=vc++latest `
            -Ddefault_library=static `
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-windows-static-md `
            -Dbuild_tests=false

      - name: Build
        run: meson compile -C builddir

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Test (smoke)
        run: |
          & ./builddir/server/core/yuzu-server.exe --help
          & ./builddir/agents/core/yuzu-agent.exe --help
        continue-on-error: true

      - name: Sign binaries (Authenticode)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          # Decode the PFX certificate from base64 secret
          $certPath = "${{ runner.temp }}\signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT))

          # Find signtool.exe from the Windows SDK
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Error "signtool.exe not found"
            exit 1
          }
          Write-Host "Using signtool: $signtool"

          # Collect all EXE and DLL files to sign
          $filesToSign = @()
          $filesToSign += Get-ChildItem builddir -Filter "yuzu-server.exe" -Recurse
          $filesToSign += Get-ChildItem builddir -Filter "yuzu-agent.exe" -Recurse
          $filesToSign += Get-ChildItem builddir -Filter "yuzu_agent_core.dll" -Recurse
          $filesToSign += Get-ChildItem builddir/agents/plugins -Filter "*.dll" -Recurse

          foreach ($file in $filesToSign) {
            Write-Host "Signing: $($file.FullName)"
            & $signtool sign `
              /f $certPath `
              /p $env:WINDOWS_SIGNING_CERT_PASSWORD `
              /fd sha256 `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              /d "Yuzu Endpoint Management" `
              $file.FullName

            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to sign $($file.Name)"
              exit 1
            }

            # Verify signature
            & $signtool verify /pa /v $file.FullName
          }

          # Clean up certificate
          Remove-Item $certPath -Force

      - name: Package archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v").Replace("-", "_")
          $staging = "yuzu-${version}-windows-x64"
          New-Item -ItemType Directory -Force -Path "${staging}/bin", "${staging}/plugins", "${staging}/content/definitions"

          # Binaries
          Copy-Item "builddir/server/core/yuzu-server.exe" "${staging}/bin/"
          Copy-Item "builddir/agents/core/yuzu-agent.exe" "${staging}/bin/"

          # Agent core DLL
          Get-ChildItem -Path builddir -Filter "yuzu_agent_core.dll" -Recurse | Copy-Item -Destination "${staging}/bin/"

          # Plugin DLLs
          Get-ChildItem -Path builddir/agents/plugins -Filter "*.dll" -Recurse | Copy-Item -Destination "${staging}/plugins/"

          # Runtime DLLs from vcpkg that plugins/binaries need
          $vcpkgBin = "${{ github.workspace }}/vcpkg_installed/x64-windows/bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem -Path $vcpkgBin -Filter "*.dll" | Copy-Item -Destination "${staging}/bin/"
          }

          # Content definitions
          Copy-Item "content/definitions/*.yaml" "${staging}/content/definitions/"

          Compress-Archive -Path "${staging}" -DestinationPath "yuzu-windows-x64.zip"

      - name: Build Windows installer (InnoSetup)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v").Replace("-", "_")

          # Install InnoSetup 6
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "ISCC.exe not found after InnoSetup install"
            exit 1
          }

          # Compile the installer
          & $iscc `
            "/DAppVersion=${version}" `
            "/DBuildDir=${{ github.workspace }}\builddir" `
            "deploy\packaging\windows\yuzu-agent.iss"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "InnoSetup compilation failed"
            exit 1
          }

          # Move installer to workspace root for easy artifact upload
          $installer = "deploy\packaging\windows\output\YuzuAgentSetup-${version}.exe"
          Copy-Item $installer "YuzuAgentSetup-${version}.exe"
          Write-Host "Installer built: YuzuAgentSetup-${version}.exe ($('{0:N1} MB' -f ((Get-Item $installer).Length / 1MB)))"

      - name: Sign installer (Authenticode)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v").Replace("-", "_")
          $installer = "YuzuAgentSetup-${version}.exe"

          $certPath = "${{ runner.temp }}\signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          Write-Host "Signing installer: $installer"
          & $signtool sign `
            /f $certPath `
            /p $env:WINDOWS_SIGNING_CERT_PASSWORD `
            /fd sha256 `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            /d "Yuzu Agent Installer" `
            $installer

          & $signtool verify /pa $installer
          Remove-Item $certPath -Force

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-windows-x64
          path: yuzu-windows-x64.zip
          retention-days: 3

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-windows-installer
          path: YuzuAgentSetup-*.exe
          retention-days: 3

  # ── macOS ARM64 release build ────────────────────────────────────────
  build-macos:
    name: "Build macOS ARM64"
    runs-on: macos-14
    timeout-minutes: 30
    env:
      HAS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT != '' }}
      HAS_NOTARIZATION: ${{ secrets.MACOS_SIGNING_CERT != '' && secrets.MACOS_NOTARIZATION_TEAM_ID != '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake ninja ccache pipx
          pipx install meson==${{ env.MESON_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-release-macos-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-release-macos-

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-arm64-osx-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-arm64-osx-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure NuGet credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.nuget/NuGet
          cat > ~/.nuget/NuGet/NuGet.Config <<NUGETEOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="github" value="${NUGET_SOURCE_URL}" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="${GITHUB_REPOSITORY_OWNER}" />
                <add key="ClearTextPassword" value="${GITHUB_TOKEN}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          NUGETEOF

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet arm64-osx \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson release + LTO)
        env:
          CC: ccache cc
          CXX: ccache c++
        run: |
          meson setup builddir \
            --native-file meson/native/macos-appleclang.ini \
            --buildtype=release \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/arm64-osx \
            -Dbuild_tests=false \
            -Db_lto=true

      - name: Build
        run: meson compile -C builddir

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Test (smoke)
        run: |
          ./builddir/server/core/yuzu-server --help || true
          ./builddir/agents/core/yuzu-agent --help || true

      - name: Sign binaries (codesign)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          # Create a temporary keychain for signing
          KEYCHAIN_PATH="${RUNNER_TEMP}/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 1800 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          # Import the Developer ID certificate
          CERT_PATH="${RUNNER_TEMP}/signing-cert.p12"
          echo "${MACOS_SIGNING_CERT}" | base64 --decode > "${CERT_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${MACOS_SIGNING_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: \
            -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          # Add temporary keychain to the search list
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

          # Sign all binaries and dylibs with hardened runtime
          IDENTITY="${MACOS_SIGNING_IDENTITY}"
          for binary in builddir/yuzu-server builddir/yuzu-agent; do
            echo "Signing: ${binary}"
            codesign --force --options runtime \
              --sign "${IDENTITY}" \
              --timestamp \
              "${binary}"
            codesign --verify --verbose "${binary}"
          done

          # Sign dylibs
          find builddir -name '*.dylib' -print0 | while IFS= read -r -d '' dylib; do
            echo "Signing: ${dylib}"
            codesign --force --options runtime \
              --sign "${IDENTITY}" \
              --timestamp \
              "${dylib}"
          done

          # Clean up certificate file
          rm -f "${CERT_PATH}"

      - name: Notarize binaries
        if: env.HAS_NOTARIZATION == 'true'
        env:
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          # Create a ZIP of the signed binaries for notarization submission
          NOTARIZE_ZIP="${RUNNER_TEMP}/yuzu-notarize.zip"
          zip -j "${NOTARIZE_ZIP}" \
            builddir/yuzu-server \
            builddir/yuzu-agent

          # Add dylibs to the notarization payload
          find builddir -name '*.dylib' -exec zip -j "${NOTARIZE_ZIP}" {} \;

          # Submit for notarization and wait for result
          echo "Submitting for Apple notarization..."
          xcrun notarytool submit "${NOTARIZE_ZIP}" \
            --apple-id "${MACOS_NOTARIZATION_APPLE_ID}" \
            --password "${MACOS_NOTARIZATION_PASSWORD}" \
            --team-id "${MACOS_NOTARIZATION_TEAM_ID}" \
            --wait \
            --timeout 15m

          echo "Notarization complete"
          rm -f "${NOTARIZE_ZIP}"

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/signing.keychain-db"
          if [ -f "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "${KEYCHAIN_PATH}" 2>/dev/null || true
          fi

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          STAGING="yuzu-${VERSION}-macos-arm64"
          mkdir -p "${STAGING}/bin" "${STAGING}/plugins" "${STAGING}/content/definitions"

          # Binaries
          cp builddir/server/core/yuzu-server "${STAGING}/bin/"
          cp builddir/agents/core/yuzu-agent "${STAGING}/bin/"

          # Agent core dylib
          find builddir -name 'libyuzu_agent_core.dylib*' -exec cp {} "${STAGING}/bin/" \;

          # Plugin dylibs
          find builddir/agents/plugins -name '*.dylib' -exec cp {} "${STAGING}/plugins/" \;

          # Content definitions
          cp content/definitions/*.yaml "${STAGING}/content/definitions/"

          tar czf "yuzu-macos-arm64.tar.gz" "${STAGING}"

      - name: Build macOS installer (.pkg)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          bash deploy/packaging/macos/build-pkg.sh \
            --bin-dir builddir --version "$VERSION" --output .

      - name: Sign installer (.pkg)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          PKG="YuzuAgent-${VERSION}-macos-arm64.pkg"
          SIGNED="YuzuAgent-${VERSION}-macos-arm64-signed.pkg"

          # productsign signs the .pkg with Developer ID Installer identity
          INSTALLER_ID=$(echo "${MACOS_SIGNING_IDENTITY}" | sed 's/Developer ID Application/Developer ID Installer/')
          productsign --sign "${INSTALLER_ID}" "${PKG}" "${SIGNED}"
          mv "${SIGNED}" "${PKG}"
          echo "Signed: ${PKG}"

      - name: Notarize installer (.pkg)
        if: env.HAS_NOTARIZATION == 'true'
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          PKG="YuzuAgent-${VERSION}-macos-arm64.pkg"

          echo "Submitting installer for Apple notarization..."
          xcrun notarytool submit "${PKG}" \
            --apple-id "${MACOS_NOTARIZATION_APPLE_ID}" \
            --password "${MACOS_NOTARIZATION_PASSWORD}" \
            --team-id "${MACOS_NOTARIZATION_TEAM_ID}" \
            --wait \
            --timeout 15m

          # Staple the notarization ticket to the .pkg
          xcrun stapler staple "${PKG}"
          echo "Notarized and stapled: ${PKG}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-macos-arm64
          path: yuzu-macos-arm64.tar.gz
          retention-days: 3

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuzu-macos-pkg
          path: "YuzuAgent-*.pkg"
          retention-days: 3

  # ── Docker multi-arch publish ────────────────────────────────────────
  docker-publish:
    name: "Docker multi-arch push"
    needs: [build-linux, build-linux-arm64]
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Compute Docker tags
        id: tags
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          VERSION="${VERSION//-/_}"
          MAJOR_MINOR="${VERSION%.*}"
          REGISTRY="ghcr.io/${{ github.repository_owner }}"

          IS_PRERELEASE="false"
          if [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            IS_PRERELEASE="true"
          fi

          # Build tag lists for each image (newline-separated for build-push-action)
          for IMAGE in yuzu-server yuzu-agent yuzu-gateway; do
            OUTPUT_KEY="tags_${IMAGE//-/_}"
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "${OUTPUT_KEY}<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo "${REGISTRY}/${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"
            if [[ "$IS_PRERELEASE" == "false" ]]; then
              echo "${REGISTRY}/${IMAGE}:latest" >> "$GITHUB_OUTPUT"
              echo "${REGISTRY}/${IMAGE}:${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
            fi
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push yuzu-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags_yuzu_server }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push yuzu-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags_yuzu_agent }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push yuzu-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags_yuzu_gateway }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    name: "Create Release"
    needs: [build-linux, build-linux-arm64, build-gateway, build-windows, build-macos, docker-publish]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.exe' -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg' \) -exec mv {} . \;
          sha256sum *.tar.gz *.zip *.exe *.deb *.rpm *.pkg > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS (keyless)
        run: |
          cd artifacts
          cosign sign-blob --yes \
            --oidc-issuer https://token.actions.githubusercontent.com \
            SHA256SUMS --bundle SHA256SUMS.bundle
          echo "Signed SHA256SUMS with cosign (keyless/OIDC)"

      - name: Determine if prerelease
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          # Extract the section for this version from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${VERSION}\]/{found=1;next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > changelog_section.md
          fi
          # Check if we got content
          if [ -s changelog_section.md ]; then
            echo "has_changelog=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changelog=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ github.ref_name }}"

          # Start with changelog content if available
          if [ "${{ steps.changelog.outputs.has_changelog }}" = "true" ]; then
            cat changelog_section.md > release-notes.md
            echo "" >> release-notes.md
          else
            echo "_See commit history for changes in this release._" > release-notes.md
            echo "" >> release-notes.md
          fi

          cat >> release-notes.md <<NOTES_EOF
          ## Enterprise installers

          | Component | Windows | macOS | Debian/Ubuntu | RHEL/Fedora |
          |---|---|---|---|---|
          | Agent | \`.exe\` (InnoSetup) | \`.pkg\` (launchd) | \`.deb\` (systemd) | \`.rpm\` (systemd) |
          | Server | — | — | \`.deb\` (systemd) | \`.rpm\` (systemd) |
          | Gateway | — | — | \`.deb\` (systemd) | \`.rpm\` (systemd) |

          ### Windows silent install (GPO / SCCM / Intune)
          \`\`\`powershell
          YuzuAgentSetup-*.exe /VERYSILENT /SERVER=yuzu-server:50051 /TOKEN=<enrollment-token>
          \`\`\`

          ### macOS silent install (Jamf / MDM)
          \`\`\`bash
          sudo installer -pkg YuzuAgent-*.pkg -target /
          \`\`\`

          ### Linux install
          \`\`\`bash
          # Debian/Ubuntu
          sudo dpkg -i yuzu-agent_*.deb
          sudo systemctl edit yuzu-agent  # set --server address

          # RHEL/Fedora
          sudo rpm -i yuzu-agent-*.rpm
          \`\`\`

          ## Platform archives

          | Archive | Platform | Arch |
          |---|---|---|
          | \`yuzu-linux-x64.tar.gz\` | Linux (server + agent) | x86_64 |
          | \`yuzu-linux-arm64.tar.gz\` | Linux (server + agent) | ARM64 |
          | \`yuzu-gateway-linux-x64.tar.gz\` | Linux (gateway) | x86_64 |
          | \`yuzu-windows-x64.zip\` | Windows (server + agent) | x86_64 |
          | \`yuzu-macos-arm64.tar.gz\` | macOS (server + agent) | ARM64 (Apple Silicon) |

          ## Docker images

          \`\`\`bash
          docker pull ghcr.io/${OWNER}/yuzu-server:${TAG}
          docker pull ghcr.io/${OWNER}/yuzu-agent:${TAG}
          docker pull ghcr.io/${OWNER}/yuzu-gateway:${TAG}
          \`\`\`

          Multi-arch: \`linux/amd64\`, \`linux/arm64\`

          ### Verify checksums

          \`\`\`bash
          sha256sum -c SHA256SUMS
          \`\`\`

          ### Verify signature (cosign)

          \`\`\`bash
          cosign verify-blob --bundle SHA256SUMS.bundle \\
            --certificate-identity-regexp '.*' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            SHA256SUMS
          \`\`\`

          See the [user manual](docs/user-manual/) for full setup instructions.
          NOTES_EOF
          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ github.ref_name }}" \
            --title "Yuzu ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            ${PRERELEASE_FLAG} \
            artifacts/yuzu-linux-x64.tar.gz \
            artifacts/yuzu-linux-arm64.tar.gz \
            artifacts/yuzu-gateway-linux-x64.tar.gz \
            artifacts/yuzu-windows-x64.zip \
            artifacts/YuzuAgentSetup-*.exe \
            artifacts/YuzuAgent-*.pkg \
            artifacts/yuzu-macos-arm64.tar.gz \
            artifacts/*.deb \
            artifacts/*.rpm \
            artifacts/SHA256SUMS \
            artifacts/SHA256SUMS.bundle
