name: Release

on:
  push:
    tags: ['v*']
  # Manual fallback when GitHub's push/tag webhook dispatch for this repo
  # silently drops events (encountered 2026-04-18 during v0.11.0-rc1 cut:
  # push events stopped firing workflows for ~hours while workflow_dispatch
  # remained functional). Dispatch from the tag ref via the Actions UI or
  # `gh workflow run release.yml --ref vX.Y.Z` — GITHUB_REF_NAME resolves to
  # the tag name exactly as it does for push, so the existing version-
  # extraction in every step continues to work unchanged.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

permissions:
  # Top-level baseline = least-privilege read. Every elevated scope
  # (id-token, attestations, packages, contents:write) is opted into
  # per-job — Scorecard Token-Permissions zeroes the score on any
  # workflow-level write to a sensitive scope, even one shared across
  # multiple jobs.
  contents: read

env:
  # meson pin lives in requirements-ci.txt (pip ecosystem tracked by
  # Dependabot). vcpkg baseline is tracked by the scheduled
  # .github/workflows/vcpkg-baseline-update.yml workflow.
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  VCPKG_BINARY_SOURCES: "default"
  # ccache sizing — mirror ci.yml. Without this the self-hosted build-linux
  # leg inherits the host default (5 GiB on Big Tam), far too small for ~700
  # TUs and a full release+LTO build → cache thrash → slow release. 30G covers
  # the working set with headroom. (Harmless on the Wee Tam Windows / hosted
  # macOS build ccaches too.)
  CCACHE_MAXSIZE: "30G"
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "1"

jobs:
  # ── Linux x64 release build ──────────────────────────────────────────
  build-linux:
    name: "Build Linux x64"
    runs-on: [self-hosted, Linux, X64, yuzu-bigtam-linux]
    permissions:
      contents: read
      id-token: write       # cosign keyless + actions/attest-build-provenance OIDC
      attestations: write   # actions/attest-build-provenance
    # 90 = backstop for the slow GHA cache backend / 9P filesystem
    # observed during v0.11.0 retags. Cache surgery (restore-only)
    # should make this irrelevant in practice; keeping the wider
    # budget so the next dependabot bump or runner hiccup doesn't
    # immediately cliff back into Post-step timeouts.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      # Activate Erlang/OTP + rebar3 so the meson `.gateway_built` custom_target
      # (auto-enabled whenever rebar3 is on PATH — meson.build gates the gateway
      # purely on `find_program('rebar3')`) can run `escript` at compile time.
      # The github-runner user has rebar3 in ~/.local/bin but no OTP runtime on
      # PATH, so without this the Build step fails at `.gateway_built` with
      # "escript: No such file or directory". Pin matches ci.yml + the
      # "Build Gateway (Erlang)" job so an OTP bump moves all three together.
      - name: Install Erlang/OTP and rebar3
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        env:
          ImageOS: ubuntu24
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Verify build dependencies
        run: |
          MISSING=""
          # bison/flex: vcpkg's libpq port builds postgresql from source and
          # cannot auto-acquire them on Linux (gov #1331 — do not rely on the
          # machine-wide side effect of ci.yml's apt step).
          for cmd in gcc-15 g++-15 cmake ninja meson ccache pkg-config rpmbuild bison flex; do
            command -v "$cmd" >/dev/null 2>&1 || MISSING="$MISSING $cmd"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing tools on self-hosted runner:$MISSING"
            echo "Install with: sudo apt-get install -y ccache rpm bison flex libsystemd-dev"
            exit 1
          fi
          # libsystemd-dev (sd-bus) — the Linux Guardian systemd service guard links it;
          # without the .pc file `meson setup` fails the agent configure. Checked via
          # pkg-config rather than a command since it ships no binary.
          if ! pkg-config --exists libsystemd; then
            echo "::error::libsystemd-dev (pkg-config 'libsystemd') missing on self-hosted runner — sudo apt-get install -y libsystemd-dev"
            exit 1
          fi

      - name: Install Python build deps (PyYAML for content embed)
        # Governance UAT 2026-05-06 build-ci B-1: PyYAML is a hard
        # configure-time dependency for the bundled-content embed
        # (server/core/scripts/embed_content.py). meson setup fails
        # with error() if `import yaml` returns non-zero. Without an
        # explicit install step, this self-hosted runner relied on
        # CI-job pip-bleed-over (ci.yml installs requirements-ci to
        # ~/.local on the same runner). A runner re-bake would break
        # release. Install explicitly and hash-pinned.
        run: |
          pip3 install --user --break-system-packages --require-hashes -r requirements-ci.txt

      - name: Clean stale build directory (preserve vcpkg_installed)
        run: rm -rf build-linux

      # ccache (~/.cache/ccache) persists on the self-hosted Linux
      # runner between jobs. The original cache/restore@v5 was already
      # restore-only because release tags never re-use a file-hash; the
      # local persistence delivers the same restore semantics without
      # any GHA round-trip. Issue #569.
      - name: Reset ccache stats
        run: ccache -z

      - name: vcpkg sentinel (x64-linux-static)
        # Universal cache-key contract — see scripts/ci/vcpkg-triplet-sentinel.sh.
        run: bash scripts/ci/vcpkg-triplet-sentinel.sh x64-linux-static

      - name: Install vcpkg packages (static linkage)
        run: |
          vcpkg install --triplet x64-linux-static \
            --overlay-triplets=${{ github.workspace }}/triplets \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson release)
        env:
          CC: ccache gcc-15
          CXX: ccache g++-15
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux-static/lib/pkgconfig
          CMAKE_PREFIX_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux-static
        run: |
          meson setup build-linux \
            --native-file meson/native/linux-gcc15.ini \
            --buildtype=release \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-static \
            -Dbuild_tests=false

      - name: Build
        run: meson compile -C build-linux

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Test (smoke)
        run: |
          ./build-linux/server/core/yuzu-server --help || true
          ./build-linux/agents/core/yuzu-agent --help || true

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          STAGING="yuzu-${VERSION}-linux-x64"
          mkdir -p "${STAGING}/bin" "${STAGING}/plugins"

          # Binaries (InstructionDefinitions are embedded into yuzu-server
          # at build time — no content/ directory shipped).
          cp build-linux/server/core/yuzu-server "${STAGING}/bin/"
          cp build-linux/agents/core/yuzu-agent "${STAGING}/bin/"

          # Agent core shared library
          find build-linux -name 'libyuzu_agent_core.so*' -exec cp {} "${STAGING}/bin/" \;

          # Plugin shared libraries
          find build-linux/agents/plugins -name '*.so' -exec cp {} "${STAGING}/plugins/" \;

          # Postgres provisioning helper (ADR-0006, #1320) — tarball installs
          # run it manually; .deb/.rpm invoke it from their post-install hooks.
          mkdir -p "${STAGING}/scripts"
          cp scripts/install-server-postgres.sh "${STAGING}/scripts/"

          tar czf "yuzu-linux-x64.tar.gz" "${STAGING}"

      - name: Build .deb packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEB_VERSION="${VERSION/-/\~}"
          bash deploy/packaging/debian/build-deb.sh \
            --bin-dir build-linux --version "$DEB_VERSION" --output .

      - name: Build .rpm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RPM_VERSION="${VERSION%%-*}"
          PRERELEASE="${VERSION#*-}"
          [ "$PRERELEASE" = "$VERSION" ] && PRERELEASE=""
          PRE_FLAG=""
          [ -n "$PRERELEASE" ] && PRE_FLAG="--prerelease $PRERELEASE"
          bash deploy/packaging/rpm/build-rpm.sh \
            --bin-dir build-linux --version "$RPM_VERSION" $PRE_FLAG --output .

      # ── SBOM (CycloneDX + SPDX) ─────────────────────────────────────
      # Syft scans the workspace and emits one SBOM covering:
      #   - vcpkg C++ dependencies (via vcpkg.spdx.json files under
      #     vcpkg_installed/x64-linux-static/share/<pkg>/)
      #   - Built ELF binaries under build-linux/ (server, agent, plugins)
      # Output two formats because customer questionnaires ask for one
      # or the other inconsistently and both are trivial to emit.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: yuzu-linux-x64.cdx.json
          artifact-name: yuzu-linux-x64.cdx.json
          upload-artifact: false

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: yuzu-linux-x64.spdx.json
          artifact-name: yuzu-linux-x64.spdx.json
          upload-artifact: false

      # ── SLSA build provenance ───────────────────────────────────────
      # Records that these specific artifacts came from this specific
      # workflow run. Stored in GitHub's attestation registry; verified
      # customer-side with `gh attestation verify <file>`.
      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            yuzu-linux-x64.tar.gz
            *.deb
            *.rpm

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-linux-x64
          path: yuzu-linux-x64.tar.gz
          retention-days: 3

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-linux-deb
          path: "*.deb"
          retention-days: 3

      - name: Upload .rpm artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-linux-rpm
          path: "*.rpm"
          retention-days: 3

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-linux-x64-sbom
          path: |
            yuzu-linux-x64.cdx.json
            yuzu-linux-x64.spdx.json
          retention-days: 3

  # ── Linux ARM64 release build — SUSPENDED ────────────────────────────
  # Requires a local ARM64 runner or cross-compile runner.
  # Re-enable when self-hosted ARM64 runner is available.
  # build-linux-arm64:
  #   name: "Build Linux ARM64"
  #   ... suspended pending local runner ...

  # ARM64 archive packaging suspended — see above

  # ── Erlang gateway release build ──────────────────────────────────────
  build-gateway:
    name: "Build Gateway (Erlang)"
    needs: [build-linux]
    runs-on: [self-hosted, Linux, X64, yuzu-bigtam-linux]
    permissions:
      contents: read
      id-token: write       # cosign keyless + actions/attest-build-provenance OIDC
      attestations: write   # actions/attest-build-provenance
    timeout-minutes: 30
    env:
      ImageOS: ubuntu24

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Erlang/OTP and rebar3
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      # rebar3 _build/default/lib and Dialyzer PLT both persist in
      # the workspace on the self-hosted Linux runner — the original
      # cache/restore@v5 calls were already restore-only and the local
      # persistence is functionally equivalent without GHA round-trip.
      # Issue #569.

      # PKI PR5c: the gateway vendors a 2-line-patched grpcbox in
      # _checkouts/grpcbox (one-way TLS on the agent listener). This gate fails
      # the build if that copy is ever anything other than upstream grpcbox at the
      # rebar.config-pinned tag + the documented grpcbox.yuzu.patch — catching
      # tamper, drift, or version skew. See gateway/_checkouts/grpcbox/YUZU_PATCH.md.
      - name: Verify vendored grpcbox integrity
        working-directory: gateway
        run: bash scripts/verify-vendored-grpcbox.sh

      - name: Compile gateway
        working-directory: gateway
        run: rebar3 compile

      # F-3 (#1243): fail closed if the committed gpb modules drift from
      # priv/proto. gpb modules are self-contained — an un-regenerated module
      # silently drops new proto fields in transit (the PR5 CSR field-drop bug).
      # Runs after compile so _build/gpb exists; regenerates with rebar.config's
      # own pinned gpb_opts and byte-diffs against the committed *_pb.erl.
      - name: Check proto codegen is in sync
        working-directory: gateway
        run: bash scripts/check-proto-codegen.sh

      - name: Run EUnit tests
        working-directory: gateway
        run: |
          set +e
          rebar3 as test eunit --dir apps/yuzu_gw/test 2>&1 | tee eunit.log
          RC=${PIPESTATUS[0]}
          # Allow exit 1 if all tests passed but meck fixtures were cancelled
          if [ "$RC" -ne 0 ]; then
            if grep -q "Failed: 0" eunit.log && grep -q "Passed:" eunit.log; then
              echo "::warning::EUnit exited $RC but 0 tests failed (meck fixture cancellation)"
            else
              exit "$RC"
            fi
          fi

      - name: Run Dialyzer
        working-directory: gateway
        run: rebar3 dialyzer

      - name: Build production release
        working-directory: gateway
        run: rebar3 as prod release

      - name: Package release tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          STAGING="yuzu-gateway-${VERSION}-linux-x64"
          mkdir -p "${STAGING}"
          cp -a gateway/_build/prod/rel/yuzu_gw/* "${STAGING}/"
          tar czf "yuzu-gateway-linux-x64.tar.gz" "${STAGING}"

      - name: Build .deb package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEB_VERSION="${VERSION/-/\~}"
          bash deploy/packaging/debian/build-gateway-deb.sh \
            --rel-dir gateway/_build/prod/rel/yuzu_gw \
            --version "$DEB_VERSION" --output .

      - name: Build .rpm package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RPM_VERSION="${VERSION%%-*}"
          PRERELEASE="${VERSION#*-}"
          [ "$PRERELEASE" = "$VERSION" ] && PRERELEASE=""
          PRE_FLAG=""
          [ -n "$PRERELEASE" ] && PRE_FLAG="--prerelease $PRERELEASE"
          bash deploy/packaging/rpm/build-gateway-rpm.sh \
            --rel-dir gateway/_build/prod/rel/yuzu_gw \
            --version "$RPM_VERSION" $PRE_FLAG --output .

      # ── Gateway SBOM (CycloneDX + SPDX) ─────────────────────────────
      # Syft reads gateway/rebar.lock for Erlang/OTP dependencies and
      # walks _build/prod/rel/yuzu_gw/ for compiled beam files + OTP
      # runtime bundled into the release.
      - name: Generate gateway SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: gateway
          format: cyclonedx-json
          output-file: yuzu-gateway-linux-x64.cdx.json
          artifact-name: yuzu-gateway-linux-x64.cdx.json
          upload-artifact: false

      - name: Generate gateway SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: gateway
          format: spdx-json
          output-file: yuzu-gateway-linux-x64.spdx.json
          artifact-name: yuzu-gateway-linux-x64.spdx.json
          upload-artifact: false

      - name: Attest gateway provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            yuzu-gateway-linux-x64.tar.gz
            *.deb
            *.rpm

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-gateway-linux-x64
          path: yuzu-gateway-linux-x64.tar.gz
          retention-days: 3

      - name: Upload .deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-gateway-deb
          path: "*.deb"
          retention-days: 3

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-gateway-rpm
          path: "*.rpm"
          retention-days: 3

      - name: Upload gateway SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-gateway-linux-x64-sbom
          path: |
            yuzu-gateway-linux-x64.cdx.json
            yuzu-gateway-linux-x64.spdx.json
          retention-days: 3

  # ── Windows x64 release build ────────────────────────────────────────
  # No needs: — runs on the Wee Tam Windows pool (a separate host from the Big
  # Tam Linux build) so it can build in parallel with build-linux + build-gateway.
  build-windows:
    name: "Build Windows x64"
    runs-on: [self-hosted, Windows, X64, yuzu-weetam-windows]
    permissions:
      contents: read
      id-token: write       # cosign keyless + actions/attest-build-provenance OIDC
      attestations: write   # actions/attest-build-provenance
    # 90 = backstop. Same rationale as Build Linux x64. Defender
    # exclusions on the runner should keep tar/zstd extraction off
    # the Defender scan path, but if exclusions ever drift the wider
    # budget at least lets the build complete instead of timing out.
    timeout-minutes: 90
    env:
      HAS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT != '' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Install Meson and ccache
        run: |
          pip install --require-hashes -r requirements-ci.txt
          choco install ccache --yes --no-progress

      # ccache (~\AppData\Local\ccache) and vcpkg_installed/ both
      # persist on the self-hosted Windows runner between jobs. The
      # original cache/restore@v5 calls were already restore-only —
      # local persistence delivers the same restore semantics without
      # any GHA round-trip. Issue #569.
      - name: Reset ccache stats
        run: ccache -z

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: vcpkg sentinel (x64-windows)
        # Universal cache-key contract — see scripts/ci/vcpkg-triplet-sentinel.sh.
        # Both the outer shell AND the inner bash invocation must bypass
        # $PATH lookup for `bash`, otherwise the runner's $PATH order
        # (C:\Windows\system32 before C:\msys64\usr\bin) resolves `bash`
        # to WSL bash, which exits with WSL_E_LOCAL_SYSTEM_NOT_SUPPORTED
        # under LOCAL SYSTEM. Explicit MSYS2 paths fix it.
        shell: 'C:\msys64\usr\bin\bash.exe --noprofile --norc -eo pipefail {0}'
        run: /usr/bin/bash scripts/ci/vcpkg-triplet-sentinel.sh x64-windows

      - name: Install vcpkg packages
        run: |
          & "${{ github.workspace }}/vcpkg/vcpkg.exe" install `
            --triplet x64-windows `
            --x-manifest-root="${{ github.workspace }}"

      - name: Configure (Meson release)
        env:
          CC: ccache cl
          CXX: ccache cl
        run: |
          meson setup build-windows `
            --buildtype=release `
            -Dcpp_std=vc++latest `
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-windows `
            -Dbuild_tests=false

      - name: Build
        run: meson compile -C build-windows

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Test (smoke)
        run: |
          & ./build-windows/server/core/yuzu-server.exe --help
          & ./build-windows/agents/core/yuzu-agent.exe --help
        continue-on-error: true

      - name: Sign binaries (Authenticode)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          # Decode the PFX certificate from base64 secret
          $certPath = "${{ runner.temp }}\signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT))

          # Find signtool.exe from the Windows SDK
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Error "signtool.exe not found"
            exit 1
          }
          Write-Host "Using signtool: $signtool"

          # Collect all EXE and DLL files to sign
          $filesToSign = @()
          $filesToSign += Get-ChildItem build-windows -Filter "yuzu-server.exe" -Recurse
          $filesToSign += Get-ChildItem build-windows -Filter "yuzu-agent.exe" -Recurse
          $filesToSign += Get-ChildItem build-windows -Filter "yuzu_agent_core.dll" -Recurse
          $filesToSign += Get-ChildItem build-windows/agents/plugins -Filter "*.dll" -Recurse

          foreach ($file in $filesToSign) {
            Write-Host "Signing: $($file.FullName)"
            & $signtool sign `
              /f $certPath `
              /p $env:WINDOWS_SIGNING_CERT_PASSWORD `
              /fd sha256 `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              /d "Yuzu Endpoint Management" `
              $file.FullName

            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to sign $($file.Name)"
              exit 1
            }

            # Verify signature
            & $signtool verify /pa /v $file.FullName
          }

          # Clean up certificate
          Remove-Item $certPath -Force

      - name: Package archive
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart("v").Replace("-", "_")
          $staging = "yuzu-${version}-windows-x64"
          New-Item -ItemType Directory -Force -Path "${staging}/bin", "${staging}/plugins"

          # Binaries (InstructionDefinitions are embedded into yuzu-server.exe
          # at build time — no content/ directory shipped).
          Copy-Item "build-windows/server/core/yuzu-server.exe" "${staging}/bin/"
          Copy-Item "build-windows/agents/core/yuzu-agent.exe" "${staging}/bin/"

          # Agent core DLL
          Get-ChildItem -Path build-windows -Filter "yuzu_agent_core.dll" -Recurse | Copy-Item -Destination "${staging}/bin/"

          # Plugin DLLs
          Get-ChildItem -Path build-windows/agents/plugins -Filter "*.dll" -Recurse | Copy-Item -Destination "${staging}/plugins/"

          # Runtime DLLs from vcpkg that plugins/binaries need
          $vcpkgBin = "${{ github.workspace }}/vcpkg_installed/x64-windows/bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem -Path $vcpkgBin -Filter "*.dll" | Copy-Item -Destination "${staging}/bin/"
          }

          Compress-Archive -Path "${staging}" -DestinationPath "yuzu-windows-x64.zip"

      - name: Build Windows installers (InnoSetup)
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart("v").Replace("-", "_")

          # Install InnoSetup 6
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "ISCC.exe not found after InnoSetup install"
            exit 1
          }

          # Build agent installer
          Write-Host "=== Building Agent Installer ==="
          & $iscc `
            "/DAppVersion=${version}" `
            "/DBuildDir=${{ github.workspace }}\build-windows" `
            "deploy\packaging\windows\yuzu-agent.iss"
          if ($LASTEXITCODE -ne 0) { Write-Error "Agent installer failed"; exit 1 }

          $agentInstaller = "deploy\packaging\windows\output\YuzuAgentSetup-${version}.exe"
          Copy-Item $agentInstaller "YuzuAgentSetup-${version}.exe"
          Write-Host "Agent installer: $('{0:N1} MB' -f ((Get-Item $agentInstaller).Length / 1MB))"

          # Build server installer
          Write-Host "=== Building Server Installer ==="
          & $iscc `
            "/DAppVersion=${version}" `
            "/DBuildDir=${{ github.workspace }}\build-windows" `
            "/DContentDir=${{ github.workspace }}\content" `
            "deploy\packaging\windows\yuzu-server.iss"
          if ($LASTEXITCODE -ne 0) { Write-Error "Server installer failed"; exit 1 }

          $serverInstaller = "deploy\packaging\windows\output\YuzuServerSetup-${version}.exe"
          Copy-Item $serverInstaller "YuzuServerSetup-${version}.exe"
          Write-Host "Server installer: $('{0:N1} MB' -f ((Get-Item $serverInstaller).Length / 1MB))"

      - name: Sign installers (Authenticode)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart("v").Replace("-", "_")

          $certPath = "${{ runner.temp }}\signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          foreach ($installer in @("YuzuAgentSetup-${version}.exe", "YuzuServerSetup-${version}.exe")) {
            if (Test-Path $installer) {
              Write-Host "Signing: $installer"
              & $signtool sign `
                /f $certPath `
                /p $env:WINDOWS_SIGNING_CERT_PASSWORD `
                /fd sha256 `
                /tr http://timestamp.digicert.com `
                /td sha256 `
                /d "Yuzu Endpoint Management" `
                $installer
              & $signtool verify /pa $installer
            }
          }

          Remove-Item $certPath -Force

      # ── Windows SBOM (CycloneDX + SPDX) ─────────────────────────────
      # Scans vcpkg_installed/x64-windows (C++ deps) + build-windows (PE
      # binaries). Syft supports PowerShell/Windows runners via the
      # composite action, which downloads a Windows syft binary.
      - name: Generate Windows SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: yuzu-windows-x64.cdx.json
          artifact-name: yuzu-windows-x64.cdx.json
          upload-artifact: false

      - name: Generate Windows SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: yuzu-windows-x64.spdx.json
          artifact-name: yuzu-windows-x64.spdx.json
          upload-artifact: false

      - name: Attest Windows provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            yuzu-windows-x64.zip
            YuzuAgentSetup-*.exe
            YuzuServerSetup-*.exe

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-windows-x64
          path: yuzu-windows-x64.zip
          retention-days: 3

      - name: Upload installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-windows-installer
          path: |
            YuzuAgentSetup-*.exe
            YuzuServerSetup-*.exe
          retention-days: 3

      - name: Upload Windows SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-windows-x64-sbom
          path: |
            yuzu-windows-x64.cdx.json
            yuzu-windows-x64.spdx.json
          retention-days: 3

  # ── macOS ARM64 release build ────────────────────────────────────────
  build-macos:
    name: "Build macOS ARM64"
    # macos-15 = Apple Silicon, Xcode 16 / Apple Clang 16 (accepts -std=c++23).
    # macos-14 ships Apple Clang 15, which rejects -std=c++23 ("invalid value
    # 'c++23'") — that broke the v0.12.0 first cut. Matches ci.yml's macOS job.
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write       # cosign keyless + actions/attest-build-provenance OIDC
      attestations: write   # actions/attest-build-provenance
    timeout-minutes: 90
    env:
      HAS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT != '' }}
      HAS_NOTARIZATION: ${{ secrets.MACOS_SIGNING_CERT != '' && secrets.MACOS_NOTARIZATION_TEAM_ID != '' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install dependencies
        run: |
          # autoconf/automake/libtool: vcpkg's libpq port (Postgres substrate,
          # ADR-0006) runs autoreconf during its build and the hosted macOS
          # image doesn't ship autotools.
          brew install cmake ninja ccache pipx autoconf automake libtool
          # awk strips the trailing ` \` that pip-compile adds when the
          # requirement is continued by `--hash=...` lines.
          pipx install "$(awk '/^meson==/ {print $1}' requirements-ci.txt)"
          # Governance UAT 2026-05-06 build-ci B-1: PyYAML is a hard
          # configure-time dependency for the bundled-content embed
          # (server/core/scripts/embed_content.py). meson setup fails
          # with error() if `import yaml` returns non-zero. Install via
          # the same hash-pinned requirements file used elsewhere.
          pip3 install --break-system-packages --require-hashes -r requirements-ci.txt

      - name: Cache ccache
        # Restore-only: release builds consume cache, never produce.
        # Each release tag is a unique commit, so the file-hash cache
        # key never matches anything a future release would benefit
        # from. Paying writeback cost on every release is what timed
        # out the v0.11.0 first attempt — Linux Post Cache ccache
        # spent 28.5 min uploading data nobody would re-read, blowing
        # the 45-min job budget. cache/restore@v5 also drops the
        # `save-always: true` input that the maintainers say never
        # worked as intended (cf. v5.0.5 deprecation warning).
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/Library/Caches/ccache
          key: ccache-release-macos-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-release-macos-

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        # Restore-only: release builds consume cache, never produce.
        # Each release tag is a unique commit, so the file-hash cache
        # key never matches anything a future release would benefit
        # from. Paying writeback cost on every release is what timed
        # out the v0.11.0 first attempt — Linux Post Cache ccache
        # spent 28.5 min uploading data nobody would re-read, blowing
        # the 45-min job budget. cache/restore@v5 also drops the
        # `save-always: true` input that the maintainers say never
        # worked as intended (cf. v5.0.5 deprecation warning).
        #
        # Cache key follows the universal contract from the CI overhaul
        # plan: vcpkg.json + vcpkg-configuration.json + every overlay
        # triplet + the pinned VCPKG_COMMIT baseline. Same shape as the
        # ci.yml macOS cache key.
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-arm64-osx-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'triplets/*.cmake') }}
          restore-keys: |
            vcpkg-arm64-osx-${{ env.VCPKG_COMMIT }}-
            vcpkg-arm64-osx-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet arm64-osx \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson release + LTO)
        env:
          CC: ccache cc
          CXX: ccache c++
        run: |
          meson setup build-macos \
            --native-file meson/native/macos-appleclang.ini \
            --buildtype=release \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/arm64-osx \
            -Dbuild_tests=false \
            -Db_lto=true

      - name: Build
        run: meson compile -C build-macos

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Test (smoke)
        run: |
          ./build-macos/server/core/yuzu-server --help || true
          ./build-macos/agents/core/yuzu-agent --help || true

      - name: Sign binaries (codesign)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          # Create a temporary keychain for signing
          KEYCHAIN_PATH="${RUNNER_TEMP}/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 1800 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          # Import the Developer ID certificate
          CERT_PATH="${RUNNER_TEMP}/signing-cert.p12"
          echo "${MACOS_SIGNING_CERT}" | base64 --decode > "${CERT_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${MACOS_SIGNING_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: \
            -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          # Add temporary keychain to the search list
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

          # Sign all binaries and dylibs with hardened runtime
          IDENTITY="${MACOS_SIGNING_IDENTITY}"
          for binary in build-macos/yuzu-server build-macos/yuzu-agent; do
            echo "Signing: ${binary}"
            codesign --force --options runtime \
              --sign "${IDENTITY}" \
              --timestamp \
              "${binary}"
            codesign --verify --verbose "${binary}"
          done

          # Sign dylibs
          find build-macos -name '*.dylib' -print0 | while IFS= read -r -d '' dylib; do
            echo "Signing: ${dylib}"
            codesign --force --options runtime \
              --sign "${IDENTITY}" \
              --timestamp \
              "${dylib}"
          done

          # Clean up certificate file
          rm -f "${CERT_PATH}"

      - name: Notarize binaries
        if: env.HAS_NOTARIZATION == 'true'
        env:
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          # Create a ZIP of the signed binaries for notarization submission
          NOTARIZE_ZIP="${RUNNER_TEMP}/yuzu-notarize.zip"
          zip -j "${NOTARIZE_ZIP}" \
            build-macos/yuzu-server \
            build-macos/yuzu-agent

          # Add dylibs to the notarization payload
          find build-macos -name '*.dylib' -exec zip -j "${NOTARIZE_ZIP}" {} \;

          # Submit for notarization and wait for result
          echo "Submitting for Apple notarization..."
          xcrun notarytool submit "${NOTARIZE_ZIP}" \
            --apple-id "${MACOS_NOTARIZATION_APPLE_ID}" \
            --password "${MACOS_NOTARIZATION_PASSWORD}" \
            --team-id "${MACOS_NOTARIZATION_TEAM_ID}" \
            --wait \
            --timeout 15m

          echo "Notarization complete"
          rm -f "${NOTARIZE_ZIP}"

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/signing.keychain-db"
          if [ -f "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "${KEYCHAIN_PATH}" 2>/dev/null || true
          fi

      - name: Package archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          STAGING="yuzu-${VERSION}-macos-arm64"
          mkdir -p "${STAGING}/bin" "${STAGING}/plugins"

          # Binaries (InstructionDefinitions are embedded into yuzu-server
          # at build time — no content/ directory shipped).
          cp build-macos/server/core/yuzu-server "${STAGING}/bin/"
          cp build-macos/agents/core/yuzu-agent "${STAGING}/bin/"

          # Agent core dylib
          find build-macos -name 'libyuzu_agent_core.dylib*' -exec cp {} "${STAGING}/bin/" \;

          # Plugin dylibs
          find build-macos/agents/plugins -name '*.dylib' -exec cp {} "${STAGING}/plugins/" \;

          # Postgres provisioning helper (ADR-0006, #1320) — tarball installs
          # run it manually (script's local mode covers Homebrew postgresql@16).
          mkdir -p "${STAGING}/scripts"
          cp scripts/install-server-postgres.sh "${STAGING}/scripts/"

          tar czf "yuzu-macos-arm64.tar.gz" "${STAGING}"

      - name: Build macOS installer (.pkg)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          bash deploy/packaging/macos/build-pkg.sh \
            --bin-dir build-macos --version "$VERSION" --output .

      - name: Sign installer (.pkg)
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          PKG="YuzuAgent-${VERSION}-macos-arm64.pkg"
          SIGNED="YuzuAgent-${VERSION}-macos-arm64-signed.pkg"

          # productsign signs the .pkg with Developer ID Installer identity
          INSTALLER_ID=$(echo "${MACOS_SIGNING_IDENTITY}" | sed 's/Developer ID Application/Developer ID Installer/')
          productsign --sign "${INSTALLER_ID}" "${PKG}" "${SIGNED}"
          mv "${SIGNED}" "${PKG}"
          echo "Signed: ${PKG}"

      - name: Notarize installer (.pkg)
        if: env.HAS_NOTARIZATION == 'true'
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION//-/_}"
          PKG="YuzuAgent-${VERSION}-macos-arm64.pkg"

          echo "Submitting installer for Apple notarization..."
          xcrun notarytool submit "${PKG}" \
            --apple-id "${MACOS_NOTARIZATION_APPLE_ID}" \
            --password "${MACOS_NOTARIZATION_PASSWORD}" \
            --team-id "${MACOS_NOTARIZATION_TEAM_ID}" \
            --wait \
            --timeout 15m

          # Staple the notarization ticket to the .pkg
          xcrun stapler staple "${PKG}"
          echo "Notarized and stapled: ${PKG}"

      # ── macOS SBOM (CycloneDX + SPDX) ───────────────────────────────
      # Scans vcpkg_installed/arm64-osx + build-macos (Mach-O binaries).
      - name: Generate macOS SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: yuzu-macos-arm64.cdx.json
          artifact-name: yuzu-macos-arm64.cdx.json
          upload-artifact: false

      - name: Generate macOS SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: yuzu-macos-arm64.spdx.json
          artifact-name: yuzu-macos-arm64.spdx.json
          upload-artifact: false

      - name: Attest macOS provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            yuzu-macos-arm64.tar.gz
            YuzuAgent-*.pkg

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-macos-arm64
          path: yuzu-macos-arm64.tar.gz
          retention-days: 3

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-macos-pkg
          path: "YuzuAgent-*.pkg"
          retention-days: 3

      - name: Upload macOS SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-macos-arm64-sbom
          path: |
            yuzu-macos-arm64.cdx.json
            yuzu-macos-arm64.spdx.json
          retention-days: 3

  # ── Docker images — server + gateway published to GHCR ──────────────
  # Runs on the self-hosted Linux runner (native dockerd, systemd-managed).
  # Both images build in parallel via matrix; buildx registry cache persists
  # across releases so repeat runs with unchanged vcpkg/rebar deps are fast.
  docker-publish:
    name: "Publish ${{ matrix.image }} image"
    needs: [build-linux, build-gateway]
    runs-on: [self-hosted, Linux, X64, yuzu-bigtam-linux]
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write        # cosign keyless + Sigstore OIDC
      attestations: write    # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            dockerfile: deploy/docker/Dockerfile.server
          - image: gateway
            dockerfile: deploy/docker/Dockerfile.gateway

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      - name: Lowercase repository owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          # GHCR_PAT (write:packages-only PAT owned by Tr3kkR) instead
          # of GITHUB_TOKEN so we can push to GHCR packages whose
          # Actions-access policy isn't pinned to this repo (e.g.
          # yuzu-agent-bundle-chisel, originally created via local
          # PAT push). Falls back to GITHUB_TOKEN for fork PRs that
          # don't have access to the secret. Username pinned to the
          # PAT owner ('Tr3kkR') since github.actor varies per actor.
          username: Tr3kkR
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}
          # Tag convention mirrors scripts/docker-release.sh:
          #   - stable (no -alpha/-beta/-rc suffix): :X.Y.Z + :X.Y + :latest
          #   - pre-release:                         :X.Y.Z-suffix only
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=yuzu-${{ matrix.image }}
            org.opencontainers.image.description=Yuzu ${{ matrix.image }} component
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # TRIPLET is the vcpkg triplet baked into the Dockerfile for
          # vcpkg install + meson configure. The Dockerfile defaults to
          # `x64-linux`, but pinning explicitly here is QE-R2-02 follow-up
          # from feat/viz-engine governance round 2: when arm64 publishing
          # lands the matrix will need to set this per-row, and the
          # explicit build-arg becomes load-bearing rather than aspirational.
          # Dockerfile.gateway does not consume TRIPLET (rebar3 path); the
          # build-arg is still safe -- unused build-args are ignored.
          build-args: |
            TRIPLET=x64-linux
          # Registry cache lives in GHCR itself under a :buildcache tag.
          # mode=max caches intermediate layers too (best hit rate).
          cache-from: type=local,src=${{ runner.tool_cache }}/yuzu-docker-buildcache/${{ matrix.image }}
          cache-to: type=local,dest=${{ runner.tool_cache }}/yuzu-docker-buildcache/${{ matrix.image }},mode=max
          # Disable buildx's own provenance/sbom attestation — we emit
          # GitHub-native attestations + cosign signatures below so
          # customers have a single verification path via `gh
          # attestation verify` and `cosign verify`.
          provenance: false
          sbom: false

      # ── Docker image SBOM (CycloneDX + SPDX) ────────────────────────
      # Syft scans the pushed image by digest (pulls manifest +
      # layers from GHCR) so the SBOM reflects exactly what customers
      # will pull. Output goes to artifacts/ for the release job to
      # attach alongside the per-platform archive SBOMs.
      - name: Generate image SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: yuzu-${{ matrix.image }}-image.cdx.json
          artifact-name: yuzu-${{ matrix.image }}-image.cdx.json
          upload-artifact: false

      - name: Generate image SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: yuzu-${{ matrix.image }}-image.spdx.json
          artifact-name: yuzu-${{ matrix.image }}-image.spdx.json
          upload-artifact: false

      - name: Upload image SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-${{ matrix.image }}-image-sbom
          path: |
            yuzu-${{ matrix.image }}-image.cdx.json
            yuzu-${{ matrix.image }}-image.spdx.json
          retention-days: 3

      # ── SLSA build provenance (by image digest) ─────────────────────
      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── cosign keyless image signing (Sigstore / Fulcio / Rekor) ────
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}
        run: |
          # cosign v3.0+ rejects explicit --oidc-issuer when a signing
          # config is in use (the GHA-default path). The OIDC issuer is
          # auto-detected from the workflow's id-token, so the flag is
          # both redundant and a hard error in v3. The cosign-installer
          # bump from 3.10.1 → 4.1.1 (#495) installs cosign v3.0.5 by
          # default; v0.11.0-rc0 hit "cannot specify service URLs and
          # use signing config" and aborted before publishing the
          # release page.
          cosign sign --yes "${IMAGE}@${DIGEST}"
          echo "Signed ${IMAGE}@${DIGEST} with cosign keyless (OIDC)"

      - name: Image summary
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Published \`yuzu-${{ matrix.image }}\` image"
            echo ""
            echo '```'
            echo "$META_TAGS"
            echo '```'
            echo ""
            echo "**Digest:** \`$BUILD_DIGEST\`"
            echo ""
            echo "Signed with cosign keyless + SLSA provenance attestation."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── yuzu-postgres — the server's storage substrate image ─────────────
  # Postgres 16 + pgvector + app role/db init (ADR-0006/0007/0008, #1318).
  # Mirrors docker-publish (login / metadata / SBOM / attestation / cosign)
  # with three differences:
  #   1. No needs on build-linux/build-gateway — the image contains no Yuzu
  #      build artifacts (it's postgres + pgvector + init SQL), so a core
  #      build failure is irrelevant to it. It IS in the release job's
  #      needs: the composes release-pin ghcr.io/.../yuzu-postgres:X.Y.Z,
  #      so a release must not publish if this image failed to.
  #   2. Multi-arch linux/amd64,linux/arm64 (the demo/viz rigs are arm64).
  #      The arm64 leg runs under QEMU on the amd64 self-hosted runner —
  #      cheap here (apt install + one small C extension compile), unlike
  #      the chisel jobs' full vcpkg-from-source builds.
  #   3. Distinct local buildcache path (postgres suffix).
  docker-publish-postgres:
    name: "Publish postgres image"
    runs-on: [self-hosted, Linux, X64, yuzu-bigtam-linux]
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write        # cosign keyless + Sigstore OIDC
      attestations: write    # actions/attest-build-provenance

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      - name: Lowercase repository owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # QEMU + docker-container driver for the multi-arch (amd64+arm64)
      # manifest-list push — same rationale as docker-publish-chisel.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          # GHCR_PAT (write:packages-only PAT owned by Tr3kkR) instead
          # of GITHUB_TOKEN — see docker-publish for the full rationale.
          username: Tr3kkR
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-postgres
          # Tag convention mirrors docker-publish / scripts/docker-release.sh:
          #   - stable (no -alpha/-beta/-rc suffix): :X.Y.Z + :X.Y + :latest
          #   - pre-release:                         :X.Y.Z-suffix only
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=yuzu-postgres
            org.opencontainers.image.description=Yuzu server storage substrate — PostgreSQL 18 + pgvector (ADR-0006)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile.postgres
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Distinct local buildcache path — never collides with the
          # server/gateway/chisel caches on this runner.
          cache-from: type=local,src=${{ runner.tool_cache }}/yuzu-docker-buildcache/postgres
          cache-to: type=local,dest=${{ runner.tool_cache }}/yuzu-docker-buildcache/postgres,mode=max
          # Disable buildx's own provenance/sbom attestation — we emit
          # GitHub-native attestations + cosign signatures below (single
          # verification path, same as docker-publish).
          provenance: false
          sbom: false

      # ── Docker image SBOM (CycloneDX + SPDX) ────────────────────────
      - name: Generate image SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-postgres@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: yuzu-postgres-image.cdx.json
          artifact-name: yuzu-postgres-image.cdx.json
          upload-artifact: false

      - name: Generate image SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-postgres@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: yuzu-postgres-image.spdx.json
          artifact-name: yuzu-postgres-image.spdx.json
          upload-artifact: false

      - name: Upload image SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-postgres-image-sbom
          path: |
            yuzu-postgres-image.cdx.json
            yuzu-postgres-image.spdx.json
          retention-days: 3

      # ── SLSA build provenance (by image digest) ─────────────────────
      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-postgres
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── cosign keyless image signing (Sigstore / Fulcio / Rekor) ────
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-postgres
        run: |
          # cosign v3.0+ auto-detects the OIDC issuer from the workflow's
          # id-token; an explicit --oidc-issuer is redundant and a hard
          # error in v3 (see docker-publish for the #495 history).
          cosign sign --yes "${IMAGE}@${DIGEST}"
          echo "Signed ${IMAGE}@${DIGEST} with cosign keyless (OIDC)"

      - name: Image summary
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Published \`yuzu-postgres\` image (multi-arch)"
            echo ""
            echo '```'
            echo "$META_TAGS"
            echo '```'
            echo ""
            echo "**Digest:** \`$BUILD_DIGEST\`"
            echo ""
            echo "Platforms: \`linux/amd64,linux/arm64\` (arm64 via QEMU)."
            echo "Signed with cosign keyless + SLSA provenance attestation."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Chiselled demo images — server + gateway + agent, multi-arch ─────
  # Publishes the FROM-scratch chiselled Ubuntu 26.04 demo images to GHCR
  # under a distinct `-chisel` repo suffix (see docs/demo-environment.md).
  # Deliberately NOT in the `release` job's needs: a slow or failed
  # demo-image build must never block the actual GitHub release. Mirrors
  # docker-publish (login / metadata / cosign / attestation / lowercase
  # owner) but differs in three ways:
  #   1. Multi-arch linux/amd64,linux/arm64 (docker-publish is amd64-only).
  #   2. NO TRIPLET build-arg — the server/agent chisel Dockerfiles derive
  #      the vcpkg triplet from buildx's TARGETARCH per-arch; forcing
  #      x64-linux would bake an x64 binary into the arm64 image.
  #   3. A distinct local buildcache path (-chisel suffix) so it never
  #      collides with docker-publish's cache.
  docker-publish-chisel:
    name: "Publish ${{ matrix.image }}-chisel image"
    # Mirror docker-publish's needs (core builds must pass) but stay OUT
    # of the release job's needs: so this never gates the release.
    needs: [build-linux, build-gateway]
    runs-on: [self-hosted, Linux, X64, yuzu-bigtam-linux]
    # Job-level concurrency so a re-tagged release (same ref) cancels an
    # in-flight 6 h QEMU build instead of wedging the single self-hosted
    # Linux runner slot behind a stale emulated arm64 compile. The
    # workflow-level concurrency is cancel-in-progress:false (a real
    # release must run to completion); this narrower group trades that
    # for runner-slot liveness on the demo-image path specifically — SRE
    # flagged the starvation risk. Group is keyed on github.ref + the
    # matrix image so a re-push of the same tag is treated as a
    # supersede PER IMAGE — without `${{ matrix.image }}`, the three
    # matrix legs (server/gateway/agent) share a single group and
    # GitHub cancels two of them at scheduling time. Observed on
    # v0.12.0 release run 26413256206 where server-chisel and
    # agent-chisel were cancelled at 1s runtime, leaving gateway-chisel
    # as the only published variant.
    concurrency:
      group: chisel-publish-${{ github.ref }}-${{ matrix.image }}
      cancel-in-progress: true
    # Generous timeout: the server/agent chisel images compile all of
    # vcpkg (gRPC/abseil/protobuf/openssl) from source, and the arm64 leg
    # does it under QEMU emulation. docs/demo-environment.md flags up to a
    # ~240 min cold-cache risk for the emulated arm64 build.
    #
    # INTERIM STRATEGY: arm64 is built via QEMU on the amd64 self-hosted
    # runner. This is slow but needs no extra runner. The sustainable path
    # is a native arm64 runner (self-hosted or GitHub-hosted
    # ubuntu-24.04-arm) + per-arch manifest merge — a runner-topology
    # decision tracked as the "Open decision — arm64 build strategy" note
    # in docs/demo-environment.md ("Publishing"). Revisit before relying on
    # the QEMU path for every release.
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
      id-token: write        # cosign keyless + Sigstore OIDC
      attestations: write    # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            dockerfile: deploy/docker/Dockerfile.server.chisel
          - image: gateway
            dockerfile: deploy/docker/Dockerfile.gateway.chisel
          - image: agent
            dockerfile: deploy/docker/Dockerfile.agent.chisel

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      - name: Lowercase repository owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # QEMU registers binf_misc handlers so buildx can build the
      # linux/arm64 leg on this amd64 runner. Required for the multi-arch
      # build below; see the INTERIM STRATEGY note on timeout-minutes.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          # Force the docker-container driver. Multi-platform push needs a
          # builder that can produce an OCI manifest list; the ambient
          # `docker` driver on the self-hosted runner cannot do
          # cross-arch / manifest-list builds and a leftover docker-driver
          # builder would make the linux/amd64,linux/arm64 push fail.
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          # GHCR_PAT (write:packages-only PAT owned by Tr3kkR) instead
          # of GITHUB_TOKEN so we can push to GHCR packages whose
          # Actions-access policy isn't pinned to this repo (e.g.
          # yuzu-agent-bundle-chisel, originally created via local
          # PAT push). Falls back to GITHUB_TOKEN for fork PRs that
          # don't have access to the secret. Username pinned to the
          # PAT owner ('Tr3kkR') since github.actor varies per actor.
          username: Tr3kkR
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          # Distinct `-chisel` suffix — must not collide with the non-chisel
          # yuzu-${image} images published by docker-publish.
          images: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}-chisel
          # Tag convention mirrors docker-publish / scripts/docker-release.sh:
          #   - stable (no -alpha/-beta/-rc suffix): :X.Y.Z + :X.Y + :latest
          #   - pre-release:                         :X.Y.Z-suffix only
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=yuzu-${{ matrix.image }}-chisel
            org.opencontainers.image.description=Yuzu ${{ matrix.image }} chiselled demo image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Multi-arch is the whole point of this job. The arm64 leg runs
          # under QEMU emulation on the amd64 runner (see timeout note).
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NOTE: deliberately NO TRIPLET build-arg. The server/agent chisel
          # Dockerfiles derive the vcpkg triplet from buildx's per-arch
          # TARGETARCH when TRIPLET is empty
          # (T="${TRIPLET:-$(case "$TARGETARCH" in arm64) echo arm64-linux;;
          # *) echo x64-linux;; esac)}"). Pinning TRIPLET=x64-linux here (as
          # docker-publish does) would bake an x64 binary into the arm64
          # image. gateway.chisel ignores TRIPLET (rebar3 path).
          # Distinct local buildcache path so chisel never collides with
          # the non-chisel docker-publish cache. mode=max caches
          # intermediate layers too (best hit rate) — important given the
          # full vcpkg-from-source compile.
          cache-from: type=local,src=${{ runner.tool_cache }}/yuzu-docker-buildcache/${{ matrix.image }}-chisel
          cache-to: type=local,dest=${{ runner.tool_cache }}/yuzu-docker-buildcache/${{ matrix.image }}-chisel,mode=max
          # Disable buildx's own provenance/sbom attestation — we emit
          # GitHub-native attestations + cosign signatures below so
          # customers have a single verification path via `gh
          # attestation verify` and `cosign verify`.
          provenance: false
          sbom: false

      # ── Docker image SBOM (CycloneDX + SPDX) ────────────────────────
      # Mirrors docker-publish's SBOM steps so the chisel demo images get
      # the same supply-chain coverage (compliance flagged that the chisel
      # images had cosign + SLSA but no SBOM). Syft scans the pushed
      # multi-arch image by digest. Same SHA-pinned anchore/sbom-action +
      # upload-artifact versions as docker-publish.
      - name: Generate image SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}-chisel@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: yuzu-${{ matrix.image }}-chisel-image.cdx.json
          artifact-name: yuzu-${{ matrix.image }}-chisel-image.cdx.json
          upload-artifact: false

      - name: Generate image SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}-chisel@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: yuzu-${{ matrix.image }}-chisel-image.spdx.json
          artifact-name: yuzu-${{ matrix.image }}-chisel-image.spdx.json
          upload-artifact: false

      - name: Upload image SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-${{ matrix.image }}-chisel-image-sbom
          path: |
            yuzu-${{ matrix.image }}-chisel-image.cdx.json
            yuzu-${{ matrix.image }}-chisel-image.spdx.json
          retention-days: 3

      # ── SLSA build provenance (by image digest) ─────────────────────
      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}-chisel
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── cosign keyless image signing (Sigstore / Fulcio / Rekor) ────
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ steps.owner.outputs.value }}/yuzu-${{ matrix.image }}-chisel
        run: |
          # cosign v3.0+ auto-detects the OIDC issuer from the workflow's
          # id-token; an explicit --oidc-issuer is redundant and a hard
          # error in v3 (see docker-publish for the #495 history).
          cosign sign --yes "${IMAGE}@${DIGEST}"
          echo "Signed ${IMAGE}@${DIGEST} with cosign keyless (OIDC)"

      - name: Image summary
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "## Published \`yuzu-${{ matrix.image }}-chisel\` image (multi-arch)"
            echo ""
            echo '```'
            echo "$META_TAGS"
            echo '```'
            echo ""
            echo "**Digest:** \`$BUILD_DIGEST\`"
            echo ""
            echo "Platforms: \`linux/amd64,linux/arm64\` (arm64 via QEMU)."
            echo "Signed with cosign keyless + SLSA provenance attestation."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Agent-bundle delivery image — published + SIGNED after the release ─
  # The 3-triplet agent bundle (yuzu-agent-bundle-chisel) repackages the
  # release's OWN signed agent archives, so it can only be built once the
  # GitHub Release exists -> needs: [release]. It runs on a GitHub-hosted
  # runner (no compilation, just download + repackage; gh/docker/buildx/cosign
  # all preinstalled), reuses scripts/build-agent-bundle.sh as the single
  # source of truth, then signs + SBOMs + attests the pushed image exactly
  # like docker-publish. It is deliberately NOT in the release job's needs:
  # (it depends on release, not vice-versa), so it never gates the release.
  docker-publish-agent-bundle:
    name: "Publish agent-bundle image"
    needs: [release]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    concurrency:
      group: agent-bundle-publish-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
      id-token: write        # cosign keyless + Sigstore OIDC
      attestations: write    # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Lowercase repository owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute version + image ref
        id: ref
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ steps.owner.outputs.value }}/yuzu-agent-bundle-chisel" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          # GHCR_PAT (write:packages-only PAT owned by Tr3kkR) instead
          # of GITHUB_TOKEN so we can push to GHCR packages whose
          # Actions-access policy isn't pinned to this repo (e.g.
          # yuzu-agent-bundle-chisel, originally created via local
          # PAT push). Falls back to GITHUB_TOKEN for fork PRs that
          # don't have access to the secret. Username pinned to the
          # PAT owner ('Tr3kkR') since github.actor varies per actor.
          username: Tr3kkR
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      # Reuse the maintainer script (download release artifacts -> verify by
      # sha256 -> lay out -> buildx multi-arch -> push). GH_TOKEN lets its
      # `gh release download` authenticate against this just-published release.
      - name: Build + push multi-arch agent bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/build-agent-bundle.sh \
            --version "${{ steps.ref.outputs.version }}" \
            --multiarch --push

      - name: Resolve pushed image digest
        id: digest
        run: |
          DIGEST="$(docker buildx imagetools inspect \
            '${{ steps.ref.outputs.image }}:${{ steps.ref.outputs.version }}' \
            --format '{{.Manifest.Digest}}')"
          echo "value=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${{ steps.ref.outputs.image }} digest: ${DIGEST}"

      - name: Generate bundle SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.ref.outputs.image }}@${{ steps.digest.outputs.value }}
          format: cyclonedx-json
          output-file: yuzu-agent-bundle-chisel-image.cdx.json
          artifact-name: yuzu-agent-bundle-chisel-image.cdx.json
          upload-artifact: false

      - name: Generate bundle SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.ref.outputs.image }}@${{ steps.digest.outputs.value }}
          format: spdx-json
          output-file: yuzu-agent-bundle-chisel-image.spdx.json
          artifact-name: yuzu-agent-bundle-chisel-image.spdx.json
          upload-artifact: false

      - name: Upload bundle SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: yuzu-agent-bundle-chisel-image-sbom
          path: |
            yuzu-agent-bundle-chisel-image.cdx.json
            yuzu-agent-bundle-chisel-image.spdx.json
          retention-days: 3

      - name: Attest bundle provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.ref.outputs.image }}
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.digest.outputs.value }}
          IMAGE: ${{ steps.ref.outputs.image }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          echo "Signed ${IMAGE}@${DIGEST} with cosign keyless (OIDC)"

      - name: Bundle summary
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
          VERSION: ${{ steps.ref.outputs.version }}
          DIGEST: ${{ steps.digest.outputs.value }}
        run: |
          {
            echo "## Published \`yuzu-agent-bundle-chisel\` delivery image (multi-arch)"
            echo ""
            echo "**Tag:** \`${IMAGE}:${VERSION}\`  **Digest:** \`${DIGEST}\`"
            echo ""
            echo "Three triplets (linux-x64, windows-x64, macos-arm64); cosign keyless + SLSA provenance + SBOM."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Create GitHub Release ────────────────────────────────────────────
  release:
    name: "Create Release"
    # docker-publish-postgres is in the needs: the composes release-pin
    # ghcr.io/.../yuzu-postgres:X.Y.Z (#1318), so publishing a release
    # whose postgres image failed to push would ship broken composes.
    needs: [build-linux, build-gateway, build-windows, build-macos, docker-publish, docker-publish-postgres]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write   # gh release create
      id-token: write   # cosign sign-blob keyless (SHA256SUMS.sigstore)

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate docker-compose image versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Compose ${YUZU_VERSION:-X.Y.Z} defaults track the stable base
          # version, not rc/beta/alpha suffixes — same convention used by
          # the Extract changelog step below. v0.11.0-rc1 cut (2026-04-18)
          # hit this after all 6 build jobs had already completed.
          BASE_VERSION="${VERSION%%-*}"
          bash scripts/check-compose-versions.sh "$BASE_VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          # Skip docker buildx attestation/provenance artifacts (auto-named
          # `<owner>~<repo>~<random>.dockerbuild`). They consistently fail
          # to download with `Artifact download failed after 5 retries` and
          # the Create Release job needs none of them — the release assets
          # are all `yuzu-*`. This filter killed the v0.10.0 release before
          # it could publish; v0.10.0 had to be assembled manually.
          pattern: 'yuzu-*'

      - name: Package Compose Wizard
        # The Compose Wizard (tools/compose-wizard/) is a browser-based
        # docker-compose.yml + .env generator contributed in PR #405 by
        # @fjarvis. Zero dependencies — extract zip, open index.html, walk
        # the wizard. Bundled here as a release asset so customers can grab
        # it from the Releases page.
        #
        # Conditional on the directory existing — the wizard was merged
        # into main directly in PR #405, so any tag cut from a branch that
        # hasn't reconciled with main may not have it. Skip with a warning
        # rather than fail the release.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -d tools/compose-wizard ]; then
            STAGING="yuzu-compose-wizard-${VERSION}"
            cp -r tools/compose-wizard "$STAGING"
            zip -r "artifacts/yuzu-compose-wizard-${VERSION}.zip" "$STAGING"
            SIZE=$(du -h "artifacts/yuzu-compose-wizard-${VERSION}.zip" | cut -f1)
            echo "Packaged compose wizard: yuzu-compose-wizard-${VERSION}.zip ($SIZE)"
          else
            echo "::warning::tools/compose-wizard not present in this checkout — skipping wizard bundle. See PR #405."
          fi

      - name: Flatten artifacts + SBOMs
        run: |
          cd artifacts
          # Collect archives, installers, AND SBOMs from per-platform
          # upload-artifact subdirs into artifacts/ for uniform handling
          # by the gate script, SHA256SUMS generator, and gh release
          # create. File names are globally unique across jobs (the
          # per-platform suffix is baked into each asset name), so no
          # collisions are expected; fail loud if they happen.
          find . -mindepth 2 -type f \( \
            -name '*.tar.gz' -o \
            -name '*.zip'    -o \
            -name '*.exe'    -o \
            -name '*.deb'    -o \
            -name '*.rpm'    -o \
            -name '*.pkg'    -o \
            -name '*.cdx.json' -o \
            -name '*.spdx.json' \
          \) -exec mv {} . \;

      - name: Verify release artifact completeness
        run: |
          # Gate: every expected archive must have a sibling CycloneDX +
          # SPDX SBOM, and both image SBOMs must be present. Missing any
          # of the above fails the release before we publish anything
          # customers will have to unwind. Tracked as #362 / #408.
          bash scripts/check-release-artifacts.sh artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          # *.zip glob covers both yuzu-windows-x64.zip and yuzu-compose-wizard-*.zip.
          # SBOMs (*.cdx.json, *.spdx.json) are included so customers can
          # verify the SBOM they download matches the SBOM we shipped.
          sha256sum *.tar.gz *.zip *.exe *.deb *.rpm *.pkg *.cdx.json *.spdx.json > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign SHA256SUMS (keyless)
        run: |
          cd artifacts
          # cosign v3.0+ rejects explicit --oidc-issuer when a signing
          # config is in use (auto-detected from the workflow's id-token).
          # See "Sign image (keyless)" earlier in this file for the same
          # fix. v0.11.0-rc0 was the first release to hit this after the
          # cosign-installer 3 → 4 dependabot bump (#495).
          #
          # Output extension is .sigstore (canonical Sigstore Bundle format
          # name) rather than the historical .bundle so the OpenSSF
          # Scorecard Signed-Releases check recognises the asset — its
          # extension regex is `\.(minisig|asc|sig|sign|sigstore)$`. v0.11.0
          # and v0.11.0-rc2 also carry a backfilled .sigstore copy alongside
          # their original .bundle for the same reason; this rename makes
          # every future release Scorecard-visible by default.
          cosign sign-blob --yes SHA256SUMS --bundle SHA256SUMS.sigstore
          echo "Signed SHA256SUMS with cosign (keyless/OIDC)"

      - name: Bundle SLSA attestations as .intoto.jsonl release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          # Each build job calls actions/attest-build-provenance, which
          # uploads the SLSA bundle to GitHub's Attestations API keyed by
          # the artifact's sha256 digest. That registry is invisible to
          # OpenSSF Scorecard's Signed-Releases check, which only walks
          # release *assets* and matches `*.intoto.jsonl` for provenance.
          # Re-attach each bundle as <artifact>.intoto.jsonl so Scorecard
          # sees the attestation. `gh attestation verify` continues to work
          # against the API; offline verification can also now use
          # `gh attestation verify --bundle <file>.intoto.jsonl <file>`.
          while IFS=' ' read -r digest name; do
            name="${name#\*}"
            case "$name" in
              ''|*.cdx.json|*.spdx.json|yuzu-compose-wizard-*) continue ;;
            esac
            # gh api --jq does not apply on 4xx responses, so capture the
            # raw body and require a non-null bundle to materialise.
            body=$(gh api "repos/${{ github.repository }}/attestations/sha256:$digest" 2>/dev/null || true)
            bundle=$(printf '%s' "$body" | jq -c '.attestations[0].bundle // empty' 2>/dev/null || true)
            if [ -z "$bundle" ]; then
              echo "::warning::no attestation for $name (digest sha256:$digest) — skipping"
              continue
            fi
            printf '%s\n' "$bundle" > "${name}.intoto.jsonl"
            echo "wrote ${name}.intoto.jsonl ($(wc -c < "${name}.intoto.jsonl") bytes)"
          done < SHA256SUMS

      - name: Determine if prerelease
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # For pre-release tags (v0.8.0-rc0, v0.8.0-beta1, ...), the CHANGELOG
          # entry is written under the base version (## [0.8.0]), not the rc
          # suffix. Strip anything after the first '-' so rc/beta/alpha tags
          # pull the same section as the eventual stable release.
          BASE_VERSION="${VERSION%%-*}"
          # Extract the section for this version from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${BASE_VERSION}\]/{found=1;next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > changelog_section.md
          fi
          # Check if we got content
          if [ -s changelog_section.md ]; then
            echo "has_changelog=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changelog=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        env:
          HAS_CHANGELOG: ${{ steps.changelog.outputs.has_changelog }}
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${GITHUB_REF_NAME}"

          # Start with changelog content if available
          if [ "$HAS_CHANGELOG" = "true" ]; then
            cat changelog_section.md > release-notes.md
            echo "" >> release-notes.md
          else
            echo "_See commit history for changes in this release._" > release-notes.md
            echo "" >> release-notes.md
          fi

          cat >> release-notes.md <<NOTES_EOF
          ## Enterprise installers

          | Component | Windows | macOS | Debian/Ubuntu | RHEL/Fedora |
          |---|---|---|---|---|
          | Agent | \`.exe\` (InnoSetup) | \`.pkg\` (launchd) | \`.deb\` (systemd) | \`.rpm\` (systemd) |
          | Server | \`.exe\` (InnoSetup) | — | \`.deb\` (systemd) | \`.rpm\` (systemd) |
          | Gateway | — | — | \`.deb\` (systemd) | \`.rpm\` (systemd) |

          ### Windows silent install (GPO / SCCM / Intune)
          \`\`\`powershell
          # Agent
          YuzuAgentSetup-*.exe /VERYSILENT /SERVER=yuzu-server:50051 /TOKEN=<enrollment-token>

          # Server
          YuzuServerSetup-*.exe /VERYSILENT /ADMIN_USER=admin /ADMIN_PASS=<password> \`
            /HTTPS_CERT=cert.pem /HTTPS_KEY=key.pem
          \`\`\`

          ### macOS silent install (Jamf / MDM)
          \`\`\`bash
          sudo installer -pkg YuzuAgent-*.pkg -target /
          \`\`\`

          ### Linux install
          \`\`\`bash
          # Debian/Ubuntu
          sudo dpkg -i yuzu-agent_*.deb
          sudo systemctl edit yuzu-agent  # set --server address

          # RHEL/Fedora
          sudo rpm -i yuzu-agent-*.rpm
          \`\`\`

          ## Platform archives

          | Archive | Platform | Arch |
          |---|---|---|
          | \`yuzu-linux-x64.tar.gz\` | Linux (server + agent) | x86_64 |
          | \`yuzu-linux-arm64.tar.gz\` | Linux (server + agent) | ARM64 (coming soon) |
          | \`yuzu-gateway-linux-x64.tar.gz\` | Linux (gateway) | x86_64 |
          | \`yuzu-windows-x64.zip\` | Windows (server + agent) | x86_64 |
          | \`yuzu-macos-arm64.tar.gz\` | macOS (server + agent) | ARM64 (Apple Silicon) |

          ## Compose Wizard

          \`yuzu-compose-wizard-*.zip\` — browser-based step-by-step
          generator for a customised \`docker-compose.yml\` + \`.env\`.
          Zero dependencies — extract the zip and open \`index.html\` in
          a browser. Contributed by
          [@fjarvis](https://github.com/fjarvis) in
          [#405](https://github.com/${{ github.repository }}/pull/405).

          \`\`\`bash
          unzip yuzu-compose-wizard-*.zip
          cd yuzu-compose-wizard-*
          # Open index.html in your browser, or:
          python3 -m http.server 8000
          \`\`\`

          ## Docker images

          \`\`\`bash
          docker pull ghcr.io/${OWNER}/yuzu-server:${TAG}
          docker pull ghcr.io/${OWNER}/yuzu-gateway:${TAG}
          \`\`\`

          Architecture: \`linux/amd64\`. Images are published to GHCR by this workflow as part of the release.

          ### Verify checksums

          \`\`\`bash
          sha256sum -c SHA256SUMS
          \`\`\`

          ### Verify signature (cosign)

          \`\`\`bash
          cosign verify-blob --bundle SHA256SUMS.sigstore \\
            --certificate-identity-regexp '.*' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            SHA256SUMS
          \`\`\`

          ## Supply chain: SBOM, SLSA provenance, signed images

          Every release ships CycloneDX + SPDX SBOMs per platform
          (\`yuzu-*-{linux-x64,windows-x64,macos-arm64}.{cdx,spdx}.json\`,
          \`yuzu-{server,gateway}-image.{cdx,spdx}.json\`), GitHub-native
          SLSA build provenance attestations for every binary archive
          and Docker image, and cosign keyless signatures on both the
          Docker images and the \`SHA256SUMS\` manifest. See
          [\`docs/user-manual/release-verification.md\`](docs/user-manual/release-verification.md)
          for the full verification workflow (\`gh attestation verify\`,
          \`cosign verify\`, CycloneDX / SPDX validation).

          See the [user manual](docs/user-manual/) for full setup instructions.
          NOTES_EOF
          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PRERELEASE: ${{ steps.prerelease.outputs.is_prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Compose Wizard zip is conditional — Package Compose Wizard step
          # skips with a warning if tools/compose-wizard isn't in the tag's
          # commit tree. Only include if the file actually exists.
          WIZARD_ASSET=()
          if ls artifacts/yuzu-compose-wizard-*.zip >/dev/null 2>&1; then
            WIZARD_ASSET+=(artifacts/yuzu-compose-wizard-*.zip)
          fi

          # Idempotent on re-tag: if the release already exists (e.g.
          # operator deleted + recreated the tag to backfill a CI bug
          # like the chisel-publish concurrency miss in run 26413256206),
          # skip the create+upload so the dependent docker-publish-*
          # jobs can still run cleanly without "release already exists"
          # blowing up Create Release. Asset re-upload would require
          # --clobber per-file and risks signature drift on already-
          # published artifacts; the safer behavior is leave the
          # published release untouched.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "::notice::Release ${GITHUB_REF_NAME} already exists; skipping create+upload (assets already published, signatures preserved)"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "Yuzu ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              ${PRERELEASE_FLAG} \
              artifacts/yuzu-linux-x64.tar.gz \
              artifacts/yuzu-gateway-linux-x64.tar.gz \
              artifacts/yuzu-windows-x64.zip \
              artifacts/YuzuAgentSetup-*.exe \
              artifacts/YuzuServerSetup-*.exe \
              artifacts/YuzuAgent-*.pkg \
              artifacts/yuzu-macos-arm64.tar.gz \
              artifacts/*.deb \
              artifacts/*.rpm \
              artifacts/*.cdx.json \
              artifacts/*.spdx.json \
              artifacts/*.intoto.jsonl \
              artifacts/SHA256SUMS \
              artifacts/SHA256SUMS.sigstore \
              "${WIZARD_ASSET[@]}"
          fi
