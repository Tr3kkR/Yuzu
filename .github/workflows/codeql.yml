name: "CodeQL"

# CodeQL C++ + GitHub Actions static analysis across BOTH self-hosted
# runners, running in parallel:
#   - yuzu-wsl2-linux (labels: self-hosted/Linux/X64/yuzu-shulgi) — gcc-13 build
#   - yuzu-local-windows (labels: self-hosted/Windows/X64) — MSVC build
#
# The Linux leg pins `yuzu-shulgi` explicitly rather than matching the
# bare `[self-hosted, Linux, X64]` label set. Today Shulgi is the only
# Linux runner, but the pin is deliberate: any future overflow runner
# sharing the bare label set must NOT receive this workload unless it
# meets the 40 GB disk threshold CodeQL needs. (A retired Scaleway cloud
# builder sized for nightly Coverage routinely sat below it — run
# 25986790721 died at the disk check at 23 GB free before any CodeQL
# work — which is why the pin exists.) Same selector pattern nightly.yml
# uses for the equivalent meson workload.
#
# The two runs are separate matrix legs with `fail-fast: false`, so a
# quirk on one platform doesn't kill the other. Each leg uploads SARIF
# with a distinct category (`c-cpp-linux` vs `c-cpp-windows`) so
# findings in platform-specific `#ifdef` branches stay attributed to
# the correct analysis.
#
# History:
#   2026-03-23 → 2026-04-13: 7 consecutive cancelled runs on 90-min
#     timeout (Linux-only, single-runner setup).
#   2026-04-13: first successful Linux run in 14m49s (security-extended,
#     build_tests=false, 231/364 C++ files scanned, 0 alerts). Verified
#     the runner is fast and the tracer actually observes compiles.
#   2026-04-13 (same day): coverage knobs flipped to security-and-quality
#     + build_tests=true + languages c-cpp,actions, and the workflow
#     matrixed across Linux + Windows runners to close the #ifdef _WIN32
#     gap that a Linux-only analysis physically cannot reach.
#
# Coverage-knob setup (maximize findings on both platforms):
#   - queries: +security-and-quality (superset of security-extended;
#     on C++, the "quality" queries are security-adjacent: memory leaks,
#     UAF, null deref, dead code hiding logic bugs, inconsistent error
#     handling — not style noise like it would be for JS/Python)
#   - languages: c-cpp,actions on Linux; c-cpp only on Windows (no need
#     to double-scan the same .github/workflows/*.yml)
#   - -Dbuild_tests=true so the CodeQL tracer observes tests/unit/*.cpp
#   - Dedicated per-OS build dirs (build-linux-codeql/ + build-windows-codeql/)
#     isolated from operator's interactive builds and from
#     build-{linux,windows}-{asan,tsan,coverage}/
#   - Pre-build runner disk-free assertion (≥40 GB Linux, ≥45 GB Windows;
#     MSVC debug builds are chunkier)
#   - Daily scheduled run (04:00 UTC, low-activity window)
#   - Manual workflow_dispatch
#
# Known remaining coverage gaps:
#   - Yuzu-specific attack patterns (plugin command execution, audit
#     field drift, RBAC bypass) — need a custom .ql query pack (tracked
#     in issue #371)
#
# Output lands in the Security tab under "Code scanning alerts" with
# distinct categories. Not a required status check — merge decisions do
# not depend on CodeQL finishing. Concurrency group's cancel-in-progress:
# true lets a queued newer run supersede a stale one (cancels BOTH
# matrix legs together).

on:
  workflow_dispatch:
  schedule:
    # Daily 04:00 UTC — off-hours, both runners available. Tightens C++
    # vuln detection from <=7 days to <=24h (folds CodeQL into the Tier-3
    # nightly cadence; it stays a ~20-25 min trace, NOT the PR fast-path).
    # 04:00 is 2h ahead of nightly.yml's 06:00 cron so the two self-hosted
    # Linux workloads don't contend for the Big Tam pool. Both Linux and
    # Windows legs start simultaneously on their respective runners.
    - cron: "0 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  VCPKG_BINARY_SOURCES: "default"
  CCACHE_MAXSIZE: "500M"
  CCACHE_COMPRESS: "true"

jobs:
  analyze:
    name: "Analyze (${{ matrix.os }})"
    permissions:
      contents: read
      security-events: write   # github/codeql-action/upload-sarif
    # Verified Linux wall-clock (2026-04-13, dev@9b16d3c, security-extended,
    # build_tests=false): 14m49s with 155/156 compiles being real misses
    # on a 32-thread runner. Current config (+security-and-quality +
    # build_tests=true + c-cpp,actions) should fit under 60 min on
    # Linux. Windows is typically 1.5-2x slower per TU under MSVC —
    # budget extra headroom. 90 min covers both.
    timeout-minutes: 90
    strategy:
      # fail-fast: false so Linux completes its SARIF upload even if
      # Windows hits a quirk (and vice versa). Each leg's findings land
      # in the Security tab independently.
      fail-fast: false
      matrix:
        include:
          - os: linux
            # yuzu-shulgi pin — see header comment (guards the 40 GB disk
            # threshold against any future overflow Linux runner).
            runner: [self-hosted, Linux, X64, yuzu-shulgi]
            triplet: x64-linux
            vcpkg_bin: vcpkg
            build_dir: build-linux-codeql
            category: "/language:c-cpp-linux"
            languages: "c-cpp,actions"
            ccache_path: ~/.cache/ccache
            ccache_key_prefix: ccache-codeql-linux
            disk_min_gb: 40
            shell: bash
          - os: windows
            runner: [self-hosted, Windows, X64]
            triplet: x64-windows
            vcpkg_bin: vcpkg.exe
            build_dir: build-windows-codeql
            category: "/language:c-cpp-windows"
            # c-cpp only — no need to double-scan the same
            # .github/workflows/*.yml files; the Linux leg covers
            # actions.
            languages: "c-cpp"
            ccache_path: ~\AppData\Local\ccache
            ccache_key_prefix: ccache-codeql-windows
            disk_min_gb: 45
            # The default `shell: bash` on a self-hosted Windows runner
            # resolves to C:\Windows\system32\bash.EXE which is WSL
            # bash. WSL refuses to run as LOCAL SYSTEM (the runner's
            # service account) with WSL_E_LOCAL_SYSTEM_NOT_SUPPORTED.
            # Bypass by explicitly pointing at MSYS2 bash, which is
            # CLAUDE.md's documented Windows development shell and is
            # already installed on the runner (C:\msys64\usr\bin\bash.exe).
            shell: 'C:\msys64\usr\bin\bash.exe --noprofile --norc -eo pipefail {0}'
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        # Per-leg shell override — see the matrix `shell:` values above
        # for why Windows can't use the default `bash` keyword.
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          clean: false
          persist-credentials: false

      # ─── MSVC environment (Windows only) ──────────────────────────
      # CLAUDE.md forbids direct use of vcvars64.bat because it returns
      # exit 1 on optional extension failures. The ilammy/msvc-dev-cmd
      # action wraps vcvarsall.bat and handles the exit code correctly
      # — this is the same action the existing ci.yml Windows job uses
      # and is the sanctioned path for GHA workflows (distinct from
      # setup_msvc_env.sh which is for interactive MSYS2 bash sessions).
      - name: Setup MSVC (windows)
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Assert toolchain available
        run: |
          set -e
          if [[ "${{ matrix.os }}" == "linux" ]]; then
            TOOLS="meson ninja gcc-13 g++-13 ccache python3 cmake pkg-config"
          else
            # MSVC cl is on PATH after ilammy/msvc-dev-cmd. Self-hosted
            # runner must have meson/ninja/ccache/cmake/python pre-baked.
            TOOLS="meson ninja cl ccache cmake python"
          fi
          for tool in $TOOLS; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::$tool not on PATH on ${{ matrix.os }} runner"
              exit 1
            fi
          done
          meson --version
          ccache --version | head -1

      - name: Assert runner disk (>= ${{ matrix.disk_min_gb }} GB free)
        run: |
          # POSIX df -k works on both Linux and MSYS2/git-bash (df -BG
          # is a GNU extension not available in git-bash on Windows).
          free_gb=$(df -k "$GITHUB_WORKSPACE" | awk 'NR==2 {printf "%d", $4/1024/1024}')
          echo "runner disk free: ${free_gb}G on $GITHUB_WORKSPACE"
          if [[ -z "$free_gb" ]] || (( free_gb < ${{ matrix.disk_min_gb }} )); then
            echo "::error::runner disk ${free_gb}G < ${{ matrix.disk_min_gb }} GB required"
            exit 1
          fi

      - name: Clean stale codeql build dir (preserve vcpkg_installed + ccache)
        run: |
          # CodeQL tracer must observe every compile; stale incremental
          # state would cause ccache-hit TUs to be missing from the
          # database. Wipe the build dir each run.
          rm -rf ${{ matrix.build_dir }}

      # ccache (matrix.ccache_path: ~/.cache/ccache on Linux,
      # ~\AppData\Local\ccache on Windows) persists in the runner
      # user's home dir between jobs on both self-hosted runners.
      # vcpkg_installed/ persists in the workspace. Issue #569.
      - name: Reset ccache stats
        run: ccache -z

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: vcpkg sentinel
        # Universal cache-key contract — see scripts/ci/vcpkg-triplet-sentinel.sh.
        # Replaces the prior inline Windows-only sentinel that hashed only
        # `triplets/x64-windows.cmake`, missed manifest + baseline drift,
        # and left `vcpkg_installed/vcpkg/` orphaned after wiping the
        # triplet tree (#741). The shared script invalidates both halves
        # of vcpkg_installed/ together and uses the same key as ci.yml so
        # the binary cache is shared cleanly across workflows.
        # `/usr/bin/bash` (absolute path) — matches the Windows callers
        # in ci.yml:464 and release.yml:439. A bare `bash` does a PATH
        # lookup; on the Windows self-hosted runner `C:\WINDOWS\system32`
        # sits ahead of `C:\msys64\usr\bin`, so bare `bash` resolves to
        # WSL's `C:\Windows\System32\bash.EXE`, which refuses to run
        # under the runner's LocalSystem service account
        # (WSL_E_LOCAL_SYSTEM_NOT_SUPPORTED). `/usr/bin/bash` works on
        # both Linux (real path) and MSYS2 (maps to
        # C:/msys64/usr/bin/bash.exe).
        run: /usr/bin/bash scripts/ci/vcpkg-triplet-sentinel.sh ${{ matrix.triplet }}

      - name: Install vcpkg packages
        env:
          # Persistent binary cache outside the workspace. Without this
          # lukka/run-vcpkg defaults to a per-run UUID temp dir under its
          # own state path → 0% hit rate every run → every port rebuilt
          # from source (~25 min on this runner for grpc + abseil +
          # protobuf). The path matches ci.yml's
          # `yuzu-vcpkg-binary-cache-${matrix.os}` so the binary cache is
          # shared across workflows — the abseil zip is the same artifact
          # whichever workflow built it. runner.tool_cache survives
          # actions/checkout's default clean. Issue #569.
          VCPKG_DEFAULT_BINARY_CACHE: ${{ runner.tool_cache }}/yuzu-vcpkg-binary-cache-${{ matrix.os }}
        run: |
          # Use $GITHUB_WORKSPACE (bash env var, runtime read) instead of
          # ${{ github.workspace }} (GHA source interpolation). On Windows
          # the workspace path contains backslashes (C:\actions-runner\...)
          # and bash's escape processing strips them when interpolated as
          # source text — \a, \Y, \_, etc. all become literal characters
          # without the backslash, collapsing the path. $GITHUB_WORKSPACE
          # is read by bash at runtime so escape rules don't apply, and
          # MSYS2 handles path translation when calling native binaries.
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          "$GITHUB_WORKSPACE/vcpkg/${{ matrix.vcpkg_bin }}" install \
            --triplet ${{ matrix.triplet }} \
            --x-manifest-root="$GITHUB_WORKSPACE"

      # Install Erlang/OTP + rebar3 for the gateway custom_target. The
      # meson `gateway` custom_target fires when `find_program('rebar3')`
      # succeeds at configure time; on the self-hosted Linux runner
      # rebar3 sits at /home/github-runner/.local/bin/rebar3 so the
      # custom_target IS scheduled, and the Build step then dies with
      # `/usr/bin/env: 'escript': No such file or directory` if Erlang
      # isn't on PATH. Gateway is Erlang and contributes zero TUs to
      # C++ CodeQL — CodeQL has no Erlang extractor and dialyzer is
      # the gateway's canonical static-analysis tool (see
      # `.github/workflows/release.yml` line 296, the `gateway-dialyzer`
      # skill, and CLAUDE.md "Always run rebar3 dialyzer"). But the
      # custom_target must succeed or `meson compile` fails the whole
      # job. Mirror ci.yml's "Install Erlang/OTP and rebar3" step
      # verbatim — same pinned SHA, same OTP version, same ImageOS
      # override. Runs reliably on the same yuzu-wsl2-linux runner on
      # every Tier-2 PR build. Replaces the prior `scripts/ensure-erlang.sh`
      # +`$GITHUB_PATH` plumbing (PR #923) which could not find Erlang
      # at all when the runner lacked a kerl/asdf/brew install — the
      # 2026-05-10 and 2026-05-17 scheduled runs both failed on this
      # branch. Linux only — Windows uses build_gateway.py's C:\Erlang
      # junction lookup.
      - name: Install Erlang/OTP and rebar3 (linux)
        if: matrix.os == 'linux'
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        env:
          # erlef/setup-beam can't auto-detect the self-hosted runner OS;
          # the explicit ImageOS hint matches ci.yml:230.
          ImageOS: ubuntu24
        with:
          otp-version: '28'
          rebar3-version: '3.24'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.languages }}
          # The leading `+` means "augment the default suite" (applies
          # to the whole comma-separated list, not to individual items —
          # a stray `+` on the second entry triggers
          # "Specifier for external repository is invalid").
          # security-and-quality — generic CWE coverage (memory leaks,
          #   UAF, null deref, taint to system/popen, etc.).
          # ./.github/codeql/queries — Yuzu-specific queries that the
          #   generic suite cannot encode (per-project directory scope,
          #   plugin ABI conventions, threat model). See qlpack.yml in
          #   that directory and the close-out comment on issue #371
          #   for the design rationale and deferred catalog.
          queries: +security-and-quality,./.github/codeql/queries
          # Scope the scan to first-party code; see the config file for
          # the list of vendored/generated paths that are excluded.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Configure (Meson debug) — linux
        if: matrix.os == 'linux'
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          # ${{ github.workspace }} is inlined directly in step env (NOT
          # via matrix include values) because matrix include values do
          # not expand workflow context expressions. The previous
          # iteration of this file used matrix.cmake_prefix and CMake's
          # protobuf probe failed with "Preliminary CMake check failed"
          # because CMAKE_PREFIX_PATH resolved to literal
          # "/vcpkg_installed/x64-linux" (workspace prefix dropped).
          # On Linux ${{ github.workspace }} is a POSIX path so it works
          # in env values; on Windows it has backslashes that survive
          # the env-var setting (env is set externally to bash) but
          # would BREAK if interpolated into bash source — which is why
          # the run: block below uses $GITHUB_WORKSPACE instead.
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux/lib/pkgconfig
          CMAKE_PREFIX_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux
        run: |
          # build_tests=true recovers tests/unit/*.cpp coverage (the
          # 2026-04-13 baseline run scanned only 231/364 files because
          # tests was skipped).
          meson setup ${{ matrix.build_dir }} \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path="$GITHUB_WORKSPACE/vcpkg_installed/x64-linux" \
            -Dbuild_tests=true

      - name: Configure (Meson debug) — windows
        if: matrix.os == 'windows'
        env:
          CC: ccache cl
          CXX: ccache cl
          # Env values can use ${{ github.workspace }} on Windows because
          # they're set as environment variables by GHA (not interpolated
          # into bash source), so backslashes survive intact and meson +
          # CMake handle Windows-style paths fine. The bash run: block
          # below uses $GITHUB_WORKSPACE so backslash escape processing
          # doesn't strip the path.
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-windows/lib/pkgconfig
          CMAKE_PREFIX_PATH: ${{ github.workspace }}/vcpkg_installed/x64-windows
        run: |
          # -Dcpp_std=vc++latest matches the existing ci.yml Windows job.
          # No --native-file — MSVC defaults pick up cl from the MSVC
          # environment set by ilammy/msvc-dev-cmd above.
          # Note: the gateway custom_target may fail on Windows if
          # rebar3/erl aren't installed on the runner; meson will skip
          # it via the `if command -v rebar3` guard inside meson.build.
          meson setup ${{ matrix.build_dir }} \
            --buildtype=debug \
            -Dcpp_std=vc++latest \
            -Dcmake_prefix_path="$GITHUB_WORKSPACE/vcpkg_installed/x64-windows" \
            -Dbuild_tests=true

      - name: Build (CodeQL-traced)
        # CodeQL's tracer wraps this step's compile invocations to build
        # its database. Full graph traversal required — no --no-rebuild,
        # no partial target selection.
        #
        # CCACHE_RECACHE=true is load-bearing for CodeQL coverage. The
        # tracer attaches to compiler processes; if ccache returns a
        # cached object file without invoking the compiler, the tracer
        # never sees that translation unit and CodeQL's database omits
        # it entirely. With persistent ccache on the self-hosted runner
        # this silently dropped 98% of TUs from the database (e.g. only
        # 1 of 47 plugin .cpp files was reaching analysis), making most
        # custom and standard queries report 0 alerts on plugin code.
        # `RECACHE` forces the compiler to actually run while still
        # updating the cache, so non-CodeQL CI builds keep their cache
        # warm. `CCACHE_DISABLE=true` would also work but would skip
        # the cache update and degrade subsequent CI builds.
        env:
          CCACHE_RECACHE: "true"
        run: meson compile -C ${{ matrix.build_dir }}

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Perform CodeQL Analysis
        # `upload: never` — we need to filter the SARIF before upload
        # because CodeQL's `paths` / `paths-ignore` config keys do not
        # reliably suppress findings whose location is a transitively-
        # included header in compiled C/C++. The `output` directory
        # holds the raw SARIF for post-processing.
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "${{ matrix.category }}"
          output: codeql-sarif
          upload: never

      - name: Filter SARIF (drop non-security findings in vendored/generated paths + Catch2 TEST_CASE FP in tests/)
        # Strips results in vcpkg_installed/, build-*/, vcpkg/, and
        # generated proto code unless the rule has a security-severity.
        # Also strips cpp/unused-static-function in tests/ (Catch2
        # TEST_CASE registration false-positive). Security-severity
        # findings in vendored code are KEPT — even though we cannot
        # patch upstream, a vendor vulnerability that ships in our
        # binary is a real exposure to customers and we need to stay
        # aware of it (track via dedicated vendor-security process).
        #
        # Why this is necessary: CodeQL's paths/paths-ignore config does
        # not reliably suppress C/C++ findings in transitively-included
        # vendored headers. Full writeup:
        #   https://gist.github.com/Tr3kkR/73fbe826634f97e97ebb138f4c6b98d8
        #
        # Implemented in Python rather than jq because jq is not on
        # PATH in the MSYS2 environment used by the Windows self-hosted
        # runner; python is already required by "Assert toolchain
        # available" so the dependency is free. Probe both names because
        # the canonical executable differs by platform: Linux runners
        # have `python3`, Windows MSYS2 runners have `python`.
        run: |
          PYTHON=$(command -v python3 || command -v python)
          if [[ -z "$PYTHON" ]]; then
            echo "::error::no python interpreter on PATH (tried python3, python)"
            exit 1
          fi
          for f in codeql-sarif/*.sarif; do
            "$PYTHON" scripts/ci/filter-codeql-sarif.py "$f"
          done

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: codeql-sarif
          category: "${{ matrix.category }}"
