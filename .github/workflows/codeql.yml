name: "CodeQL"

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md', 'LICENSE', '.gitignore']
  schedule:
    # Weekly on Sundays at 04:00 UTC
    - cron: '0 4 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            gcc-13 g++-13 \
            pkg-config curl zip unzip tar \
            python3-pip
          pip3 install meson==1.9.2

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux \
            --x-manifest-root=${{ github.workspace }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          queries: +security-extended

      - name: Configure (Meson)
        run: |
          meson setup builddir \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux \
            -Dbuild_tests=false

      - name: Build
        run: meson compile -C builddir

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
