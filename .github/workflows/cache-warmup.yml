name: Cache Warmup

on:
  push:
    branches: ['cache-warmup']

env:
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  warmup-arm64:
    name: "Warmup: ARM64 cross-compile vcpkg cache"
    runs-on: self-hosted
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-arm64-linux-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Setup and install vcpkg packages (arm64 cross)
        run: |
          # Clone vcpkg at the pinned commit
          git clone https://github.com/microsoft/vcpkg.git vcpkg-tree
          cd vcpkg-tree
          git checkout ${{ env.VCPKG_COMMIT }}
          ./bootstrap-vcpkg.sh -disableMetrics
          cd ..
          # Install arm64-linux packages
          ./vcpkg-tree/vcpkg install \
            --triplet arm64-linux \
            --x-manifest-root=${{ github.workspace }}
