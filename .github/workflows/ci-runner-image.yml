name: CI Runner Images

on:
  push:
    branches: [main, dev]
    paths:
      - 'deploy/docker/Dockerfile.ci-linux'
      - 'deploy/docker/Dockerfile.ci-gateway'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-ci-linux:
    name: "Build CI Linux image"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push yuzu-ci-linux
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: deploy/docker/Dockerfile.ci-linux
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/yuzu-ci-linux:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/yuzu-ci-linux:${{ github.sha }}
          cache-from: type=gha,scope=ci-linux
          cache-to: type=gha,mode=max,scope=ci-linux

  build-ci-gateway:
    name: "Build CI Gateway image"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push yuzu-ci-gateway
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: deploy/docker/Dockerfile.ci-gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/yuzu-ci-gateway:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/yuzu-ci-gateway:${{ github.sha }}
          cache-from: type=gha,scope=ci-gateway
          cache-to: type=gha,mode=max,scope=ci-gateway
