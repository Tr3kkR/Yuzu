name: CI Runner Images

on:
  push:
    branches: [main, dev]
    paths:
      - 'deploy/docker/Dockerfile.ci-linux'
      - 'deploy/docker/Dockerfile.ci-gateway'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build-ci-linux:
    name: "Build CI Linux image"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write   # docker push to ghcr.io
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          # GHCR_PAT (write:packages-only PAT owned by Tr3kkR) instead
          # of GITHUB_TOKEN so we can push to GHCR packages whose
          # Actions-access policy isn't pinned to this repo. Falls
          # back to GITHUB_TOKEN for fork PRs without secret access.
          username: Tr3kkR
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push yuzu-ci-linux
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile.ci-linux
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/yuzu-ci-linux:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/yuzu-ci-linux:${{ github.sha }}
          cache-from: type=gha,scope=ci-linux
          cache-to: type=gha,mode=max,scope=ci-linux

  build-ci-gateway:
    name: "Build CI Gateway image"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write   # docker push to ghcr.io
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          # GHCR_PAT (write:packages-only PAT owned by Tr3kkR) instead
          # of GITHUB_TOKEN so we can push to GHCR packages whose
          # Actions-access policy isn't pinned to this repo. Falls
          # back to GITHUB_TOKEN for fork PRs without secret access.
          username: Tr3kkR
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push yuzu-ci-gateway
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile.ci-gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/yuzu-ci-gateway:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/yuzu-ci-gateway:${{ github.sha }}
          cache-from: type=gha,scope=ci-gateway
          cache-to: type=gha,mode=max,scope=ci-gateway
