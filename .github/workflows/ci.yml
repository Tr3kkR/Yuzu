name: CI

on:
  push:
    branches: [main, dev, "feature/**", "fix/**"]
    paths-ignore: ['docs/**', '*.md', 'LICENSE', '.gitignore']
  pull_request:
    branches: [main, dev]
    paths-ignore: ['docs/**', '*.md', 'LICENSE', '.gitignore']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MESON_VERSION: "1.9.2"
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  VCPKG_BINARY_SOURCES: "clear"
  CCACHE_MAXSIZE: "500M"
  CCACHE_COMPRESS: "true"

jobs:
  # ── Lint (disabled — clang-format reorders Windows headers and breaks MSVC builds) ──
  # lint:
  #   name: "Lint (clang-format)"
  #   runs-on: ubuntu-24.04
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Install clang-format
  #       run: |
  #         sudo apt-get update
  #         sudo apt-get install -y clang-format-18
  #     - name: Check formatting
  #       run: |
  #         find agents server sdk tests \
  #           -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \
  #           | grep -v '\.pb\.' \
  #           | xargs clang-format-18 --dry-run --Werror

  # ── Proto backward-compatibility ───────────────────────────────────────
  proto-compat:
    name: "Proto backward-compat"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so buf can compare against the merge base
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: "1.50.0"
      - name: Lint protos
        run: buf lint proto
      - name: Check backward compatibility
        run: buf breaking proto --against '.git#subdir=proto,ref=origin/main'

  # ── Linux (GCC + Clang) ────────────────────────────────────────────────
  linux:
    name: "Linux ${{ matrix.compiler }} ${{ matrix.build_type }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-13, clang-18]
        build_type: [debug, release]
        exclude:
          # PRs: only gcc-13 debug (fast feedback)
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}
          - compiler: ${{ github.event_name == 'pull_request' && 'clang-18' || 'NONE' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config curl zip unzip tar python3-pip ccache \
            ${{ matrix.compiler == 'gcc-13' && 'gcc-13 g++-13' || 'clang-18' }}
          pip3 install meson==${{ env.MESON_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-linux-${{ matrix.compiler }}-${{ matrix.build_type }}-
            ccache-linux-${{ matrix.compiler }}-

      - name: Reset ccache stats
        run: ccache -z

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-release-${{ matrix.compiler }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-release-${{ matrix.compiler }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'


      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux-release \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson)
        env:
          CC: ccache ${{ matrix.compiler == 'gcc-13' && 'gcc-13' || 'clang-18' }}
          CXX: ccache ${{ matrix.compiler == 'gcc-13' && 'g++-13' || 'clang++-18' }}
        run: |
          meson setup builddir \
            --native-file meson/native/${{ matrix.compiler == 'gcc-13' && 'linux-gcc13.ini' || 'linux-clang18.ini' }} \
            --buildtype=${{ matrix.build_type }} \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-release \
            -Dbuild_tests=true \
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── Windows (MSVC) ─────────────────────────────────────────────────────
  windows:
    name: "Windows MSVC ${{ matrix.build_type }}"
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        exclude:
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Meson
        run: pip install meson==${{ env.MESON_VERSION }}

      - name: Install ccache
        run: choco install ccache --yes

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ccache
          key: ccache-windows-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-windows-${{ matrix.build_type }}-
            ccache-windows-

      - name: Reset ccache stats
        run: ccache -z

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-windows-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          & "${{ github.workspace }}/vcpkg/vcpkg.exe" install `
            --triplet x64-windows `
            --x-manifest-root="${{ github.workspace }}"

      - name: Configure (Meson)
        env:
          CC: ccache cl
          CXX: ccache cl
        run: |
          meson setup builddir `
            --buildtype=${{ matrix.build_type }} `
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-windows `
            -Dbuild_tests=true `
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── macOS (Apple Clang) ────────────────────────────────────────────────
  macos:
    name: "macOS ${{ matrix.build_type }}"
    runs-on: macos-14  # Apple Silicon
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        exclude:
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake ninja ccache pipx
          pipx install meson==${{ env.MESON_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ccache-macos-${{ matrix.build_type }}-
            ccache-macos-

      - name: Reset ccache stats
        run: ccache -z

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-arm64-osx-release-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-arm64-osx-release-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'


      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet arm64-osx-release \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson)
        env:
          CC: ccache cc
          CXX: ccache c++
        run: |
          meson setup builddir \
            --native-file meson/native/macos-appleclang.ini \
            --buildtype=${{ matrix.build_type }} \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/arm64-osx-release \
            -Dbuild_tests=true \
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── ARM64 Linux cross-compile ──────────────────────────────────────────
  arm64-cross:
    name: "Linux ARM64 cross-compile"
    # Only run on push to main (cross-compile is slow, not needed for every PR)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            pkg-config curl zip unzip tar \
            python3-pip ccache
          pip3 install meson==${{ env.MESON_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-arm64-cross-${{ github.sha }}
          restore-keys: |
            ccache-arm64-cross-

      - name: Reset ccache stats
        run: ccache -z

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-arm64-linux-release-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-arm64-linux-release-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'


      - name: Install vcpkg packages (cross)
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet arm64-linux-release \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson cross)
        env:
          CC: ccache gcc
          CXX: ccache g++
        run: |
          meson setup builddir \
            --cross-file meson/cross/aarch64-linux-gnu.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/arm64-linux-release

      - name: Build
        run: meson compile -C builddir

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── Sanitizers (ASan + UBSan) — main/dev push only ────────────────────
  sanitize-asan:
    name: "Sanitizers (ASan+UBSan)"
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: [linux]
    runs-on: ubuntu-24.04
    env:
      ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          pip3 install meson==${{ env.MESON_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-asan-${{ github.sha }}
          restore-keys: |
            ccache-linux-asan-

      - name: Reset ccache stats
        run: ccache -z

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-release-gcc13-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-release-gcc13-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'


      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux-release \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + ASan/UBSan)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
        run: |
          meson setup builddir \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-release \
            -Dbuild_tests=true \
            -Db_sanitize=address,undefined

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── Sanitizers (TSan) — main/dev push only ─────────────────────────────
  sanitize-tsan:
    name: "Sanitizers (TSan)"
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: [linux]
    runs-on: ubuntu-24.04
    env:
      TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          pip3 install meson==${{ env.MESON_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-tsan-${{ github.sha }}
          restore-keys: |
            ccache-linux-tsan-

      - name: Reset ccache stats
        run: ccache -z

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-release-gcc13-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-release-gcc13-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'


      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux-release \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + TSan)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
        run: |
          meson setup builddir \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-release \
            -Dbuild_tests=true \
            -Db_sanitize=thread

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── Coverage — main/dev push only, after Linux passes ─────────────────
  coverage:
    name: "Coverage (GCC 13)"
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: [linux]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          pip3 install meson==${{ env.MESON_VERSION }} gcovr

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-linux-coverage-${{ github.sha }}
          restore-keys: |
            ccache-linux-coverage-

      - name: Reset ccache stats
        run: ccache -z

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-release-gcc13-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-release-gcc13-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'


      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux-release \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + coverage)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
        run: |
          meson setup builddir \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux-release \
            -Dbuild_tests=true \
            -Db_coverage=true

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: Generate coverage reports
        run: |
          gcovr --root . \
            --filter 'server/' --filter 'agents/' --filter 'sdk/' --filter 'tests/' \
            --exclude '.*\.pb\.(h|cc)$' \
            --branches \
            --xml -o builddir/coverage.xml
          gcovr --root . \
            --filter 'server/' --filter 'agents/' --filter 'sdk/' --filter 'tests/' \
            --exclude '.*\.pb\.(h|cc)$' \
            --branches \
            --html --html-details -o builddir/coverage-html/index.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: builddir/coverage.xml
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: builddir/coverage-html/

      - name: ccache stats
        if: always()
        run: ccache -s
