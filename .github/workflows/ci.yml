name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MESON_VERSION: "1.9.2"
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"

jobs:
  # ── Linux (GCC + Clang) ────────────────────────────────────────────────────
  linux:
    name: "Linux ${{ matrix.compiler }} ${{ matrix.build_type }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-13, clang-17]
        build_type: [debug, release]
        exclude:
          # PRs only run debug to halve feedback time; push to main runs all.
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            gcc-13 g++-13 clang-17 \
            pkg-config curl zip unzip tar \
            python3-pip
          pip3 install meson==${{ env.MESON_VERSION }}

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg/installed
          key: vcpkg-x64-linux-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson)
        run: |
          meson setup builddir \
            --native-file meson/native/${{ matrix.compiler == 'gcc-13' && 'linux-gcc13.ini' || 'linux-clang17.ini' }} \
            --buildtype=${{ matrix.build_type }} \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg/installed/x64-linux \
            -Dbuild_tests=true \
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

  # ── Windows (MSVC) ─────────────────────────────────────────────────────────
  windows:
    name: "Windows MSVC ${{ matrix.build_type }}"
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        exclude:
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Meson
        run: pip install meson==${{ env.MESON_VERSION }}

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg/installed
          key: vcpkg-x64-windows-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          & "${{ github.workspace }}/vcpkg/vcpkg.exe" install `
            --triplet x64-windows `
            --x-manifest-root="${{ github.workspace }}"

      - name: Configure (Meson)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          meson setup builddir ^
            --buildtype=${{ matrix.build_type }} ^
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg/installed/x64-windows ^
            -Dbuild_tests=true ^
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          meson compile -C builddir

      - name: Test
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          meson test -C builddir --print-errorlogs

  # ── macOS (Apple Clang) ────────────────────────────────────────────────────
  macos:
    name: "macOS ${{ matrix.build_type }}"
    runs-on: macos-14  # Apple Silicon
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        exclude:
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake ninja pipx
          pipx install meson==${{ env.MESON_VERSION }}

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg/installed
          key: vcpkg-arm64-osx-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet arm64-osx \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson)
        run: |
          meson setup builddir \
            --native-file meson/native/macos-appleclang.ini \
            --buildtype=${{ matrix.build_type }} \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg/installed/arm64-osx \
            -Dbuild_tests=true \
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

  # ── ARM64 Linux cross-compile ──────────────────────────────────────────────
  arm64-cross:
    name: "Linux ARM64 cross-compile ${{ matrix.build_type }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        exclude:
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}

    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            pkg-config curl zip unzip tar \
            python3-pip
          pip3 install meson==${{ env.MESON_VERSION }}

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg/installed
          key: vcpkg-arm64-linux-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages (cross)
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet arm64-linux \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson — cross)
        run: |
          meson setup builddir \
            --cross-file meson/cross/aarch64-linux-gnu.ini \
            --buildtype=${{ matrix.build_type }} \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg/installed/arm64-linux \
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C builddir
