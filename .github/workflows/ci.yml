name: CI

on:
  # push fires only on mainline branches (merges into dev/main) so feature/
  # fix branches with an open PR run CI exactly once via pull_request rather
  # than the previous duplicate (push + pull_request). For pre-PR feature
  # work, open the PR earlier or use workflow_dispatch.
  push:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/runner-inventory.json'
      - '.github/workflows/runner-inventory-sentinel.yml'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/runner-inventory.json'
      - '.github/workflows/runner-inventory-sentinel.yml'
  workflow_dispatch:

# Scorecard Token-Permissions hardening: ci.yml builds and tests only —
# no registry pushes, no release creation. contents:read is all that's
# needed. (Image pushes live in ci-runner-image.yml, which keeps its
# packages:write.)
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # meson pin lives in requirements-ci.txt (pip ecosystem tracked by
  # Dependabot). vcpkg baseline is tracked by the scheduled
  # .github/workflows/vcpkg-baseline-update.yml workflow.
  VCPKG_COMMIT: "4b77da7fed37817f124936239197833469f1b9a8"
  VCPKG_BINARY_SOURCES: "default"
  CCACHE_MAXSIZE: "500M"
  CCACHE_COMPRESS: "true"

jobs:
  # ── Lint (disabled — clang-format reorders Windows headers and breaks MSVC builds) ──
  # lint:
  #   name: "Lint (clang-format)"
  #   runs-on: ubuntu-24.04
  #   steps:
  #     - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  #     - name: Install clang-format
  #       run: |
  #         sudo apt-get update
  #         sudo apt-get install -y clang-format-18
  #     - name: Check formatting
  #       run: |
  #         find agents server sdk tests \
  #           -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \
  #           | grep -v '\.pb\.' \
  #           | xargs clang-format-18 --dry-run --Werror

  # ── Proto backward-compatibility ───────────────────────────────────────
  proto-compat:
    name: "Proto backward-compat"
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need history so buf can compare against the merge base
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: "1.50.0"
      - name: Lint protos
        run: buf lint proto
      - name: Check backward compatibility
        run: buf breaking proto --against '.git#subdir=proto,ref=origin/main'

  # ── Linux (GCC + Clang, self-hosted yuzu-wsl2-linux) ──────────────────
  linux:
    name: "Linux ${{ matrix.compiler }} ${{ matrix.build_type }}"
    # Self-hosted: Shulgi 5950X WSL2 Ubuntu. Persistent ccache + vcpkg
    # state between runs on the same workspace amortizes the install
    # cost. Trade-off: the single runner process serializes this 4-way
    # matrix, so multi-commit pushes are slower end-to-end than on the
    # parallel ubuntu-24.04 fleet. Mirrors the Windows migration in
    # #374 — the optimization target is Actions-minute spend, not
    # per-PR latency.
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-13, clang-19]
        build_type: [debug, release]
        exclude:
          # PRs: only gcc-13 debug (fast feedback)
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}
          - compiler: ${{ github.event_name == 'pull_request' && 'clang-19' || 'NONE' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config curl zip unzip tar python3-pip ccache \
            ${{ matrix.compiler == 'gcc-13' && 'gcc-13 g++-13' || 'clang-19' }}
          pip3 install --user --break-system-packages --require-hashes -r requirements-ci.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ccache
          key: ccache-linux-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-linux-${{ matrix.compiler }}-${{ matrix.build_type }}-
            ccache-linux-${{ matrix.compiler }}-

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-${{ matrix.compiler }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-${{ matrix.compiler }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson)
        env:
          CC: ccache ${{ matrix.compiler == 'gcc-13' && 'gcc-13' || 'clang-19' }}
          CXX: ccache ${{ matrix.compiler == 'gcc-13' && 'g++-13' || 'clang++-19' }}
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux/lib/pkgconfig
        run: |
          meson setup builddir \
            --native-file meson/native/${{ matrix.compiler == 'gcc-13' && 'linux-gcc13.ini' || 'linux-clang19.ini' }} \
            --buildtype=${{ matrix.build_type }} \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux \
            -Dbuild_tests=true \
            ${{ matrix.build_type == 'release' && matrix.compiler == 'gcc-13' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── Windows (MSVC, self-hosted yuzu-local-windows) ─────────────────────
  windows:
    name: "Windows MSVC ${{ matrix.build_type }}"
    # Self-hosted: 32-core / 48 GB host. gRPC alone takes ~90 min on the
    # GitHub-hosted 4-vCPU windows-2022 runners; self-hosted with cl /MP
    # finishes in a fraction of that and avoids the GitHub Actions minute
    # drain. Per-PR turnaround on the dependabot rollout is the
    # optimization target. See issue #374 for the full migration rationale.
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 120
    defaults:
      run:
        # The default `bash` keyword on a self-hosted Windows runner
        # resolves to C:\Windows\system32\bash.EXE which is WSL bash.
        # WSL refuses to run as LOCAL SYSTEM (the runner's service
        # account) with WSL_E_LOCAL_SYSTEM_NOT_SUPPORTED. Bypass by
        # explicitly pointing at MSYS2 bash, which is CLAUDE.md's
        # documented Windows development shell and is already installed
        # on the runner. Same pattern as codeql.yml's Windows leg.
        shell: 'C:\msys64\usr\bin\bash.exe --noprofile --norc -eo pipefail {0}'
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        exclude:
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Assert toolchain available
        run: |
          set -e
          # Self-hosted runner must have these pre-baked. Fail fast with
          # a specific error rather than producing weird build failures.
          for tool in meson ninja cl ccache cmake python; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "::error::$tool not on PATH on yuzu-local-windows runner"
              exit 1
            fi
          done
          meson --version
          ccache --version | head -1

      - name: Assert runner disk (>= 45 GB free)
        run: |
          # Debug + release vcpkg trees + ccache + build artifacts can
          # easily exceed 30 GB. Fail fast rather than hitting "no space
          # left on device" 30 min into the build.
          free_gb=$(df -k "$GITHUB_WORKSPACE" | awk 'NR==2 {printf "%d", $4/1024/1024}')
          echo "runner disk free: ${free_gb}G on $GITHUB_WORKSPACE"
          if [[ -z "$free_gb" ]] || (( free_gb < 45 )); then
            echo "::error::runner disk ${free_gb}G < 45 GB required"
            exit 1
          fi

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Force fresh vcpkg install when triplet changed
        run: |
          # The persistent runner workspace accumulates a
          # vcpkg_installed/x64-windows tree from prior runs. vcpkg's
          # incremental install keys off the manifest only — it does NOT
          # detect overlay-triplet content edits. A triplet change
          # (e.g. removing `VCPKG_BUILD_TYPE release` to enable debug
          # variants — the LNK2038 fix on dev) silently leaves the
          # existing release-only tree in place, and the debug build
          # then fails to link with _ITERATOR_DEBUG_LEVEL mismatches
          # against absl_*.lib. Reconcile by wiping the install root
          # whenever the recorded triplet hash drifts. Same approach as
          # codeql.yml's mirror step.
          installed_dir="$GITHUB_WORKSPACE/vcpkg_installed/x64-windows"
          sentinel="$GITHUB_WORKSPACE/vcpkg_installed/.x64-windows-triplet.sha256"
          want=$(sha256sum triplets/x64-windows.cmake | awk '{print $1}')
          have=$(cat "$sentinel" 2>/dev/null || echo "")
          if [[ "$want" != "$have" ]]; then
            echo "x64-windows triplet sha256 drift: have=$have want=$want — wiping vcpkg_installed/x64-windows"
            rm -rf "$installed_dir"
            mkdir -p "$GITHUB_WORKSPACE/vcpkg_installed"
            echo "$want" > "$sentinel"
          else
            echo "x64-windows triplet sha256 unchanged — keeping persistent vcpkg_installed/x64-windows"
          fi

      - name: Install vcpkg packages
        run: |
          # Use $GITHUB_WORKSPACE (bash env var, runtime read) instead of
          # ${{ github.workspace }} (GHA source interpolation). On Windows
          # the workspace path contains backslashes and bash's escape
          # processing strips them when interpolated as source text.
          "$GITHUB_WORKSPACE/vcpkg/vcpkg.exe" install \
            --triplet x64-windows \
            --x-manifest-root="$GITHUB_WORKSPACE"

      - name: Configure (Meson)
        env:
          CC: ccache cl
          CXX: ccache cl
          CMAKE_PREFIX_PATH: ${{ github.workspace }}/vcpkg_installed/x64-windows
        run: |
          meson setup build-windows-ci \
            --buildtype=${{ matrix.build_type }} \
            -Dcpp_std=vc++latest \
            -Dcmake_prefix_path="$GITHUB_WORKSPACE/vcpkg_installed/x64-windows" \
            -Dbuild_tests=true \
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C build-windows-ci

      - name: Test
        run: |
          if [[ "${{ matrix.build_type }}" == "debug" ]]; then
            bin_dir="$GITHUB_WORKSPACE/vcpkg_installed/x64-windows/debug/bin"
          else
            bin_dir="$GITHUB_WORKSPACE/vcpkg_installed/x64-windows/bin"
          fi
          export PATH="$bin_dir:$GITHUB_WORKSPACE/vcpkg_installed/x64-windows/tools/protobuf:$GITHUB_WORKSPACE/vcpkg_installed/x64-windows/tools/grpc:$PATH"
          meson test -C build-windows-ci --print-errorlogs

      # meson+ninja truncate test stdout to the last 100 lines in the Actions
      # UI. testlog.txt in meson-logs/ contains the full Catch2 output for
      # every failed test — without this artifact, a multi-assertion failure
      # only exposes ONE expansion in the workflow log. Issue #501.
      - name: Upload meson-logs on test failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: meson-logs-windows-${{ matrix.build_type }}-${{ github.run_attempt }}
          path: build-windows-ci/meson-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── macOS (Apple Clang) ────────────────────────────────────────────────
  macos:
    name: "macOS ${{ matrix.build_type }}"
    runs-on: macos-15  # Apple Silicon, Xcode 16 / Apple Clang 16
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        exclude:
          - build_type: ${{ github.event_name == 'pull_request' && 'release' || 'NONE' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake ninja ccache pipx
          # awk strips the trailing ` \` that pip-compile adds when the
          # requirement is continued by `--hash=...` lines.
          pipx install "$(awk '/^meson==/ {print $1}' requirements-ci.txt)"

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          save-always: true
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ matrix.build_type }}-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-macos-${{ matrix.build_type }}-
            ccache-macos-

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          save-always: true
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-arm64-osx-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-arm64-osx-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet arm64-osx \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson)
        env:
          CC: ccache cc
          CXX: ccache c++
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/arm64-osx/lib/pkgconfig
        run: |
          meson setup builddir \
            --native-file meson/native/macos-appleclang.ini \
            --buildtype=${{ matrix.build_type }} \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/arm64-osx \
            -Dbuild_tests=true \
            ${{ matrix.build_type == 'release' && '-Db_lto=true' || '' }}

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── Sanitizers (ASan + UBSan) — main/dev push only ────────────────────
  sanitize-asan:
    name: "Sanitizers (ASan+UBSan)"
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: [linux]
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 60
    env:
      ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          pip3 install --user --break-system-packages --require-hashes -r requirements-ci.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ccache
          key: ccache-linux-asan-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-linux-asan-

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-gcc13-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-gcc13-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + ASan/UBSan)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux/lib/pkgconfig
        run: |
          meson setup builddir \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux \
            -Dbuild_tests=true \
            -Db_sanitize=address,undefined

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── Sanitizers (TSan) — main/dev push only ─────────────────────────────
  sanitize-tsan:
    name: "Sanitizers (TSan)"
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: [linux]
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 60
    env:
      TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          pip3 install --user --break-system-packages --require-hashes -r requirements-ci.txt
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ccache
          key: ccache-linux-tsan-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-linux-tsan-

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-gcc13-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-gcc13-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + TSan)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux/lib/pkgconfig
        run: |
          meson setup builddir \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux \
            -Dbuild_tests=true \
            -Db_sanitize=thread

      - name: Build
        run: meson compile -C builddir

      - name: Test
        run: meson test -C builddir --print-errorlogs

      - name: ccache stats
        if: always()
        run: ccache -s

  # ── Coverage — main/dev push only, after Linux passes ─────────────────
  coverage:
    name: "Coverage (GCC 13)"
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: [linux]
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            pkg-config curl zip unzip tar python3-pip ccache
          # requirements-ci.txt is hash-pinned; gcovr is not (it's a coverage
          # tool pulled in only for this job). --require-hashes applies per
          # invocation, so split install into two steps.
          pip3 install --user --break-system-packages --require-hashes -r requirements-ci.txt
          pip3 install --user --break-system-packages gcovr
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache ccache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ccache
          key: ccache-linux-coverage-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ccache-linux-coverage-

      - name: Reset ccache stats
        run: ccache -z

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg installed packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/vcpkg_installed
          key: vcpkg-x64-linux-gcc13-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-x64-linux-gcc13-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install vcpkg packages
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet x64-linux \
            --x-manifest-root=${{ github.workspace }}

      - name: Configure (Meson + coverage)
        env:
          CC: ccache gcc-13
          CXX: ccache g++-13
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/x64-linux/lib/pkgconfig
        run: |
          meson setup build-linux \
            --native-file meson/native/linux-gcc13.ini \
            --buildtype=debug \
            -Dcmake_prefix_path=${{ github.workspace }}/vcpkg_installed/x64-linux \
            -Dbuild_tests=true \
            -Db_coverage=true

      - name: Build
        run: meson compile -C build-linux

      - name: Test
        run: meson test -C build-linux --print-errorlogs

      - name: Generate coverage reports
        run: |
          # --gcov-ignore-parse-errors=negative_hits.warn: tests/unit/test_metrics_perf.cpp
          # runs hot concurrent writer loops that cause gcov's branch counters to race into
          # negative values ("branch 2 taken -2 (fallthrough)"). gcovr's own error message
          # suggests this flag as the fix; it downgrades the parse error to a warning so the
          # rest of the coverage report still generates. If coverage fidelity on that one
          # file ever matters, switch to per-thread .gcda output or add
          # #pragma GCC optimize("no-profile-arcs") around the hot loop.
          gcovr --root . \
            --filter 'server/' --filter 'agents/' --filter 'sdk/' --filter 'tests/' \
            --exclude '.*\.pb\.(h|cc)$' \
            --branches \
            --gcov-ignore-parse-errors=negative_hits.warn \
            --xml -o build-linux/coverage.xml
          # gcovr's -o does not create parent directories; --html-details emits
          # a multi-file report so the parent must exist before the invocation.
          mkdir -p build-linux/coverage-html
          gcovr --root . \
            --filter 'server/' --filter 'agents/' --filter 'sdk/' --filter 'tests/' \
            --exclude '.*\.pb\.(h|cc)$' \
            --branches \
            --gcov-ignore-parse-errors=negative_hits.warn \
            --html --html-details -o build-linux/coverage-html/index.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: build-linux/coverage.xml
          fail_ci_if_error: false

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build-linux/coverage-html/

      - name: ccache stats
        if: always()
        run: ccache -s
