## Yuzu UAT Stack — Self-contained, single-file deployment
##
## Usage:
##   docker compose -f docker-compose.uat.yml up -d
##   docker compose -f docker-compose.uat.yml logs -f
##   docker compose -f docker-compose.uat.yml down -v
##
## Dashboard:   http://localhost:8080  (admin / adminpassword1)
## Grafana:     http://localhost:3000  (admin / admin)
## Prometheus:  http://localhost:9090
## ClickHouse:  http://localhost:8123  (default / yuzu)
##
## Connect an agent:
##   yuzu-agent --server localhost:50061 --no-tls
##   (approve the agent in Settings, then restart the agent)

configs:
  server-cfg:
    content: |
      admin:admin:ab3585560da45a7b7da0a220c922dd72:25e957743ebefd48d938b30cdd117ef4487897da209e0e8883dd473363dceb8a
  gateway-sys-config:
    content: |
      [
          {yuzu_gw, [
              {agent_listen_addr, "0.0.0.0"},
              {agent_listen_port, 50051},
              {mgmt_listen_addr, "0.0.0.0"},
              {mgmt_listen_port, 50063},
              {upstream_addr, "server"},
              {upstream_port, 50055},
              {upstream_pool_size, 32},
              {heartbeat_batch_interval_ms, 1000},
              {default_command_timeout_s, 300},
              {prometheus_port, 9568},
              {health_port, 8081},
              {telemetry_gauge_interval_ms, 10000},
              {circuit_breaker_failure_threshold, 5},
              {circuit_breaker_reset_timeout_ms, 10000},
              {circuit_breaker_max_reset_timeout_ms, 300000},
              {backpressure_threshold, 1000},
              {hash_ring_vnodes, 256}
          ]},
          {grpcbox, [
              {client, #{channels => [
                  {default_channel, [{http, "server", 50055, []}], #{}}
              ]}},
              {servers, [
                  #{grpc_opts => #{
                      service_protos => [agent_pb],
                      services => #{'yuzu.agent.v1.AgentService' => yuzu_gw_agent_service}
                  },
                  listen_opts => #{port => 50051, ip => {0,0,0,0}}},
                  #{grpc_opts => #{
                      service_protos => [management_pb],
                      services => #{'yuzu.server.v1.ManagementService' => yuzu_gw_mgmt_service}
                  },
                  listen_opts => #{port => 50063, ip => {0,0,0,0}}}
              ]}
          ]},
          {kernel, [
              {connect_all, false},
              {net_ticktime, 30},
              {logger_level, info},
              {logger, [
                  {handler, default, logger_std_h, #{
                      level => info,
                      formatter => {logger_formatter, #{
                          template => [time, " [", level, "] ", pid, " ", msg, "\n"]
                      }}
                  }}
              ]}
          ]}
      ].
  prometheus-config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
      scrape_configs:
        - job_name: 'yuzu-server'
          metrics_path: '/metrics'
          static_configs:
            - targets: ['server:8080']
              labels:
                component: 'server'
        - job_name: 'yuzu-gateway'
          metrics_path: '/metrics'
          static_configs:
            - targets: ['gateway:9568']
              labels:
                component: 'gateway'
  grafana-datasource:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false
  grafana-dashboard-provider:
    content: |
      apiVersion: 1
      providers:
        - name: Yuzu
          orgId: 1
          folder: Yuzu
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards
            foldersFromFilesStructure: false
  grafana-dashboard-main:
    file: deploy/grafana/yuzu-dashboard.json
  grafana-dashboard-fleet:
    file: deploy/grafana/yuzu-fleet-dashboard.json
  grafana-dashboard-gateway:
    file: deploy/grafana/yuzu-gateway-dashboard.json
  grafana-dashboard-analytics:
    file: deploy/grafana/yuzu-analytics-dashboard.json
  clickhouse-init:
    content: |
      CREATE DATABASE IF NOT EXISTS yuzu;
      CREATE TABLE IF NOT EXISTS yuzu.yuzu_events (
          tenant_id       LowCardinality(String)  DEFAULT 'default',
          agent_id        String                  DEFAULT '',
          session_id      String                  DEFAULT '',
          event_type      LowCardinality(String),
          event_time      DateTime64(3, 'UTC'),
          ingest_time     DateTime64(3, 'UTC')    DEFAULT now64(3),
          plugin          LowCardinality(String)  DEFAULT '',
          capability      LowCardinality(String)  DEFAULT '',
          correlation_id  String                  DEFAULT '',
          severity        Enum8('debug'=0,'info'=1,'warn'=2,'error'=3,'critical'=4) DEFAULT 'info',
          source          LowCardinality(String)  DEFAULT 'server',
          hostname        String                  DEFAULT '',
          os              LowCardinality(String)  DEFAULT '',
          arch            LowCardinality(String)  DEFAULT '',
          agent_version   LowCardinality(String)  DEFAULT '',
          principal       String                  DEFAULT '',
          principal_role  LowCardinality(String)  DEFAULT '',
          attributes      String                  DEFAULT '{}',
          payload         String                  DEFAULT '{}',
          schema_version  UInt8                   DEFAULT 1
      ) ENGINE = MergeTree()
        PARTITION BY toYYYYMM(event_time)
        ORDER BY (tenant_id, event_type, event_time, agent_id)
        TTL toDate(event_time) + INTERVAL 365 DAY;
      ALTER TABLE yuzu.yuzu_events ADD INDEX IF NOT EXISTS idx_agent_id agent_id TYPE bloom_filter GRANULARITY 4;
      ALTER TABLE yuzu.yuzu_events ADD INDEX IF NOT EXISTS idx_correlation_id correlation_id TYPE bloom_filter GRANULARITY 4;
      ALTER TABLE yuzu.yuzu_events ADD INDEX IF NOT EXISTS idx_hostname hostname TYPE bloom_filter GRANULARITY 4;
      CREATE MATERIALIZED VIEW IF NOT EXISTS yuzu.mv_command_duration_hourly
      ENGINE = AggregatingMergeTree()
      PARTITION BY toYYYYMM(hour)
      ORDER BY (tenant_id, plugin, hour)
      AS SELECT
          tenant_id, plugin,
          toStartOfHour(event_time) AS hour,
          quantileState(0.5)(JSONExtractFloat(payload, 'duration_ms'))  AS p50,
          quantileState(0.95)(JSONExtractFloat(payload, 'duration_ms')) AS p95,
          quantileState(0.99)(JSONExtractFloat(payload, 'duration_ms')) AS p99,
          countState() AS total
      FROM yuzu.yuzu_events
      WHERE event_type = 'command.completed'
      GROUP BY tenant_id, plugin, hour;
      CREATE MATERIALIZED VIEW IF NOT EXISTS yuzu.mv_agent_activity_daily
      ENGINE = SummingMergeTree()
      PARTITION BY toYYYYMM(day)
      ORDER BY (tenant_id, agent_id, day, event_type)
      AS SELECT
          tenant_id, agent_id,
          toDate(event_time) AS day,
          event_type,
          count() AS event_count
      FROM yuzu.yuzu_events
      GROUP BY tenant_id, agent_id, day, event_type;

services:
  # ── Yuzu Server ──────────────────────────────────────────────────────
  server:
    image: ghcr.io/tr3kkr/yuzu-server:${YUZU_VERSION:-0.12.0}
    container_name: yuzu-server
    restart: unless-stopped
    ports:
      - "8092:8080"     # Web dashboard + REST API
      - "50051:50051"   # Agent gRPC (direct-connect agents)
      - "50052:50052"   # Management gRPC
      - "50055:50055"   # Gateway upstream
    environment:
      - YUZU_LOG_LEVEL=info
      - YUZU_LOG_FORMAT=json
    command:
      - "--listen"
      - "0.0.0.0:50051"
      - "--no-tls"
      - "--no-https"
      - "--web-address"
      - "0.0.0.0"
      - "--web-port"
      - "8080"
      - "--config"
      - "/etc/yuzu/yuzu-server.cfg"
      - "--data-dir"
      - "/var/lib/yuzu"
      - "--gateway-upstream"
      - "0.0.0.0:50055"
      - "--gateway-mode"
      - "--gateway-command-addr"
      - "gateway:50063"
      - "--metrics-no-auth"
      - "--clickhouse-url"
      - "http://clickhouse:8123"
      - "--clickhouse-database"
      - "yuzu"
      - "--clickhouse-table"
      - "yuzu_events"
      - "--clickhouse-user"
      - "default"
      - "--clickhouse-password"
      - "yuzu"
    configs:
      - source: server-cfg
        target: /etc/yuzu/yuzu-server.cfg
    volumes:
      - server-data:/var/lib/yuzu
    # Healthcheck uses bash's /dev/tcp pseudo-device (issue #622).
    # `curl` is not installed in the server runtime image, and `CMD-SHELL`
    # invokes `/bin/sh` which on Ubuntu 24.04 is `dash` and does not
    # implement /dev/tcp — so we must invoke `bash` explicitly.
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /livez HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      clickhouse:
        condition: service_healthy

  # ── Yuzu Gateway (Erlang/OTP) ────────────────────────────────────────
  gateway:
    image: ghcr.io/tr3kkr/yuzu-gateway:${YUZU_VERSION:-0.12.0}
    container_name: yuzu-gateway
    restart: unless-stopped
    ports:
      - "50061:50051"   # Agent-facing gRPC (mapped to host 50061 to avoid conflict)
      - "50063:50063"   # Management/command forwarding
      - "8081:8081"     # Health/readiness
      - "9568:9568"     # Prometheus metrics
    environment:
      - YUZU_GW_TLS_ENABLED=false
    configs:
      - source: gateway-sys-config
        target: /opt/yuzu_gw/releases/0.2.0/sys.config
    # Gateway runtime is alpine:3.23 — busybox `wget` is available;
    # `bash` is not. `--spider` exits non-zero on HTTP failure.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    # Matches deploy/docker/docker-compose.uat.yml; bump both together.
    image: prom/prometheus:v3.2.1@sha256:6927e0919a144aa7616fd0137d4816816d42f6b816de3af269ab065250859a62
    container_name: yuzu-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      - server
      - gateway

  # ── Grafana ──────────────────────────────────────────────────────────
  grafana:
    # Matches deploy/docker/docker-compose.uat.yml; bump both together.
    image: grafana/grafana:11.5.2@sha256:8b37a2f028f164ce7b9889e1765b9d6ee23fec80f871d156fbf436d6198d32b7
    container_name: yuzu-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    configs:
      - source: grafana-datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml
      - source: grafana-dashboard-provider
        target: /etc/grafana/provisioning/dashboards/yuzu.yml
      - source: grafana-dashboard-main
        target: /var/lib/grafana/dashboards/yuzu-dashboard.json
      - source: grafana-dashboard-fleet
        target: /var/lib/grafana/dashboards/yuzu-fleet-dashboard.json
      - source: grafana-dashboard-gateway
        target: /var/lib/grafana/dashboards/yuzu-gateway-dashboard.json
      - source: grafana-dashboard-analytics
        target: /var/lib/grafana/dashboards/yuzu-analytics-dashboard.json
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── ClickHouse ───────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.12@sha256:a65ca89ddbe8e04a05036dd7d7110a203256293b407b9359130ed5e4333f45ff
    container_name: yuzu-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"     # HTTP interface
      - "9000:9000"     # Native protocol
    environment:
      - CLICKHOUSE_DB=yuzu
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=yuzu
    configs:
      - source: clickhouse-init
        target: /docker-entrypoint-initdb.d/init.sql
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "yuzu", "-q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  server-data:
  prometheus-data:
  grafana-data:
  clickhouse-data:
