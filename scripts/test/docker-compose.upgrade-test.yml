## docker-compose.upgrade-test.yml — purpose-built for /test Phase 2.
##
## This is a minimal copy of deploy/docker/docker-compose.reference.yml
## tailored to the upgrade test:
##
##   - NO `container_name:` so multiple parallel test runs (different
##     --project-name values) do not collide with each other or with a
##     running production stack
##   - NO agent service — the data-preservation test only needs the server.
##     Agent OTA testing happens in Phase 3 with its own harness.
##   - Bind-mount the credentials file from a host path under /etc/yuzu/
##     (NOT under /var/lib/yuzu/ — see CRITICAL note below).
##   - Explicit `command:` block that overrides the Dockerfile CMD so
##     --config points at /etc/yuzu/yuzu-server.cfg, not the in-volume path.
##   - Same bash /dev/tcp healthcheck that targets /readyz (compound-fix
##     readiness contract from #339).
##
## CRITICAL: The cred file MUST mount to /etc/yuzu/, not /var/lib/yuzu/.
## Mounting a file inside a directory that's also covered by a named
## volume is a documented Docker race: the volume creates the directory,
## then Docker's mount resolution may either (a) place the bind-mount
## inside the volume directory (works) or (b) interpret the bind-mount
## target as a directory and silently shadow the file (fails). The
## existing deploy/docker/docker-compose.full-uat.yml uses the same
## /etc/yuzu/ split and is the model to mirror.
##
## Required environment:
##   YUZU_VERSION         — image tag to pull/run (0.10.0 for old, 0.10.1-test for new)
##   YUZU_TEST_CONFIG     — host path to a pre-generated yuzu-server.cfg
##
## Invocation by /test:
##   docker compose -f scripts/test/docker-compose.upgrade-test.yml \
##                  --project-name "yuzu-test-${RUN_ID}-upgrade" \
##                  up -d
##
## Volumes are scoped to the project name automatically, so two parallel
## runs each get their own server-data volume that survives container
## recreation but is isolated from siblings.
##
## DO NOT INVOKE THIS COMPOSE FILE DIRECTLY. It depends on
## YUZU_TEST_CONFIG being a valid host path (validated by the orchestrator)
## and on per-RUN_ID --project-name isolation. Always go through
## scripts/test/test-upgrade-stack.sh.

services:
  server:
    image: ghcr.io/tr3kkr/yuzu-server:${YUZU_VERSION:-0.10.0}
    restart: "no"
    environment:
      # Postgres substrate DSN (ADR-0006, #1318). Inert on the old-release
      # leg (and on the new leg until #1320 ships the consumer).
      # ⚠ TEST-ONLY default password ('yuzu-app') — distinct from the
      # superuser default by design (PR #1334 review, S1).
      YUZU_POSTGRES_DSN: postgresql://yuzu:${YUZU_DB_PASSWORD:-yuzu-app}@postgres:5432/yuzu
    ports:
      - "8080"     # web dashboard + REST API (random host port via compose)
      - "50051"   # agent gRPC
      - "50052"   # management gRPC
    volumes:
      - server-data:/var/lib/yuzu
      # Pre-bootstrapped admin credentials, mounted read-only at /etc/yuzu/
      # (NOT inside /var/lib/yuzu — see CRITICAL note in the header).
      - ${YUZU_TEST_CONFIG}:/etc/yuzu/yuzu-server.cfg:ro
    # Override the Dockerfile CMD to point --config at the bind-mount path
    # rather than the in-volume default. --data-dir stays in the volume so
    # all SQLite databases persist across the image swap (the whole point
    # of the upgrade test).
    command:
      - "--listen"
      - "0.0.0.0:50051"
      - "--no-tls"
      - "--no-https"
      - "--web-address"
      - "0.0.0.0"
      - "--web-port"
      - "8080"
      - "--config"
      - "/etc/yuzu/yuzu-server.cfg"
      - "--data-dir"
      - "/var/lib/yuzu"
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /readyz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  # ── PostgreSQL (server storage substrate, ADR-0006, #1318) ───────────
  # Built locally from Dockerfile.postgres (a ghcr yuzu-postgres pin can't
  # work here: YUZU_VERSION is the OLD release on the first leg and a
  # never-published -test tag on the second). The postgres service stays
  # identical across both legs while the server image swaps around it —
  # exactly the topology the ADR-0009 first-boot backfill upgrade
  # assertions will exercise. The OLD release's server ignores
  # YUZU_POSTGRES_DSN entirely; the env var below is inert until #1320.
  postgres:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.postgres
    image: yuzu-postgres:local
    # pull_policy: build — without it, the harness's `docker compose pull`
    # step exits 1 trying to pull the local-only yuzu-postgres:local tag
    # from a registry (verified). With it, pull skips this service and
    # `up -d` builds it when missing.
    pull_policy: build
    restart: "no"
    environment:
      # ⚠ TEST-ONLY default passwords — superuser ('yuzu') and app role
      # ('yuzu-app') must stay DISTINCT: first-boot init refuses to run if
      # they are equal (PR #1334 review, S1).
      POSTGRES_PASSWORD: ${YUZU_POSTGRES_PASSWORD:-yuzu}
      YUZU_DB_PASSWORD: ${YUZU_DB_PASSWORD:-yuzu-app}
    volumes:
      # Project-scoped like server-data, so the database also survives the
      # old→new image swap but stays isolated between parallel runs.
      # PG18 mount point: the parent dir, NOT .../data — the postgres:18 image
      # keeps data in a version-pinned subdir ($PGDATA=/var/lib/postgresql/18/
      # docker); a volume at the legacy /data path is read as an un-migrated
      # upgrade and the container refuses to boot (docker-library/postgres#1259).
      - postgres-data:/var/lib/postgresql
    healthcheck:
      # -h 127.0.0.1 forces TCP — the init-phase temporary server is
      # unix-socket-only, so a socket probe could pass mid-init. psql
      # SELECT 1 over the app DSN proves the app credential authenticates
      # ($$ defers expansion to the container's shell). The psql leg
      # dials the container's own hostname, NOT loopback: initdb leaves
      # 'trust' auth on 127.0.0.1, so only a non-loopback connection
      # actually verifies the password (scram).
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U yuzu -d yuzu && psql \"postgresql://yuzu:$${YUZU_DB_PASSWORD}@$$(hostname):5432/yuzu\" -tA -c 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  server-data:
  postgres-data:
