syntax = "proto3";

package yuzu.agent.v1;

import "yuzu/common/v1/common.proto";

option cc_enable_arenas = true;

// AgentService is the primary service implemented by the server.
// Agents connect to it and maintain a long-lived session.
service AgentService {
  // Register is the first call an agent makes. Returns a session token.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat keeps the session alive and receives pending commands.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // ExecuteCommand dispatches a command to a plugin on this agent.
  // Results stream back as they are produced.
  rpc ExecuteCommand(CommandRequest) returns (stream CommandResponse);

  // Subscribe opens a bidirectional command channel (alternative to polling).
  // The server pushes CommandRequests; the agent streams CommandResponses.
  rpc Subscribe(stream CommandResponse) returns (stream CommandRequest);

  // ReportInventory pushes full inventory data to the server.
  rpc ReportInventory(InventoryReport) returns (InventoryAck);

  // CheckForUpdate queries whether a newer agent binary is available.
  rpc CheckForUpdate(CheckForUpdateRequest) returns (CheckForUpdateResponse);

  // DownloadUpdate streams the agent binary in chunks over the mTLS channel.
  rpc DownloadUpdate(DownloadUpdateRequest) returns (stream DownloadUpdateChunk);
}

// ── Registration ─────────────────────────────────────────────────────────────

message AgentInfo {
  string agent_id  = 1;  // Stable UUID for this endpoint
  string hostname  = 2;
  yuzu.common.v1.Platform platform = 3;
  string agent_version = 4;
  repeated yuzu.common.v1.PluginInfo plugins = 5;
  map<string, string> scopable_tags = 6;  // Tags for scope evaluation
}

message RegisterRequest {
  AgentInfo info = 1;

  // Tier 2: Pre-shared enrollment token (admin-generated).
  string enrollment_token = 2;

  // Tier 3 (future): Platform trust — machine certificate / attestation.
  bytes  machine_certificate    = 3;   // DER-encoded X.509
  bytes  attestation_signature  = 4;   // Signed challenge
  string attestation_provider   = 5;   // "ad-cs", "aws", "azure", etc.

  // Gateway-observed agent source IP (#1064). When an agent reaches the server
  // via the Erlang gateway's ProxyRegister, the server's transport peer is the
  // GATEWAY's IP, not the agent's — so the audit row would mis-attribute the
  // source (SOC 2 IR-2; SIEM "race-loss IP must equal winner IP" false
  // negatives). The gateway fills this with the agent's origin IP (bare IPv4 /
  // IPv6, no scheme/port) so the server can record `source_ip`=agent origin and
  // `gateway_ip`=transport peer.
  //
  // GATEWAY-AUTHORITATIVE: the *direct* Register path IGNORES this field
  // entirely (it trusts the real transport peer), and the gateway OVERWRITES
  // whatever a client put here, so a *direct* agent cannot use it to forge a
  // source IP. It is NOT a defence against a compromised gateway — a malicious
  // gateway inside the trust boundary can set any value; the server records
  // both this and the gateway's transport `gateway_ip` so an auditor can
  // cross-check the two.
  //
  // Transport-agnostic by design (#376): the field lives in the message, so it
  // carries over to a QUIC framing unchanged. Under today's grpcbox transport
  // the gateway can only source it from `x-forwarded-for` (proxied
  // deployments); the QUIC transport, owning its socket, will fill it from the
  // real peer. Empty = not provided → server falls back to the transport peer.
  string gateway_observed_peer  = 6;

  // PR3: PEM-encoded PKCS#10 CSR generated by the agent (its own keypair). When
  // present AND enrollment is approved, the server signs a per-agent client leaf
  // (CN=<agent_id>, URI SAN yuzu://<install>/agent/<agent_id>) against the
  // internal CA and returns it in RegisterResponse.issued_certificate. The CSR's
  // own subject/SAN are IGNORED — the server sets identity from the authenticated
  // enrollment, never from CSR fields. Empty for a legacy agent / no-mTLS path.
  // Transport-agnostic (#376): lives in the message, survives the QUIC move.
  // GATEWAY: the gateway's vendored copy of this proto
  // (gateway/priv/proto/.../agent.proto + agent_pb.erl) was regenerated in PKI
  // PR5 to include this field, so the gateway-proxied Register path now FORWARDS
  // csr_pem/issued_certificate verbatim — the field SURVIVES TRANSIT through the
  // gateway. It is NOT yet signed on the gateway path: ProxyRegister has no signer
  // wired in PR5, so a gateway-connected agent still receives an empty
  // issued_certificate (fails closed to the bootstrap posture). Gateway-path
  // issuance (signing the forwarded CSR) lands in PR5d, which must first add
  // agent-identity attestation on the unauthenticated agent↔gateway hop — see the
  // R-6 confused-deputy gate in docs/pki-architecture.md. (That hop stays plaintext
  // in M1 — grpcbox forces mutual TLS on any TLS listener, which breaks unenrolled
  // bootstrap; one-way TLS is PR5c.)
  string csr_pem = 7;
}

message RegisterResponse {
  string session_id    = 1;
  bool   accepted      = 2;
  string reject_reason = 3;  // Populated if accepted == false
  // Server may send initial commands immediately after registration
  repeated CommandRequest pending_commands = 4;

  // Enrollment status: "enrolled", "pending", "denied"
  string enrollment_status = 5;
  // Persistent agent credential for reconnection (future use)
  string agent_credential = 6;

  // PR3: per-agent client certificate the server signed from
  // RegisterRequest.csr_pem (PEM). The agent persists it alongside its private
  // key and reconnects presenting it, upgrading to mutual TLS. Empty when no CSR
  // was sent or the CA is not active.
  string issued_certificate = 7;
  // PEM CA chain (root [+ intermediates]) that issued_certificate chains to, so
  // the agent can pin the server's CA and present a complete chain.
  string issued_ca_chain = 8;
}

// ── Heartbeat ─────────────────────────────────────────────────────────────────

message HeartbeatRequest {
  string session_id = 1;
  yuzu.common.v1.Timestamp sent_at = 2;
  // Lightweight status fields; full inventory uses ReportInventory
  map<string, string> status_tags = 3;
  // PR 10 / UAT 2026-05-12 — Push-based fleet topology ingestion.
  //
  // Optional inline fleet_snapshot.v1 JSON document. The agent attaches
  // this on the first heartbeat after its local snapshot-pump thread
  // produces a newer snapshot than was last attached. Empty on every
  // other heartbeat. Server-side `AgentServiceImpl::Heartbeat` parses
  // the document and feeds it into `FleetTopologyStore::push_snapshot`,
  // so `/api/v1/viz/fleet/topology` reads from a per-agent slot map
  // populated by the agents themselves and does not need to dispatch
  // `tar.fleet_snapshot` on cache miss. Old agents send empty and the
  // server falls back to the previous dispatch path.
  //
  // Wire cost: a snapshot is typically 5–20 KB JSON per host; the
  // agent gates attachment on "produced something newer since last
  // heartbeat" so even at the 30 s heartbeat cadence the average
  // bandwidth tracks the 60 s TAR fast-tick rate — about once per
  // two heartbeats per agent.
  bytes fleet_snapshot_json = 4;
}

message HeartbeatResponse {
  bool acknowledged = 1;
  yuzu.common.v1.Timestamp server_time = 2;
  repeated CommandRequest pending_commands = 3;
}

// ── Commands ──────────────────────────────────────────────────────────────────

message CommandRequest {
  string command_id = 1;  // Unique per invocation
  string plugin     = 2;  // Target plugin name (e.g. "inventory", "patch")
  string action     = 3;  // Action within the plugin
  map<string, string> parameters = 4;
  yuzu.common.v1.Timestamp expires_at = 5;  // Agent should discard after this

  // Stagger/delay: prevent thundering herd on large-fleet dispatch.
  // Agent waits (delay_seconds + random[0, stagger_seconds]) before executing.
  int32 stagger_seconds = 6;  // Max random delay in seconds (0 = no stagger)
  int32 delay_seconds   = 7;  // Fixed delay before execution (0 = immediate)

  // Binary payload for commands that carry a serialized proto rather than
  // text parameters. The Guardian push (`plugin="__guard__"`, action="push_rules")
  // puts a serialized GuaranteedStatePush here: proto3 `string` map values must be
  // valid UTF-8, so binary proto bytes cannot ride in `parameters`. `bytes` is
  // binary-safe across embedded NUL bytes. Symmetric with CommandResponse.payload.
  // GATEWAY: this field IS mirrored into the gateway's vendored agent.proto
  // (gateway/priv/proto/.../agent.proto, agent_pb.erl regenerated) and the gateway
  // forwards the decoded CommandRequest straight through gpb, so `payload` survives
  // gateway mode end-to-end — proven by yuzu_gw_guardian_wire_tests. (The
  // yuzu_gw_proto:encode_command_request/1 normalizer is NOT on the forward path; it
  // nonetheless copies `payload` now so it cannot become a strip point if reused.)
  // See docs/guardian-mvp-contract.md G2/G12.
  bytes payload = 8;
}

message CommandResponse {
  string command_id = 1;

  enum Status {
    RUNNING  = 0;
    SUCCESS  = 1;
    FAILURE  = 2;
    TIMEOUT  = 3;
    REJECTED = 4;
  }
  Status status = 2;

  string output    = 3;  // Streamed stdout / structured output
  int32  exit_code = 4;

  yuzu.common.v1.ErrorDetail error  = 5;
  yuzu.common.v1.Timestamp   sent_at = 6;

  // Side-channel routing for unsolicited agent→server messages (Guardian
  // events/status over the reserved "__guard__" plugin). When `plugin` is set, the
  // server's Subscribe read loop routes by `plugin`/`action` at the TOP of the loop
  // body — before the command_id-correlation path — so these never enter the response
  // store / executions drawer. `payload` carries a serialized proto (binary-safe,
  // unlike the `output` UTF-8 string). See docs/guardian-mvp-contract.md G2.
  string plugin  = 7;
  string action  = 8;
  bytes  payload = 9;
}

// ── Inventory ─────────────────────────────────────────────────────────────────

message InventoryReport {
  string session_id = 1;
  yuzu.common.v1.Timestamp collected_at = 2;

  // Key-value blobs per plugin; plugins define their own schemas.
  map<string, bytes> plugin_data = 3;
}

message InventoryAck {
  bool received = 1;
}

// ── OTA Updates ─────────────────────────────────────────────────────────────

message CheckForUpdateRequest {
  string agent_id        = 1;
  string current_version = 2;  // e.g. "0.1.0+42"
  yuzu.common.v1.Platform platform = 3;
}

message CheckForUpdateResponse {
  bool   update_available = 1;
  string latest_version   = 2;  // e.g. "0.2.0+87"
  string sha256           = 3;  // Hex-encoded SHA-256 of the binary
  bool   mandatory        = 4;  // If true, agent must update immediately
  bool   eligible         = 5;  // Rollout eligibility for this agent
  int64  file_size        = 6;  // Binary size in bytes
}

message DownloadUpdateRequest {
  string agent_id = 1;
  string version  = 2;  // Version to download (from CheckForUpdateResponse)
  yuzu.common.v1.Platform platform = 3;
}

message DownloadUpdateChunk {
  bytes data       = 1;  // Chunk payload (up to 64 KB)
  int64 offset     = 2;  // Byte offset within the file
  int64 total_size = 3;  // Total file size (repeated for resilience)
}
